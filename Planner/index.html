<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Planner</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2333503F'/%3E%3Cstop offset='1' stop-color='%235B8C5A'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='34' font-weight='700' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --paper:#F5EBD2;
  --paper-2:#FFFBF1;
  --ink:#23302A;
  --ink-soft:#5B6459;
  --forest:#2B4638;
  --leaf:#4C7A4C;
  --teal:#2F5B5E;
  --rust:#8C3A26;
  --mustard:#AD7A22;
  --slate:#233A46;
  --plum:#57394F;
  --line:#E4D6AC;
  --card:#FFFFFB;
  --tab-text:#F7F3E6;
  --shadow: 0 2px 10px rgba(35,48,42,0.09);
}
:root[data-theme="dark"]{
  --paper:#1A211C;
  --paper-2:#20281F;
  --ink:#EDE7D3;
  --ink-soft:#A9AE9C;
  --line:#3A4536;
  --card:#242D24;
  --shadow: 0 2px 10px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html, body{height:100%;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  height:100vh;
  overflow:hidden;
  line-height:1.35;
  transition: background .2s ease, color .2s ease;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.display{font-family:'Fraunces',serif;}

.app{
  display:flex;
  height:100vh;
}

/* ---- Sidebar tabs (notebook-tab signature) ---- */
.tabs{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:32px 8px 32px 18px;
  width:190px;
  flex-shrink:0;
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
}
.tabs .brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 18px 22px 4px;
}
.brand-mark{
  width:38px; height:38px; flex-shrink:0;
  border-radius:11px;
  background: linear-gradient(150deg, var(--forest), var(--leaf));
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow);
}
.brand-mark span{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:19px;
  color:#fff;
}
.brand-name{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:21px;
  color:var(--forest);
  letter-spacing:-0.01em;
  line-height:1.1;
}
.brand-footer{
  margin-top:auto;
  padding:18px 4px 4px 4px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  opacity:.75;
  line-height:1.6;
}
.tab{
  position:relative;
  display:flex;
  align-items:center;
  gap:11px;
  border:none;
  cursor:pointer;
  text-align:left;
  padding:12px 16px 12px 16px;
  border-radius:12px 0 0 12px;
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:15px;
  color:var(--tab-text);
  background:var(--ink-soft);
  transform:translateX(0);
  transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
  box-shadow: 0 1px 0 rgba(0,0,0,0.05);
  width:100%;
  box-sizing:border-box;
}
.tab-icon{width:19px; height:19px; flex-shrink:0; opacity:.92;}
.tab-icon svg{width:100%; height:100%; display:block;}
.tab-label{
  display:flex; flex-direction:column; line-height:1.25;
  min-width:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tab .sub{
  display:block;
  font-family:'Inter',sans-serif;
  font-weight:400;
  font-size:11px;
  opacity:.8;
  margin-top:2px;
}
.tab[data-c="dashboard"]{background:var(--forest);}
.tab[data-c="orto"]{background:var(--leaf);}
.tab[data-c="viaggio"]{background:var(--teal);}
.tab[data-c="grigliate"]{background:var(--rust);}
.tab[data-c="gomme"]{background:var(--mustard); color:#2b2110;}
.tab[data-c="finanze"]{background:var(--slate);}
.tab[data-c="condivisi"]{background:var(--plum);}
.tab.active{
  transform:translateX(14px);
  box-shadow: var(--shadow);
}
.tab:not(.active){opacity:.88;}
.tab:not(.active):hover{transform:translateX(6px); opacity:1;}

/* ---- Login screen ---- */
.login-screen{
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:var(--paper);
}
.login-card{
  background:var(--card); border:1px solid var(--line); border-radius:18px;
  box-shadow:var(--shadow); padding:36px 32px; width:100%; max-width:320px;
}
.login-label{
  display:block; font-family:'Inter',sans-serif; font-size:12.5px; color:var(--ink-soft);
  margin-bottom:16px; font-weight:600;
}
.login-label input{margin-top:7px;}
.login-error{color:var(--rust); font-size:12.5px; min-height:16px; margin-bottom:6px;}
.user-email{
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--forest); font-weight:600;
  word-break:break-all;
}

/* ---- Main content ---- */
.main-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  background:var(--paper-2);
  border-radius:28px 0 0 28px;
  margin:14px 14px 14px 0;
  box-shadow: var(--shadow);
  overflow:hidden;
}
.topbar{
  display:flex; align-items:center; justify-content:flex-end; gap:14px;
  padding:18px 44px 0 20px; flex-shrink:0;
}
.zoom-controls{display:flex; align-items:center; gap:2px;}
.zoom-controls .btn{padding:4px 9px; font-size:13px;}
.zoom-level{
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft);
  min-width:36px; text-align:center;
}
.app-version{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft);
  opacity:.75; white-space:nowrap;
}
#theme-toggle-btn{font-size:14px; padding:5px 9px;}
main{
  flex:1;
  padding:20px 44px 38px 44px;
  overflow-x:hidden;
  overflow-y:auto;
  min-width:0;
}
.dash-header-sticky{
  position:sticky; top:-20px; z-index:20; background:var(--paper-2);
  margin:-20px -44px 0 -44px; padding:20px 44px 0 44px;
}
.section-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:16px;
  flex-wrap:wrap;
  gap:10px;
}
.section-head h1{
  font-size:30px;
  margin:0;
  color:var(--ink);
}
.section-head .tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.dash-subtitle{
  display:flex; align-items:center; gap:8px;
  font-family:'Fraunces',serif; font-style:italic; font-weight:600;
  font-size:13.5px; color:var(--ink-soft); margin-top:-18px; margin-bottom:22px;
}

button{font-family:'Inter',sans-serif;}
.btn{
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  padding:8px 14px;
  border-radius:9px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition: background .15s ease, transform .1s ease;
}
.btn:hover{background:var(--card);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}
.btn.primary{background:var(--forest); color:#fff; border-color:var(--forest);}
.btn.primary:hover{background:#294034;}
.btn.ghost{background:transparent; border:1px dashed var(--line);}
.btn.danger{color:var(--rust); border-color:var(--rust); background:transparent;}
.btn.small{padding:4px 9px; font-size:12px; border-radius:7px;}

.card{
  background:var(--card);
  border-radius:14px;
  padding:13px 16px;
  box-shadow: var(--shadow);
  border:1px solid var(--line);
  transition: box-shadow .2s ease;
}

input[type=text], textarea, input[type=date]{
  font-family:'Inter',sans-serif;
  border:1px solid var(--line);
  border-radius:8px;
  padding:7px 10px;
  font-size:14px;
  background:var(--card);
  color:var(--ink);
  width:100%;
}
textarea{resize:vertical;}
.note-item textarea, textarea.long-note{min-height:44px;}

/* ---- Dashboard ---- */
.dash-grid{
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  gap:16px;
  align-items:start;
}
.week-table{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.day-row{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:14px;
  align-items:start;
}
.day-label{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:13.5px;
  color:var(--forest);
  padding-top:8px;
}
.day-card{padding:8px 10px; border-left:4px solid var(--day-color, var(--line)); transition: box-shadow .12s ease;}
.day-card.day-card-drop-target{box-shadow:0 0 0 2px var(--forest) inset;}
.section-label{
  display:flex; align-items:center; gap:9px; min-height:30px;
  font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.10em;
  text-transform:uppercase; color:var(--ink-soft); font-weight:600;
  padding-bottom:9px; margin-bottom:12px; border-bottom:1px solid var(--line);
}
.section-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.task-item{
  display:flex;
  align-items:flex-start;
  gap:6px;
  padding:3px 6px;
  margin:0 -6px;
  border-radius:7px;
  border-bottom:1px dashed var(--line);
  transition: background .15s ease;
  user-select:none;
}
.task-item:last-child{border-bottom:none;}
.task-item:hover{background:rgba(35,48,42,0.035);}
.task-item textarea{
  border:none; background:transparent; padding:3px 0; resize:none; overflow:hidden;
  font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); line-height:1.3; flex:1; min-width:0;
  user-select:text;
}
.task-item textarea:focus{outline:none; background:var(--card); border-radius:6px; padding:3px 6px;}
.task-item.done textarea{text-decoration:line-through; color:var(--ink-soft);}
.task-item .del{cursor:pointer; color:var(--ink-soft); font-size:12px; opacity:.5; flex-shrink:0; margin-top:3px;}
.task-item .del:hover{opacity:1; color:var(--rust);}
.task-block{margin-bottom:0;}
.subtask-list{margin-left:20px; margin-top:0; margin-bottom:0;}
.subtask-item{padding:2px 6px;}
.subtask-item textarea{font-size:12.5px; padding:2px 0;}
.action-grid{
  display:flex; flex-direction:column; gap:2px; flex-shrink:0; margin-top:1px;
}
.action-grid-row{display:flex; gap:2px;}
.action-grid-sub{display:flex; gap:2px; flex-shrink:0; margin-top:1px;}
.urgent-flag, .add-sub-flag{
  width:15px; height:15px; border-radius:4px; border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  font-size:9.5px; font-weight:700; color:var(--ink-soft);
  background:transparent; user-select:none; line-height:1;
}
.urgent-flag{font-family:'Fraunces',serif;}
.add-sub-flag{font-family:'Inter',sans-serif;}
.add-sub-flag{width:32px;}
.action-grid input[type=checkbox], .action-grid-sub input[type=checkbox]{width:15px; height:15px; margin:0; flex-shrink:0;}
.urgent-flag.active{background:var(--rust); border-color:var(--rust); color:#fff;}
.add-sub-flag:hover{background:var(--teal); border-color:var(--teal); color:#fff;}
.task-item.urgent{background:rgba(140,58,38,0.07); border-radius:7px;}
.task-item.urgent textarea{color:var(--rust); font-weight:600;}
.day-row.today .task-item textarea{font-weight:700;}
.drag-grip{
  width:13px; height:15px; flex-shrink:0; opacity:.3; cursor:grab; color:var(--ink-soft);
  display:flex; align-items:center; justify-content:center; margin-top:1px; user-select:none;
}
.drag-grip svg{width:100%; height:100%;}
.drag-grip:hover{opacity:.9;}
.drag-grip:active{cursor:grabbing;}
.task-item.dragging, .check-item.pack-item.dragging{opacity:.4;}
.task-item.drag-over, .check-item.pack-item.drag-over{background:rgba(51,80,63,0.09); border-radius:7px;}
.add-line{
  display:flex; gap:8px; margin-top:8px;
}
.add-line input{flex:1;}

.side-stack{display:flex; flex-direction:column; gap:12px;}
.note-item{
  padding:3px 0; border-bottom:1px dashed var(--line);
  display:flex; gap:8px; align-items:flex-start;
}
.note-item:last-child{border-bottom:none;}
.note-item textarea{border:none; background:transparent; font-size:13.5px; padding:2px 0;}
.note-item textarea:focus{outline:none; background:var(--card); border-radius:6px;}

/* ---- Orto board ---- */
.orto-toolbar{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center;}
.weather-chip{
  display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft);
  background:var(--card); border:1px solid var(--line); border-radius:10px;
  padding:8px 12px; margin-bottom:14px; width:fit-content;
}
.orto-board{
  position:relative;
  background:repeating-linear-gradient(0deg, var(--card), var(--card) 39px, var(--line) 40px);
  border-radius:14px;
  border:1px solid var(--line);
  height:560px;
  overflow:hidden;
  box-shadow: inset var(--shadow);
}
.orto-obj{
  position:absolute;
  border-radius:10px;
  padding:5px 7px;
  color:#fff;
  font-size:10.5px;
  font-weight:600;
  cursor:grab;
  box-shadow: 0 3px 8px rgba(0,0,0,0.18);
  user-select:none;
  overflow:hidden;
}
.orto-obj:active{cursor:grabbing;}
.orto-obj.orto-frame{box-shadow:none; cursor:grab; padding:0;}
.orto-obj-head{display:flex; align-items:center; gap:4px; margin-bottom:2px;}
.orto-obj-icon{width:12px; height:12px; flex-shrink:0; opacity:.95;}
.orto-obj-icon svg{width:100%; height:100%; display:block;}
.orto-obj-name{
  background:transparent; border:none; color:#fff; font-weight:600; font-size:10.5px;
  padding:0; flex:1; min-width:0;
}
.color-ball{
  position:relative; width:14px; height:14px; border-radius:50%; flex-shrink:0; cursor:pointer;
  background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
  border:1px solid rgba(255,255,255,0.7); box-shadow:0 0 0 1px rgba(0,0,0,0.15);
}
.color-ball input[type=color]{
  position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; padding:0; border:none;
}
.orto-obj-fields{display:flex; flex-direction:column; gap:2px; margin-top:2px;}
.orto-obj-mini{
  background:rgba(255,255,255,0.18); border:none; border-radius:4px; color:#fff;
  font-size:8.5px; padding:1px 4px; width:100%;
}
.orto-obj-mini::placeholder{color:rgba(255,255,255,0.75);}
.orto-obj-resize{
  position:absolute; right:2px; bottom:2px; width:12px; height:12px; cursor:nwse-resize;
  border-right:2px solid rgba(255,255,255,0.6); border-bottom:2px solid rgba(255,255,255,0.6);
}
.orto-obj-resize.frame-resize{
  border-right-color:rgba(26,26,26,0.5); border-bottom-color:rgba(26,26,26,0.5);
}
.bed-del{
  position:absolute; top:3px; right:5px; font-size:11px; opacity:.7; cursor:pointer; color:#fff;
}
.bed-del.frame-del{color:#1a1a1a; opacity:.5;}
.bed-del:hover{opacity:1;}
.orto-frame-controls{
  position:absolute; top:3px; left:5px; display:flex; align-items:center; gap:5px;
}
.frame-transp-toggle{
  width:14px; height:14px; border-radius:4px; border:1px solid #1a1a1a; opacity:.5;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  font-size:8px; font-weight:700; color:#1a1a1a; background:#fff;
}
.frame-transp-toggle.active{opacity:1; background:repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0/6px 6px;}
.orto-comment-pin{
  position:absolute; width:26px; height:26px; border-radius:7px 7px 7px 2px;
  background:var(--mustard); color:#fff; display:flex; align-items:center; justify-content:center;
  cursor:grab; box-shadow:0 2px 6px rgba(0,0,0,0.25); z-index:5;
}
.orto-comment-pin:active{cursor:grabbing;}
.orto-comment-icon{width:15px; height:15px;}
.orto-comment-icon svg{width:100%; height:100%; display:block;}
.orto-comment-pop{
  position:absolute; top:30px; left:0; width:210px; background:var(--card);
  border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow);
  padding:10px; z-index:6; cursor:default;
}
.orto-comment-pop textarea{font-size:12.5px;}

/* ---- Checklist collections (viaggio / grigliate) ---- */
.collection{display:flex; gap:22px; align-items:flex-start;}
.coll-list{width:230px; flex-shrink:0; display:flex; flex-direction:column; gap:8px;}
.coll-item{
  padding:10px 12px; border-radius:10px; cursor:pointer;
  border:1px solid var(--line); background:var(--card); font-size:13.5px; font-weight:600;
}
.coll-item.active{background:var(--forest); color:#fff; border-color:var(--forest);}
.coll-detail{flex:1; min-width:0;}
.cat-block{margin-bottom:12px;}
.cat-block h4{margin:0 0 8px 0; font-size:14px; color:var(--forest); font-family:'Fraunces',serif;}
.check-item{display:flex; align-items:flex-start; gap:6px; padding:5px 0; user-select:none;}
.check-item input[type=checkbox]{width:16px; height:16px; accent-color: var(--forest); flex-shrink:0; margin-top:3px;}
.check-item.done .pack-text{text-decoration:line-through; color:var(--ink-soft);}
.pack-text{
  font-size:13.5px; flex:1; min-width:0; padding:2px 0; line-height:1.4;
  border:none; background:transparent; resize:none; overflow:hidden;
  font-family:'Inter',sans-serif; color:var(--ink); user-select:text;
}
.pack-text:focus{outline:none; background:var(--card); border-radius:6px; padding:2px 5px;}
.check-item .del{margin-top:2px;}
.pack-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px 20px;}
@media (max-width:1100px){ .pack-grid{grid-template-columns:1fr;} }
input.pack-num{
  width:24px; flex-shrink:0; border:1px solid var(--line); border-radius:5px;
  padding:2px 3px; font-size:11px; text-align:center; background:var(--card); margin-top:1px;
}
.take-flag{width:17px; height:17px; color:var(--ink-soft); opacity:.35; cursor:pointer; flex-shrink:0; margin-top:2px; user-select:none;}
.take-flag svg{width:100%; height:100%; display:block;}
.take-flag.active{color:var(--leaf); opacity:1;}
.pack-item.not-needed{opacity:.5;}

/* ---- Gomme table ---- */
table.tires{width:100%; border-collapse:collapse; font-size:13.5px; table-layout:fixed;}
table.tires th{
  text-align:left; font-family:'Fraunces',serif; font-size:13px; color:var(--forest);
  border-bottom:2px solid var(--line); padding:8px 14px 8px 10px; overflow:hidden;
}
table.tires td{padding:6px 10px; border-bottom:1px solid var(--line); vertical-align:top; overflow:hidden;}
table.tires input[type=text], table.tires input[type=date]{font-size:13px; padding:4px 6px; width:100%;}
table.tires textarea.gomme-cell{
  font-size:13px; padding:4px 6px; width:100%; border:1px solid var(--line); border-radius:6px;
  resize:none; overflow:hidden; font-family:'Inter',sans-serif; color:var(--ink); background:var(--card);
}
.col-resize-handle{
  position:absolute; top:0; right:0; width:8px; height:100%; cursor:col-resize;
  border-right:2px solid transparent;
}
.col-resize-handle:hover{border-right-color:var(--forest);}
.row-resize-handle{
  position:absolute; left:0; bottom:0; width:100%; height:6px; cursor:row-resize;
  border-bottom:2px solid transparent;
}
.row-resize-handle:hover{border-bottom-color:var(--forest);}

.empty-hint{color:var(--ink-soft); font-size:13px; font-style:italic; padding:12px 0;}

/* ---- Empty states ---- */
.empty-state{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:40px 20px; text-align:center;
  border:1px dashed var(--line); border-radius:14px; background:var(--card);
  color:var(--ink-soft);
}
.empty-state .empty-icon{width:32px; height:32px; opacity:.5;}
.empty-state .empty-icon svg{width:100%; height:100%;}
.empty-state span{font-size:13px; font-style:italic; max-width:240px; line-height:1.5;}

/* ---- Stats bar ---- */
.stats-row{
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px;
}
.stat-card{
  background:var(--card); border-radius:12px; padding:11px 13px;
  box-shadow:var(--shadow); border:1px solid var(--line);
  border-left:4px solid var(--forest);
  transition: transform .15s ease, box-shadow .15s ease;
}
.stat-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(35,48,42,0.14); }
.stat-icon{width:17px; height:17px; margin-bottom:6px;}
.stat-icon svg{width:100%; height:100%; display:block;}
.stat-value{font-family:'Fraunces',serif; font-weight:700; font-size:19px; color:var(--ink); line-height:1.1;}
.stat-label{font-family:'Inter',sans-serif; font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
.stat-weather{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--teal); margin-top:5px;}

/* ---- Finanze ---- */
.finance-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:22px; align-items:start;}
.finance-item{border-bottom:1px dashed var(--line); padding:2px 0;}
.finance-item:last-of-type{border-bottom:none;}
.finance-row{
  display:flex; align-items:center; gap:8px; padding:2px 0;
}
.finance-row input[type=text]{border:none; background:transparent; padding:2px 0;}
.finance-row input[type=text]:focus{outline:none; background:var(--card); border-radius:6px;}
.finance-value{max-width:100px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:12.5px;}
.finance-note{
  border:none; background:transparent; font-size:11.5px; font-style:italic; color:var(--ink-soft);
  padding:0 0 4px 0; width:100%;
}
.finance-note:focus{outline:none; background:var(--card); border-radius:6px; padding:2px 4px;}
.chart-legend{display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:11.5px; color:var(--ink-soft);}
.chart-legend-item{display:flex; align-items:center; gap:6px;}
.chart-legend-dot{width:10px; height:10px; border-radius:50%; display:inline-block;}
.net-summary{
  display:flex; align-items:center; flex-wrap:wrap; gap:16px;
  padding:20px 24px; margin-bottom:22px; border-left:4px solid var(--slate);
}
.net-label{font-family:'Fraunces',serif; font-size:15px; color:var(--ink-soft);}
.net-value{font-family:'Fraunces',serif; font-weight:700; font-size:27px; color:var(--slate);}
.history-row{
  display:flex; align-items:center; gap:12px; padding:7px 0;
  border-bottom:1px dashed var(--line); font-size:13.5px;
}
.history-row:last-child{border-bottom:none;}
.history-value{margin-left:auto; font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--slate);}

/* ---- Backlog boxes ---- */
.side-card-head{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;}
.box-icon{width:16px; height:16px; color:var(--forest); flex-shrink:0;}
.box-icon svg{width:100%; height:100%; display:block;}
.box-icon.clickable{cursor:pointer; opacity:.85;}
.box-icon.clickable:hover{opacity:1;}
.box-title-input{
  border:none; background:transparent; font-family:'Fraunces',serif; font-weight:600;
  font-size:16px; color:var(--ink); padding:2px 0; width:100%;
}
.box-title-input:focus{outline:none; background:var(--card); border-radius:6px; padding:2px 4px;}
.box-title-text{font-family:'Fraunces',serif; font-weight:700; font-size:16px; color:var(--ink); flex:1; min-width:0;}
.box-edit-icon{width:13px; height:13px; color:var(--ink-soft); opacity:.5; cursor:pointer; flex-shrink:0;}
.box-edit-icon:hover{opacity:1;}
.box-edit-icon svg{width:100%; height:100%;}

/* ---- KPI settings ---- */
.stats-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.kpi-gear{cursor:pointer; width:18px; height:18px; color:var(--ink-soft); opacity:.6;}
.kpi-gear:hover{opacity:1;}
.kpi-gear svg{width:100%; height:100%;}
.kpi-check-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line); font-size:13.5px;}
.kpi-check-row:last-child{border-bottom:none;}
.kpi-check-row input{width:16px; height:16px; accent-color:var(--forest);}

/* ---- Login footer ---- */
.login-footer{
  text-align:center; margin-top:22px; font-family:'IBM Plex Mono',monospace;
  font-size:11px; color:var(--ink-soft); opacity:.75; line-height:1.6;
}

/* ---- Sidebar groups ---- */
.tabs-group-label{
  font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.09em;
  text-transform:uppercase; color:var(--ink-soft); opacity:.7;
  padding:10px 16px 2px 18px; margin-top:4px;
}

/* ---- Week toolbar / today highlight ---- */
.week-toolbar{display:flex; align-items:center; gap:18px; margin-bottom:12px; flex-wrap:wrap;}
.toggle-completed{display:flex; align-items:center; gap:7px; font-size:13px; color:var(--ink-soft); cursor:pointer;}
.toggle-completed input{accent-color:var(--forest); width:15px; height:15px;}
.day-row.today .day-label{
  color:#fff; background:var(--forest); border-radius:8px; padding:6px 10px; display:inline-block;
}
.day-row.today .day-card{border-color:var(--forest); box-shadow:0 0 0 2px rgba(51,80,63,0.15), var(--shadow);}

/* ---- Net worth eye toggle ---- */
.stat-card-head{display:flex; align-items:flex-start; justify-content:space-between;}
.eye-toggle{cursor:pointer; width:16px; height:16px; color:var(--ink-soft); opacity:.65; flex-shrink:0;}
.eye-toggle:hover{opacity:1;}
.eye-toggle svg{width:100%; height:100%; display:block;}

/* ---- Modal ---- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(35,48,42,0.45);
  display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;
}
.modal-card{
  background:var(--card); border-radius:16px; padding:26px 28px;
  box-shadow:var(--shadow); max-width:380px; width:100%;
}
.modal-card h3{margin:0 0 16px 0; font-size:17px; font-family:'Fraunces',serif; color:var(--ink);}
.modal-card .field-label{font-size:12px; color:var(--ink-soft); margin:14px 0 6px; font-weight:600;}
.icon-picker{display:flex; flex-wrap:wrap; gap:8px; margin:6px 0;}
.icon-choice{
  width:38px; height:38px; border-radius:9px; border:2px solid var(--line);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  background:var(--card); color:var(--ink-soft);
}
.icon-choice svg{width:18px; height:18px;}
.icon-choice.selected{border-color:var(--forest); color:var(--forest); background:rgba(51,80,63,0.08);}
.color-picker{display:flex; flex-wrap:wrap; gap:9px; margin:6px 0;}
.color-choice{width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
.color-choice.selected{border-color:var(--ink); box-shadow:0 0 0 2px var(--paper-2);}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:20px;}
.modal-radio-row{display:flex; gap:16px; font-size:13px; color:var(--ink);}
.modal-radio-row label{display:flex; align-items:center; gap:6px; cursor:pointer;}

/* ---- Custom sidebar tabs ---- */
.custom-tab{position:relative;}
.custom-tab .tab-icon{cursor:pointer;}
.custom-tab .tab-icon:hover{opacity:1;}
.tab-del{
  position:absolute; right:16px; top:50%; transform:translateY(-50%);
  opacity:0; font-size:11px; cursor:pointer; transition:opacity .15s ease; color:var(--tab-text);
}
.custom-tab:hover .tab-del{opacity:.75;}
.tab-del:hover{opacity:1 !important; color:#fff;}
.tab-add{
  border:1px dashed var(--line); background:transparent; color:var(--ink-soft);
  border-radius:12px 0 0 12px; padding:11px 16px; cursor:pointer;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:600; text-align:left;
  display:flex; align-items:center; gap:8px;
}
.tab-add:hover{background:rgba(255,255,255,.4); color:var(--ink);}

@media (max-width: 880px){
  .app{flex-direction:column;}
  .tabs{
    flex-direction:row; width:100%; padding:14px; gap:8px; overflow-x:auto;
  }
  .tabs .brand{display:none;}
  .tab{border-radius:10px; padding:9px 12px; white-space:nowrap;}
  .tab.active{transform:translateY(-4px);}
  main{margin:0; border-radius:20px 20px 0 0; padding:22px 18px;}
  .dash-grid{grid-template-columns:1fr;}
  .day-row{grid-template-columns:80px 1fr;}
  .collection{flex-direction:column;}
  .coll-list{width:100%; flex-direction:row; flex-wrap:wrap;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .finance-grid{grid-template-columns:1fr;}
}
</style>
</head>

      if(error || !data) return structuredClone(fallback);

/* ---------------- helpers ---------------- */
function attachRowDrag(handle, row, i, arr, onSave){
  handle.draggable = true;
  handle.addEventListener("dragstart",(e)=>{
    e.dataTransfer.setData("text/plain", String(i));
    e.dataTransfer.effectAllowed = "move";
    row.classList.add("dragging");
  });
  handle.addEventListener("dragend", ()=> row.classList.remove("dragging"));
  row.addEventListener("dragover",(e)=>{ e.preventDefault(); row.classList.add("drag-over"); });
  row.addEventListener("dragleave", ()=> row.classList.remove("drag-over"));
  row.addEventListener("drop",(e)=>{
    e.preventDefault(); row.classList.remove("drag-over");
    const fromIdx = parseInt(e.dataTransfer.getData("text/plain"), 10);
    if(isNaN(fromIdx) || fromIdx===i) return;
    const [moved] = arr.splice(fromIdx,1);
    arr.splice(i,0,moved);
    onSave();
  });
}
function attachTaskDrag(handle, row, day, i, refreshFn){
  handle.draggable = true;
  handle.addEventListener("dragstart",(e)=>{
    e.dataTransfer.setData("text/plain", JSON.stringify({day, index:i}));
    e.dataTransfer.effectAllowed = "move";
    row.classList.add("dragging");
  });
  handle.addEventListener("dragend", ()=> row.classList.remove("dragging"));
  row.addEventListener("dragover",(e)=>{ e.preventDefault(); e.stopPropagation(); row.classList.add("drag-over"); });
  row.addEventListener("dragleave", ()=> row.classList.remove("drag-over"));
  row.addEventListener("drop",(e)=>{
    e.preventDefault(); e.stopPropagation(); row.classList.remove("drag-over");
    let data; try{ data = JSON.parse(e.dataTransfer.getData("text/plain")); }catch(err){ return; }
    if(!data || typeof data.index!=="number" || !state.dashboard.week[data.day]) return;
    if(data.day===day && data.index===i) return;
    const sourceArr = state.dashboard.week[data.day];
    const [moved] = sourceArr.splice(data.index,1);
    if(!moved) return;
    state.dashboard.week[day].splice(i,0,moved);
    refreshFn();
  });
}
function attachDayCardDrop(dayCard, day, refreshFn){
  dayCard.addEventListener("dragover",(e)=>{ e.preventDefault(); dayCard.classList.add("day-card-drop-target"); });
  dayCard.addEventListener("dragleave",(e)=>{ dayCard.classList.remove("day-card-drop-target"); });
  dayCard.addEventListener("drop",(e)=>{
    e.preventDefault();
    dayCard.classList.remove("day-card-drop-target");
    let data; try{ data = JSON.parse(e.dataTransfer.getData("text/plain")); }catch(err){ return; }
    if(!data || typeof data.index!=="number" || !state.dashboard.week[data.day]) return;
    const sourceArr = state.dashboard.week[data.day];
    const [moved] = sourceArr.splice(data.index,1);
    if(!moved) return;
    state.dashboard.week[day].push(moved);
    refreshFn();
  });
}

function sumFinanceArr(arr){

function computeCategoryTotals(){
  const liquidity = sumFinanceArr(state.finance.liquidity);
  const nonliquid = sumFinanceArr(state.finance.nonliquid);
  const debts = sumFinanceArr(state.finance.debts);
  return { liquidity, nonliquid, debts, net: liquidity + nonliquid - debts };
}
function computeNetWorth(){

function fmtEUR(n){

function computeStats(){
  let total=0, done=0;
  Object.values(state.dashboard.week).forEach(arr=>{ arr.forEach(t=>{ total++; if(t.done) done++; }); });
  const pct = total ? Math.round(done/total*100) : 0;
  const activeChecklists = state.trips.length + state.bbqs.length;
  let lastTire = "—";
  const dated = state.tires.filter(t=>t.data).sort((a,b)=> new Date(b.data)-new Date(a.data));
  if(dated.length) lastTire = new Date(dated[0].data).toLocaleDateString("it-IT");
  return { pct, activeChecklists, lastTire, net: computeNetWorth() };
}

document.getElementById("tabs").addEventListener("click", (e)=>{

    const builtinKey = delEl.dataset.builtinDel;
    if(builtinKey){

        state.hiddenBuiltins.push(builtinKey);

        applyHiddenBuiltins();
        if(document.querySelector('.tab[data-tab="'+builtinKey+'"]').classList.contains("active")){
          document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
          document.querySelector('.tab[data-tab="dashboard"]').classList.add("active");
          render("dashboard");
        }
      }
    }
    return;
  }
  const btn = e.target.closest(".tab");
  if(!btn) return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  render(btn.dataset.tab);
});

function el(tag, attrs={}, children=[]){
  const n = document.createElement(tag);
  for(const k in attrs){
    if(k === "class") n.className = attrs[k];
    else if(k.startsWith("on")) n.addEventListener(k.slice(2), attrs[k]);
    else if(k === "html") n.innerHTML = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return n;
}

function syncParentDone(t){
  if(t.subtasks && t.subtasks.length){
    t.done = t.subtasks.every(s=>s.done);

function renderTaskBlock(main, day, t, i){
  if(!t.subtasks) t.subtasks = [];

    store.set(privKey("dashboard"), state.dashboard); renderDashboard(clear(main));
  });
  const urgentBtn = el("span",{class:"urgent-flag"+(t.urgent?" active":""), title:"Segna urgente"}, "!");
  urgentBtn.addEventListener("pointerdown", (e)=>{
    e.preventDefault(); e.stopPropagation();

  });
  const addSubBtn = el("span",{class:"add-sub-flag", title:"Aggiungi sotto-task"}, "+");

  const txt = el("textarea",{rows:"1"}); txt.value = t.text;
  txt.addEventListener("input", ()=>autoResize(txt));
  txt.addEventListener("change", ()=>{ t.text = txt.value; store.set(privKey("dashboard"), state.dashboard); });
  const del = el("span",{class:"del", html:"✕"});
  del.addEventListener("click", ()=>{
    const removedIdx = i, removedItem = t;
    state.dashboard.week[day].splice(i,1);
    store.set(privKey("dashboard"), state.dashboard); renderDashboard(clear(main));
    pushUndo(()=>{
      state.dashboard.week[day].splice(removedIdx,0,removedItem);
      store.set(privKey("dashboard"), state.dashboard); renderDashboard(clear(document.getElementById("main")));
    });
  });
  row.appendChild(grip); row.appendChild(grid); row.appendChild(txt); row.appendChild(del);
  attachTaskDrag(grip, row, day, i, ()=>{ store.set(privKey("dashboard"), state.dashboard); renderDashboard(clear(document.getElementById("main"))); });
  wrap.appendChild(row);

  const subWrap = el("div",{class:"subtask-list"});

    scb.addEventListener("change", ()=>{
      s.done = scb.checked; syncParentDone(t);
      store.set(privKey("dashboard"), state.dashboard); renderDashboard(clear(main));
    });
    const sUrgentBtn = el("span",{class:"urgent-flag"+(s.urgent?" active":""), title:"Segna urgente"}, "!");
    sUrgentBtn.addEventListener("pointerdown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      s.urgent = !s.urgent;
      store.set(privKey("dashboard"), state.dashboard); renderDashboard(clear(main));
    });
    const sGrid = el("div",{class:"action-grid-sub"});
    sGrid.appendChild(scb); sGrid.appendChild(sUrgentBtn);
    const stxt = el("textarea",{rows:"1", "data-subid":s.id||""}); stxt.value = s.text;
    stxt.addEventListener("input", ()=>autoResize(stxt));
    stxt.addEventListener("change", ()=>{ s.text = stxt.value; store.set(privKey("dashboard"), state.dashboard); });
    const sdel = el("span",{class:"del", html:"✕"});
    sdel.addEventListener("click", ()=>{
      const removedIdx = si, removedItem = s;
      t.subtasks.splice(si,1); syncParentDone(t);

      pushUndo(()=>{
        t.subtasks.splice(removedIdx,0,removedItem); syncParentDone(t);

      });
    });
    srow.appendChild(sGrip); srow.appendChild(sGrid); srow.appendChild(stxt); srow.appendChild(sdel);

    subWrap.appendChild(srow);

async function loadOrtoWeather(container){

function makeDraggable(node, item, board, isPin){
  node.addEventListener("pointerdown",(e)=>{
    if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "BUTTON" ||
       e.target.classList.contains("bed-del") || e.target.classList.contains("orto-obj-resize")) return;
    e.preventDefault();
    node.setPointerCapture(e.pointerId);
    const rect = board.getBoundingClientRect();
    function move(ev){
      let x = ((ev.clientX - rect.left) / rect.width) * 100;
      let y = ((ev.clientY - rect.top) / rect.height) * 100;
      const maxPos = isPin ? 96 : 88;
      x = Math.max(0, Math.min(maxPos, x)); y = Math.max(0, Math.min(maxPos, y));
      node.style.left = x+"%"; node.style.top = y+"%";
      item.x = x; item.y = y;
    }
    function up(){
      node.removeEventListener("pointermove", move);
      node.removeEventListener("pointerup", up);
      store.set("orto", state.orto);
    }
    node.addEventListener("pointermove", move);
    node.addEventListener("pointerup", up);
  });
}
function makeResizable(handle, node, obj, board){
  handle.addEventListener("pointerdown",(e)=>{
    e.preventDefault(); e.stopPropagation();
    handle.setPointerCapture(e.pointerId);
    const startX = e.clientX, startY = e.clientY;
    const startW = node.offsetWidth, startH = node.offsetHeight;
    function move(ev){
      const w = Math.max(90, startW + (ev.clientX - startX));
      const h = Math.max(60, startH + (ev.clientY - startY));
      node.style.width = w+"px"; node.style.height = h+"px";
      obj.w = w; obj.h = h;
    }
    function up(){
      handle.removeEventListener("pointermove", move);
      handle.removeEventListener("pointerup", up);
      store.set("orto", state.orto);
    }
    handle.addEventListener("pointermove", move);
    handle.addEventListener("pointerup", up);
  });
}

function renderPackItem(item, i, arr, onSave, idPrefix){
  const row = el("div",{class:"check-item pack-item"+(item.done?" done":"")+(item.take===false?" not-needed":"")});
  const grip = el("span",{class:"drag-grip", html:ICON_GRIP});
  const numInp = el("input",{type:"text", class:"pack-num", value:item.num||"", placeholder:"#"});
  numInp.addEventListener("change", ()=>{ item.num=numInp.value; onSave(false); });
  const cb = el("input",{type:"checkbox", id:idPrefix+i});
  cb.checked = item.done;
  cb.addEventListener("change", ()=>{ item.done=cb.checked; onSave(); });
  const takeBtn = el("span",{class:"take-flag"+(item.take!==false?" active":""), html:ICON_CHECK, title:"Da prendere"});
  takeBtn.addEventListener("pointerdown", (e)=>{ e.preventDefault(); e.stopPropagation(); item.take = !item.take; onSave(); });
  const txt = el("textarea",{rows:"1", class:"pack-text"}); txt.value = item.text;
  txt.addEventListener("input", ()=>autoResize(txt));
  txt.addEventListener("change", ()=>{ item.text = txt.value; onSave(false); });
  const del = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
  del.addEventListener("click", ()=>{
    const removedIdx = i, removedItem = item;
    arr.splice(i,1); onSave();
    pushUndo(()=>{ arr.splice(removedIdx,0,removedItem); onSave(); });
  });
  row.appendChild(grip); row.appendChild(numInp); row.appendChild(cb); row.appendChild(takeBtn); row.appendChild(txt); row.appendChild(del);
  attachRowDrag(grip, row, i, arr, onSave);
  return row;

function renderFinanceChart(history){
  if(history.length < 2){
    return emptyState("Salva almeno due snapshot per vedere il grafico del trend.", ICON_COIN);
  }
  const data = history.slice().reverse();
  const w = 640, h = 220, pad = 34;
  const series = [
    {key:"liquidity", color:"#2F5B5E", label:"Liquidità"},
    {key:"nonliquid", color:"#4C7A4C", label:"Non liquidi"},
    {key:"debts", color:"#8C3A26", label:"Debiti"},
    {key:"net", color:"#233A46", label:"Patrimonio netto"}
  ];
  const allVals = data.flatMap(d=> series.map(s=> d[s.key]||0)).concat([0]);
  const maxV = Math.max(...allVals), minV = Math.min(...allVals);
  const range = (maxV - minV) || 1;
  const xStep = data.length>1 ? (w - pad*2) / (data.length - 1) : 0;
  function xy(val, i){
    const x = pad + i*xStep;
    const y = h - pad - ((val - minV) / range) * (h - pad*2);
    return [x,y];
  }
  let svg = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">`;
  svg += `<line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#E4D6AC" stroke-width="1"/>`;
  series.forEach(s=>{
    const d = data.map((row,i)=>{
      const [x,y] = xy(row[s.key]||0, i);
      return (i===0?"M":"L")+x.toFixed(1)+","+y.toFixed(1);
    }).join(" ");
    svg += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="${s.key==='net'?2.6:1.6}"/>`;
  });
  svg += `</svg>`;
  const wrap = el("div",{});
  wrap.appendChild(el("div",{html:svg}));
  const legend = el("div",{class:"chart-legend"});
  series.forEach(s=>{
    legend.appendChild(el("span",{class:"chart-legend-item"},[
      el("span",{class:"chart-legend-dot", style:`background:${s.color};`}),
      el("span",{}, s.label)
    ]));
  });
  wrap.appendChild(legend);
  return wrap;
}
function openFinanceImportModal(){
  openModal((modal, close)=>{
    modal.appendChild(el("h3",{},"Importa storico finanze"));
    modal.appendChild(el("div",{style:"font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;line-height:1.5;"},
      "Incolla una riga per ogni snapshot, nel formato: gg/mm/aaaa;liquidità;non liquidi;debiti — es. 01/01/2025;30000;150000;130000. Il patrimonio netto si calcola da solo."));
    const ta = el("textarea",{rows:"10", style:"font-size:12.5px; font-family:'IBM Plex Mono',monospace;", placeholder:"01/01/2025;30000;150000;130000\n01/02/2025;31000;151000;129000"});
    modal.appendChild(ta);
    const errBox = el("div",{style:"color:var(--rust); font-size:12px; margin-top:8px; min-height:16px;"});
    modal.appendChild(errBox);
    const actions = el("div",{class:"modal-actions"});
    const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
    cancelBtn.addEventListener("click", close);
    const importBtn = el("button",{class:"btn primary"},"Importa");
    importBtn.addEventListener("click", ()=>{
      const lines = ta.value.split("\n").map(l=>l.trim()).filter(l=>l.length);
      if(!lines.length) return;
      const parsed = [];
      for(const line of lines){
        const parts = line.split(";").map(p=>p.trim());
        if(parts.length < 4){ errBox.textContent = 'Riga non valida (servono 4 campi separati da ";"): '+line; return; }
        const [dateStr, liq, nonliq, debt] = parts;
        const liquidity = parseFloat(liq.replace(",", ".")) || 0;
        const nonliquid = parseFloat(nonliq.replace(",", ".")) || 0;
        const debts = parseFloat(debt.replace(",", ".")) || 0;
        parsed.push({ date:dateStr, liquidity, nonliquid, debts, net: liquidity+nonliquid-debts });
      }
      errBox.textContent = "";
      state.finance.history = state.finance.history.concat(parsed);
      state.finance.history.sort((a,b)=>{
        const da = a.date.split("/").reverse().join("");
        const db = b.date.split("/").reverse().join("");
        return db.localeCompare(da);
      });
      store.set(privKey("finance"), state.finance);
      close(); render("finanze");
    });
    actions.appendChild(cancelBtn); actions.appendChild(importBtn);
    modal.appendChild(actions);
  });
}
function renderFinanze(main){
  main.appendChild(el("div",{class:"section-head"},[
    el("h1",{},"Finanze"),
    el("span",{class:"tag"},"patrimonio netto")
  ]));
  const grid = el("div",{class:"finance-grid"});
  grid.appendChild(financeBlock("Liquidità","liquidity"));
  grid.appendChild(financeBlock("Asset non liquidi","nonliquid"));
  grid.appendChild(financeBlock("Debiti","debts"));
  main.appendChild(grid);

  const net = computeNetWorth();
  const summary = el("div",{class:"card net-summary"});
  summary.appendChild(el("div",{class:"net-label"},"Patrimonio netto attuale"));
  summary.appendChild(el("div",{class:"net-value"}, fmtEUR(net)));
  const snapBtn = el("button",{class:"btn primary"},"+ Salva snapshot");
  snapBtn.addEventListener("click", ()=>{
    const totals = computeCategoryTotals();
    state.finance.history.unshift({date:new Date().toLocaleDateString("it-IT"), ...totals});
    store.set(privKey("finance"), state.finance); render("finanze");
  });
  summary.appendChild(snapBtn);
  const importBtn = el("button",{class:"btn ghost", style:"margin-left:10px;"},"Importa storico");
  importBtn.addEventListener("click", openFinanceImportModal);
  summary.appendChild(importBtn);
  main.appendChild(summary);

  const chartBlock = el("div",{class:"card cat-block"});
  chartBlock.appendChild(el("h4",{},"Andamento nel tempo"));
  chartBlock.appendChild(renderFinanceChart(state.finance.history));
  main.appendChild(chartBlock);

  const histBlock = el("div",{class:"card cat-block"});
  histBlock.appendChild(el("h4",{},"Storico snapshot"));
  if(!state.finance.history.length){
    histBlock.appendChild(emptyState("Salva il primo snapshot per iniziare a tracciare l'andamento nel tempo.", ICON_COIN));
  } else {
    state.finance.history.forEach((h,i)=>{
      const row = el("div",{class:"history-row"});
      row.appendChild(el("span",{class:"mono"}, h.date));
      row.appendChild(el("span",{class:"history-value"}, fmtEUR(h.net)));
      const del = el("span",{class:"del", html:"✕"});
      del.addEventListener("click", ()=>{ state.finance.history.splice(i,1); store.set(privKey("finance"), state.finance); render("finanze"); });
      row.appendChild(del);
      histBlock.appendChild(row);
    });
  }
  main.appendChild(histBlock);
}

function renderSharedBoardDetail(detail, board){
  const block = el("div",{class:"cat-block"});
  block.appendChild(el("h4",{},"Voci"));
  board.data.forEach((it,i)=>{
    const row = el("div",{class:"check-item"+(it.done?" done":"")});
    const cb = el("input",{type:"checkbox", id:"s"+board.id+i});
    cb.checked = it.done;
    cb.addEventListener("change", ()=>{ it.done=cb.checked; store.set("sharedBoards", state.sharedBoards); render("condivisi"); });
    const lab = el("label",{for:"s"+board.id+i}, it.text);
    const del = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
    del.addEventListener("click", ()=>{ board.data.splice(i,1); store.set("sharedBoards", state.sharedBoards); render("condivisi"); });
    row.appendChild(cb); row.appendChild(lab); row.appendChild(del);
    block.appendChild(row);
  });
  const addLine = el("div",{class:"add-line"});
  const input = el("input",{type:"text", placeholder:"aggiungi voce…"});
  input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && input.value.trim()){
      board.data.push({text:input.value.trim(), done:false});
      store.set("sharedBoards", state.sharedBoards); render("condivisi");
    }
  });
  addLine.appendChild(input);
  block.appendChild(addLine);
  detail.appendChild(block);
}

/* ---------------- CUSTOM TABS ---------------- */
function renderGenericChecklistDetail(storeKey, tabName){
  return function(detail, board){
    const block = el("div",{class:"cat-block"});
    block.appendChild(el("h4",{},"Voci"));
    board.data.forEach((it,i)=>{
      const row = el("div",{class:"check-item"+(it.done?" done":"")});
      const cb = el("input",{type:"checkbox", id:"c"+board.id+i});
      cb.checked = it.done;
      cb.addEventListener("change", ()=>{ it.done=cb.checked; store.set(storeKey, state[storeKey]); render(tabName); });
      const lab = el("label",{for:"c"+board.id+i}, it.text);
      const del = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
      del.addEventListener("click", ()=>{ board.data.splice(i,1); store.set(storeKey, state[storeKey]); render(tabName); });
      row.appendChild(cb); row.appendChild(lab); row.appendChild(del);
      block.appendChild(row);
    });
    const addLine = el("div",{class:"add-line"});
    const input = el("input",{type:"text", placeholder:"aggiungi voce…"});
    input.addEventListener("keydown",(e)=>{
      if(e.key==="Enter" && input.value.trim()){
        board.data.push({text:input.value.trim(), done:false});
        store.set(storeKey, state[storeKey]); render(tabName);
      }
    });
    addLine.appendChild(input);
    block.appendChild(addLine);
    detail.appendChild(block);
  };
}
function findCustomTab(id){
  return state.customTabs.find(t=>t.id===id) || state.customTabsPrivate.find(t=>t.id===id);
}
async function ensureCustomTabLoaded(tab){
  const storeKey = tab.private ? privKey("custom:"+tab.id) : "custom:"+tab.id;
  if(!customTabData[tab.id]) customTabData[tab.id] = await store.get(storeKey, []);
  state[storeKey] = customTabData[tab.id];
  return storeKey;
}
function renderCustomTabButtons(){
  const sharedSlot = document.getElementById("custom-tabs-slot-shared");
  const privateSlot = document.getElementById("custom-tabs-slot-private");
  sharedSlot.innerHTML = ""; privateSlot.innerHTML = "";
  document.getElementById("private-group-label").style.display = state.customTabsPrivate.length ? "" : "none";
  state.customTabs.forEach(tab=>{
    sharedSlot.appendChild(customTabButton(tab));
  });
  state.customTabsPrivate.forEach(tab=>{
    privateSlot.appendChild(customTabButton(tab));
  });
}
function customTabButton(tab){
  const btn = el("button",{class:"tab custom-tab", "data-tab":"custom:"+tab.id, style:`background:${tab.color}`});
  const iconEl = el("span",{class:"tab-icon", html: STANDARD_ICONS[tab.icon]||STANDARD_ICONS.list, title:"Cambia icona"});
  iconEl.addEventListener("click",(e)=>{
    e.stopPropagation();
    openModal((modal, close)=>{
      modal.appendChild(el("h3",{},"Icona scheda"));
      const picker = iconPickerRow(tab.icon, (k)=>{
        tab.icon = k;
        const targetKey = tab.private ? privKey("customTabs") : "customTabs";
        const targetArr = tab.private ? state.customTabsPrivate : state.customTabs;
        store.set(targetKey, targetArr);
        close(); renderCustomTabButtons();
      });
      modal.appendChild(picker);
      const actions = el("div",{class:"modal-actions"});
      const closeBtn = el("button",{class:"btn ghost"},"Chiudi");
      closeBtn.addEventListener("click", close);
      actions.appendChild(closeBtn);
      modal.appendChild(actions);
    });
  });
  btn.appendChild(iconEl);
  const labelEl = el("span",{class:"tab-label", title:"Doppio click per rinominare"}, tab.name);
  labelEl.addEventListener("dblclick",(e)=>{
    e.stopPropagation();
    const newName = prompt("Rinomina scheda:", tab.name);
    if(newName && newName.trim()){
      tab.name = newName.trim();
      const targetKey = tab.private ? privKey("customTabs") : "customTabs";
      const targetArr = tab.private ? state.customTabsPrivate : state.customTabs;
      store.set(targetKey, targetArr);
      renderCustomTabButtons();
    }
  });
  btn.appendChild(labelEl);
  const delBtn = el("span",{class:"tab-del", html:"✕"});
  delBtn.addEventListener("click",(e)=>{
    e.stopPropagation();
    if(confirm('Eliminare la scheda "'+tab.name+'" e tutti i suoi contenuti? Questa azione non è reversibile.')){
      deleteCustomTab(tab);
    }
  });
  btn.appendChild(delBtn);
  return btn;
}
async function deleteCustomTab(tab){
  const contentKey = tab.private ? privKey("custom:"+tab.id) : "custom:"+tab.id;
  if(tab.private){
    state.customTabsPrivate = state.customTabsPrivate.filter(t=>t.id!==tab.id);
    await store.set(privKey("customTabs"), state.customTabsPrivate);
  } else {
    state.customTabs = state.customTabs.filter(t=>t.id!==tab.id);
    await store.set("customTabs", state.customTabs);
  }
  await store.set(contentKey, []);
  delete customTabData[tab.id];
  renderCustomTabButtons();
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector('.tab[data-tab="dashboard"]').classList.add("active");
  render("dashboard");
}

/* ---------------- builtin tabs: nascondi / ripristina ---------------- */
const BUILTIN_TABS = {
  orto: "Orto", viaggio: "Viaggi", grigliate: "Grigliate", gomme: "Gomme", condivisi: "Condivisi"
};
function applyHiddenBuiltins(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(btn) btn.style.display = state.hiddenBuiltins.includes(key) ? "none" : "";
  });
}
function restoreBuiltin(key){
  state.hiddenBuiltins = state.hiddenBuiltins.filter(k=>k!==key);
  store.set(privKey("hiddenBuiltins"), state.hiddenBuiltins);
  applyHiddenBuiltins();
}
function openNewTabModal(){
  openModal((modal, close)=>{
    modal.appendChild(el("h3",{},"Nuova scheda"));

    if(state.hiddenBuiltins.length){
      modal.appendChild(el("div",{class:"field-label"},"Ripristina una scheda nascosta"));
      const restoreWrap = el("div",{style:"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;"});
      state.hiddenBuiltins.forEach(key=>{
        const chip = el("button",{type:"button", class:"btn small ghost"}, BUILTIN_TABS[key]+" ↺");
        chip.addEventListener("click", ()=>{ restoreBuiltin(key); close(); });
        restoreWrap.appendChild(chip);
      });
      modal.appendChild(restoreWrap);
      modal.appendChild(el("div",{style:"font-size:12px;color:var(--ink-soft);margin:10px 0 16px;"},"— oppure crea una scheda completamente nuova —"));
    }

    const nameInput = el("input",{type:"text", placeholder:"Nome scheda (es. Film da vedere)"});
    modal.appendChild(nameInput);

    modal.appendChild(el("div",{class:"field-label"},"Colore"));
    const colorPicker = el("div",{class:"color-picker"});
    let selColor = TAB_COLORS[Math.floor(Math.random()*TAB_COLORS.length)];
    TAB_COLORS.forEach(c=>{
      const dot = el("div",{class:"color-choice"+(c===selColor?" selected":""), style:`background:${c}`});
      dot.addEventListener("click", ()=>{
        colorPicker.querySelectorAll(".color-choice").forEach(d=>d.classList.remove("selected"));
        dot.classList.add("selected"); selColor=c;
      });
      colorPicker.appendChild(dot);
    });
    modal.appendChild(colorPicker);

    modal.appendChild(el("div",{class:"field-label"},"Icona"));
    let selIcon = "list";
    modal.appendChild(iconPickerRow(selIcon, (k)=>{ selIcon=k; }));

    modal.appendChild(el("div",{class:"field-label"},"Visibilità"));
    const visWrap = el("div",{class:"modal-radio-row"});
    const sharedLabel = el("label",{});
    const sharedRadio = el("input",{type:"radio", name:"tabvis"}); sharedRadio.checked = true;
    sharedLabel.appendChild(sharedRadio); sharedLabel.appendChild(document.createTextNode("Condivisa"));
    const privateLabel = el("label",{});
    const privateRadio = el("input",{type:"radio", name:"tabvis"});
    privateLabel.appendChild(privateRadio); privateLabel.appendChild(document.createTextNode("Solo per me"));
    visWrap.appendChild(sharedLabel); visWrap.appendChild(privateLabel);
    modal.appendChild(visWrap);

    const actions = el("div",{class:"modal-actions"});
    const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
    cancelBtn.addEventListener("click", close);
    const createBtn = el("button",{class:"btn primary"},"Crea scheda");
    createBtn.addEventListener("click", async ()=>{
      if(!nameInput.value.trim()) return;
      const isPrivate = privateRadio.checked;
      const newTab = { id:"t"+Date.now(), name:nameInput.value.trim(), color:selColor, icon:selIcon, private:isPrivate };
      if(isPrivate){
        state.customTabsPrivate.push(newTab);
        await store.set(privKey("customTabs"), state.customTabsPrivate);
      } else {
        state.customTabs.push(newTab);
        await store.set("customTabs", state.customTabs);
      }
      renderCustomTabButtons();
      close();
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      const newBtn = document.querySelector('.tab[data-tab="custom:'+newTab.id+'"]');
      if(newBtn) newBtn.classList.add("active");
      render("custom:"+newTab.id);
    });
    actions.appendChild(cancelBtn); actions.appendChild(createBtn);
    modal.appendChild(actions);
    nameInput.focus();
  });
}
document.getElementById("add-tab-btn").addEventListener("click", openNewTabModal);

/* ---------------- render dispatcher ---------------- */
function clear(main){ main.innerHTML=""; return main; }
function autoResize(ta){
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}
function render(tab){
  const main = clear(document.getElementById("main"));
  if(tab==="dashboard") renderDashboard(main);
  else if(tab==="orto") renderOrto(main);
  else if(tab==="viaggio") renderCollection(main, {
    key:"trips", tab:"viaggio", title:"Checklist viaggio", active:activeTrip,
    setActive:(id)=>activeTrip=id, template:TRIP_TEMPLATE, renderDetail:renderTripDetail
  });
  else if(tab==="grigliate") renderCollection(main, {
    key:"bbqs", tab:"grigliate", title:"Checklist grigliate", active:activeBbq,
    setActive:(id)=>activeBbq=id, template:BBQ_TEMPLATE, renderDetail:renderBbqDetail
  });
  else if(tab==="gomme") renderGomme(main);
  else if(tab==="finanze") renderFinanze(main);
  else if(tab==="condivisi") renderCollection(main, {
    key:"sharedBoards", tab:"condivisi", title:"Board condivise", active:activeSharedBoard,
    setActive:(id)=>activeSharedBoard=id, template:SHARED_BOARD_TEMPLATE, renderDetail:renderSharedBoardDetail
  });
  else if(tab.indexOf("custom:")===0){
    const id = tab.slice(7);
    const tabCfg = findCustomTab(id);
    if(!tabCfg) return;
    main.appendChild(el("div",{class:"empty-hint"},"Caricamento…"));
    ensureCustomTabLoaded(tabCfg).then((storeKey)=>{
      const main2 = clear(document.getElementById("main"));
      renderCollection(main2, {
        key: storeKey, tab: tab, title: tabCfg.name,
        active: activeCustomItem[tabCfg.id] || null,
        setActive: (itemId)=>{ activeCustomItem[tabCfg.id]=itemId; },
        template: SHARED_BOARD_TEMPLATE,
        renderDetail: renderGenericChecklistDetail(storeKey, tab)
      });
      main2.querySelectorAll("textarea").forEach(ta=>autoResize(ta));
    });
  }
  main.querySelectorAll("textarea").forEach(ta=>autoResize(ta));
}

initAuth();
