<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Planner</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2333503F'/%3E%3Cstop offset='1' stop-color='%235B8C5A'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='34' font-weight='700' fill='white' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --paper:#E9E2CF;
  --paper-2:#F7F3E6;
  --ink:#23302A;
  --ink-soft:#5B6459;
  --forest:#33503F;
  --leaf:#5B8C5A;
  --teal:#3C6E71;
  --rust:#A8462E;
  --mustard:#C68A2E;
  --slate:#2E4756;
  --plum:#6B4C74;
  --line:#D3C7A9;
  --card:#FBF8F1;
  --shadow: 0 2px 10px rgba(35,48,42,0.10);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.display{font-family:'Fraunces',serif;}

.app{
  display:flex;
  min-height:100vh;
}

/* ---- Sidebar tabs (notebook-tab signature) ---- */
.tabs{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:32px 0 32px 18px;
  width:190px;
  flex-shrink:0;
}
.tabs .brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 18px 22px 4px;
}
.brand-mark{
  width:38px; height:38px; flex-shrink:0;
  border-radius:11px;
  background: linear-gradient(150deg, var(--forest), var(--leaf));
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow);
}
.brand-mark span{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:19px;
  color:#fff;
}
.brand-name{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:21px;
  color:var(--forest);
  letter-spacing:-0.01em;
  line-height:1.1;
}
.brand-footer{
  margin-top:auto;
  padding:18px 4px 4px 4px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  opacity:.75;
  line-height:1.6;
}
.tab{
  position:relative;
  display:flex;
  align-items:center;
  gap:11px;
  border:none;
  cursor:pointer;
  text-align:left;
  padding:12px 16px 12px 16px;
  border-radius:12px 0 0 12px;
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:15px;
  color:var(--paper-2);
  background:var(--ink-soft);
  transform:translateX(0);
  transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
  box-shadow: 0 1px 0 rgba(0,0,0,0.05);
}
.tab-icon{width:19px; height:19px; flex-shrink:0; opacity:.92;}
.tab-icon svg{width:100%; height:100%; display:block;}
.tab-label{display:flex; flex-direction:column; line-height:1.25;}
.tab .sub{
  display:block;
  font-family:'Inter',sans-serif;
  font-weight:400;
  font-size:11px;
  opacity:.8;
  margin-top:2px;
}
.tab[data-c="dashboard"]{background:var(--forest);}
.tab[data-c="orto"]{background:var(--leaf);}
.tab[data-c="viaggio"]{background:var(--teal);}
.tab[data-c="grigliate"]{background:var(--rust);}
.tab[data-c="gomme"]{background:var(--mustard); color:#2b2110;}
.tab[data-c="finanze"]{background:var(--slate);}
.tab[data-c="condivisi"]{background:var(--plum);}
.tab.active{
  transform:translateX(14px);
  box-shadow: var(--shadow);
}
.tab:not(.active){opacity:.88;}
.tab:not(.active):hover{transform:translateX(6px); opacity:1;}

/* ---- Login screen ---- */
.login-screen{
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:var(--paper);
}
.login-card{
  background:var(--card); border:1px solid var(--line); border-radius:18px;
  box-shadow:var(--shadow); padding:36px 32px; width:100%; max-width:320px;
}
.login-label{
  display:block; font-family:'Inter',sans-serif; font-size:12.5px; color:var(--ink-soft);
  margin-bottom:16px; font-weight:600;
}
.login-label input{margin-top:7px;}
.login-error{color:var(--rust); font-size:12.5px; min-height:16px; margin-bottom:6px;}
.user-email{
  font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--forest); font-weight:600;
  word-break:break-all;
}

/* ---- Main content ---- */
main{
  flex:1;
  background:var(--paper-2);
  border-radius:28px 0 0 28px;
  margin:14px 14px 14px 0;
  box-shadow: var(--shadow);
  padding:38px 44px;
  overflow-x:hidden;
  min-width:0;
}
.section-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:26px;
  flex-wrap:wrap;
  gap:10px;
}
.section-head h1{
  font-size:30px;
  margin:0;
  color:var(--ink);
}
.section-head .tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:.06em;
}

button{font-family:'Inter',sans-serif;}
.btn{
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  padding:8px 14px;
  border-radius:9px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  transition: background .15s ease, transform .1s ease;
}
.btn:hover{background:#fff;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--forest); color:#fff; border-color:var(--forest);}
.btn.primary:hover{background:#294034;}
.btn.ghost{background:transparent; border:1px dashed var(--line);}
.btn.danger{color:var(--rust); border-color:var(--rust); background:transparent;}
.btn.small{padding:4px 9px; font-size:12px; border-radius:7px;}

.card{
  background:var(--card);
  border-radius:16px;
  padding:18px 20px;
  box-shadow: var(--shadow);
  border:1px solid var(--line);
  transition: box-shadow .2s ease;
}

input[type=text], textarea, input[type=date]{
  font-family:'Inter',sans-serif;
  border:1px solid var(--line);
  border-radius:8px;
  padding:7px 10px;
  font-size:14px;
  background:#fff;
  color:var(--ink);
  width:100%;
}
textarea{resize:vertical; min-height:50px;}

/* ---- Dashboard ---- */
.dash-grid{
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  gap:22px;
  align-items:start;
}
.week-table{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.day-row{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:14px;
  align-items:start;
}
.day-label{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:15px;
  color:var(--forest);
  padding-top:10px;
}
.day-card{padding:12px 14px;}
.task-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:5px 6px;
  margin:0 -6px;
  border-radius:7px;
  border-bottom:1px dashed var(--line);
  transition: background .15s ease;
}
.task-item:last-child{border-bottom:none;}
.task-item:hover{background:rgba(35,48,42,0.035);}
.task-item input[type=text]{border:none; background:transparent; padding:2px 0;}
.task-item input[type=text]:focus{outline:none; background:#fff;}
.task-item.done input[type=text]{text-decoration:line-through; color:var(--ink-soft);}
.task-item .del{cursor:pointer; color:var(--ink-soft); font-size:13px; opacity:.5;}
.task-item .del:hover{opacity:1; color:var(--rust);}
.add-line{
  display:flex; gap:8px; margin-top:8px;
}
.add-line input{flex:1;}

.side-stack{display:flex; flex-direction:column; gap:18px;}
.side-card h3{margin:0 0 10px 0; font-size:16px; display:flex; align-items:center; gap:8px;}
.side-card .dot{width:10px; height:10px; border-radius:50%; display:inline-block;}
.note-item{
  padding:6px 0; border-bottom:1px dashed var(--line);
  display:flex; gap:8px; align-items:flex-start;
}
.note-item:last-child{border-bottom:none;}
.note-item textarea{border:none; background:transparent; font-size:13.5px; padding:2px 0;}
.note-item textarea:focus{outline:none; background:#fff; border-radius:6px;}

/* ---- Orto board ---- */
.orto-toolbar{display:flex; gap:10px; margin-bottom:14px;}
.orto-board{
  position:relative;
  background:repeating-linear-gradient(0deg, var(--card), var(--card) 39px, var(--line) 40px);
  border-radius:14px;
  border:1px solid var(--line);
  height:520px;
  overflow:hidden;
  box-shadow: inset var(--shadow);
}
.bed{
  position:absolute;
  min-width:110px;
  min-height:70px;
  border-radius:10px;
  padding:8px 10px;
  color:#fff;
  font-size:13px;
  font-weight:600;
  cursor:grab;
  box-shadow: 0 3px 8px rgba(0,0,0,0.18);
  user-select:none;
}
.bed:active{cursor:grabbing;}
.bed .bed-date{font-family:'IBM Plex Mono',monospace; font-weight:400; font-size:11px; opacity:.9; margin-top:3px;}
.bed .bed-del{
  position:absolute; top:4px; right:6px; font-size:12px; opacity:.7; cursor:pointer;
}
.bed .bed-del:hover{opacity:1;}

/* ---- Checklist collections (viaggio / grigliate) ---- */
.collection{display:flex; gap:22px; align-items:flex-start;}
.coll-list{width:230px; flex-shrink:0; display:flex; flex-direction:column; gap:8px;}
.coll-item{
  padding:10px 12px; border-radius:10px; cursor:pointer;
  border:1px solid var(--line); background:var(--card); font-size:13.5px; font-weight:600;
}
.coll-item.active{background:var(--forest); color:#fff; border-color:var(--forest);}
.coll-detail{flex:1; min-width:0;}
.cat-block{margin-bottom:18px;}
.cat-block h4{margin:0 0 8px 0; font-size:14px; color:var(--forest); font-family:'Fraunces',serif;}
.check-item{display:flex; align-items:center; gap:8px; padding:4px 0;}
.check-item input[type=checkbox]{width:16px; height:16px; accent-color: var(--forest);}
.check-item.done label{text-decoration:line-through; color:var(--ink-soft);}
.check-item label{font-size:13.5px; flex:1;}

/* ---- Gomme table ---- */
table.tires{width:100%; border-collapse:collapse; font-size:13.5px;}
table.tires th{
  text-align:left; font-family:'Fraunces',serif; font-size:13px; color:var(--forest);
  border-bottom:2px solid var(--line); padding:8px 10px;
}
table.tires td{padding:6px 10px; border-bottom:1px solid var(--line); vertical-align:top;}
table.tires input[type=text], table.tires input[type=date]{font-size:13px; padding:4px 6px;}

.empty-hint{color:var(--ink-soft); font-size:13px; font-style:italic; padding:12px 0;}

/* ---- Empty states ---- */
.empty-state{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:40px 20px; text-align:center;
  border:1px dashed var(--line); border-radius:14px; background:var(--card);
  color:var(--ink-soft);
}
.empty-state .empty-icon{width:32px; height:32px; opacity:.5;}
.empty-state .empty-icon svg{width:100%; height:100%;}
.empty-state span{font-size:13px; font-style:italic; max-width:240px; line-height:1.5;}

/* ---- Stats bar ---- */
.stats-row{
  display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:26px;
}
.stat-card{
  background:var(--card); border-radius:14px; padding:16px 18px;
  box-shadow:var(--shadow); border:1px solid var(--line);
  border-left:4px solid var(--forest);
  transition: transform .15s ease, box-shadow .15s ease;
}
.stat-card:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(35,48,42,0.14); }
.stat-icon{width:19px; height:19px; margin-bottom:10px;}
.stat-icon svg{width:100%; height:100%; display:block;}
.stat-value{font-family:'Fraunces',serif; font-weight:700; font-size:21px; color:var(--ink); line-height:1.1;}
.stat-label{font-family:'Inter',sans-serif; font-size:11.5px; color:var(--ink-soft); margin-top:4px;}

/* ---- Finanze ---- */
.finance-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:22px; align-items:start;}
.finance-row{
  display:flex; align-items:center; gap:8px; padding:6px 0;
  border-bottom:1px dashed var(--line);
}
.finance-row:last-of-type{border-bottom:none;}
.finance-row input[type=text]{border:none; background:transparent; padding:2px 0;}
.finance-row input[type=text]:focus{outline:none; background:#fff; border-radius:6px;}
.finance-value{max-width:92px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13px;}
.net-summary{
  display:flex; align-items:center; flex-wrap:wrap; gap:16px;
  padding:20px 24px; margin-bottom:22px; border-left:4px solid var(--slate);
}
.net-label{font-family:'Fraunces',serif; font-size:15px; color:var(--ink-soft);}
.net-value{font-family:'Fraunces',serif; font-weight:700; font-size:27px; color:var(--slate);}
.history-row{
  display:flex; align-items:center; gap:12px; padding:7px 0;
  border-bottom:1px dashed var(--line); font-size:13.5px;
}
.history-row:last-child{border-bottom:none;}
.history-value{margin-left:auto; font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--slate);}

@media (max-width: 880px){
  .app{flex-direction:column;}
  .tabs{
    flex-direction:row; width:100%; padding:14px; gap:8px; overflow-x:auto;
  }
  .tabs .brand{display:none;}
  .tab{border-radius:10px; padding:9px 12px; white-space:nowrap;}
  .tab.active{transform:translateY(-4px);}
  main{margin:0; border-radius:20px 20px 0 0; padding:22px 18px;}
  .dash-grid{grid-template-columns:1fr;}
  .day-row{grid-template-columns:80px 1fr;}
  .collection{flex-direction:column;}
  .coll-list{width:100%; flex-direction:row; flex-wrap:wrap;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .finance-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-card">
    <div class="brand" style="justify-content:center;margin-bottom:20px;">
      <div class="brand-mark"><span>P</span></div>
      <div class="brand-name">Planner</div>
    </div>
    <label class="login-label">Email
      <input type="text" id="login-email" autocomplete="username" required>
    </label>
    <label class="login-label">Password
      <input type="password" id="login-password" autocomplete="current-password" required>
    </label>
    <div id="login-error" class="login-error"></div>
    <button type="submit" class="btn primary" style="width:100%;margin-top:6px;">Accedi</button>
  </form>
</div>
<div class="app" id="app-root" style="display:none;">
  <nav class="tabs" id="tabs">
    <div class="brand">
      <div class="brand-mark"><span>P</span></div>
      <div class="brand-name">Planner</div>
    </div>
    <button class="tab active" data-c="dashboard" data-tab="dashboard">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg></span>
      <span class="tab-label">Settimana<span class="sub">to-do &amp; note</span></span>
    </button>
    <button class="tab" data-c="orto" data-tab="orto">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M20 4C10 4 4 10 4 20c10 0 16-6 16-16Z"/><path d="M6 18C10 14 14 10 19 5" stroke-linecap="round"/></svg></span>
      <span class="tab-label">Orto<span class="sub">progetto Maiera</span></span>
    </button>
    <button class="tab" data-c="viaggio" data-tab="viaggio">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M3 13h18"/></svg></span>
      <span class="tab-label">Viaggi<span class="sub">checklist partenza</span></span>
    </button>
    <button class="tab" data-c="grigliate" data-tab="grigliate">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"><path d="M12 21c4 0 6-2.5 6-6 0-3-2-4.5-3-7 0 2-1.5 3-1.5 3S14 8 12 3c0 4-5 6-5 11 0 .5 0 1 .1 1.5C6.5 14 6 13 6 13c-.5 2 0 8 6 8Z"/></svg></span>
      <span class="tab-label">Grigliate<span class="sub">checklist &amp; note</span></span>
    </button>
    <button class="tab" data-c="gomme" data-tab="gomme">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg></span>
      <span class="tab-label">Gomme<span class="sub">manutenzione</span></span>
    </button>
    <button class="tab" data-c="finanze" data-tab="finanze">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19V13M9 19V9M14 19V14M19 19V6"/></svg></span>
      <span class="tab-label">Finanze<span class="sub">patrimonio netto</span></span>
    </button>
    <button class="tab" data-c="condivisi" data-tab="condivisi">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="3"/><circle cx="17" cy="8" r="3"/><path d="M3 20c0-3 2.5-5 5-5s5 2 5 5M11 20c0-3 2.5-5 6-5" stroke-linecap="round"/></svg></span>
      <span class="tab-label">Condivisi<span class="sub">insieme</span></span>
    </button>
    <div class="brand-footer">
      <div id="user-email" class="user-email"></div>
      <button id="logout-btn" class="btn ghost small" style="margin-top:8px;">Esci</button>
      <div style="margin-top:12px;">v0.3<br>by Antonio Calamo</div>
    </div>
  </nav>
  <main id="main"></main>
</div>

<script>
/* ---------------- storage helpers ---------------- */
const DEFAULTS = {
  dashboard: {
    week: {
      "Lunedì": [], "Martedì": [], "Mercoledì": [], "Giovedì": [],

      {id:"b3", name:"Melone", color:"#C68A2E", x:64, y:4, date:""}
    ]
  },
  trips: [],
  bbqs: [],
  tires: [],
  finance: { liquidity: [], nonliquid: [], debts: [], history: [] },
  sharedBoards: []
};
const SHARED_BOARD_TEMPLATE = () => [];

/* ---------------- icons ---------------- */
const ICON_EMPTY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M4 19V7a2 2 0 0 1 2-2h9l5 5v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 5v5h5"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4.5 4.5L19 7"/></svg>';
const ICON_SUITCASE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M9 8V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>';
const ICON_TIRE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>';
const ICON_COIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19V13M9 19V9M14 19V14M19 19V6"/></svg>';
const TRIP_TEMPLATE = () => ([
  {title:"All season", items:["Documenti e portafoglio","Caricatori e cavi","Beauty case","Cambio biancheria"].map(t=>({text:t, done:false}))},
  {title:"Se estate", items:["Costume","Crema solare","Occhiali da sole"].map(t=>({text:t, done:false}))},

function computeNetWorth(){
  const sum = arr => (arr||[]).reduce((s,i)=> s + (parseFloat(String(i.value).replace(",","."))||0), 0);
  return sum(state.finance.liquidity) + sum(state.finance.nonliquid) - sum(state.finance.debts);
}
function fmtEUR(n){
  return n.toLocaleString("it-IT",{style:"currency", currency:"EUR", maximumFractionDigits:0});
}
function computeStats(){
  let total=0, done=0;
  Object.values(state.dashboard.week).forEach(arr=>{ arr.forEach(t=>{ total++; if(t.done) done++; }); });
  const pct = total ? Math.round(done/total*100) : 0;
  const activeChecklists = state.trips.length + state.bbqs.length;
  let lastTire = "—";
  const dated = state.tires.filter(t=>t.data).sort((a,b)=> new Date(b.data)-new Date(a.data));
  if(dated.length) lastTire = new Date(dated[0].data).toLocaleDateString("it-IT");
  return { pct, activeChecklists, lastTire, net: computeNetWorth() };
}

function el(tag, attrs={}, children=[]){
  const n = document.createElement(tag);
  for(const k in attrs){
    if(k === "class") n.className = attrs[k];
    else if(k.startsWith("on")) n.addEventListener(k.slice(2), attrs[k]);
    else if(k === "html") n.innerHTML = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return n;
}

function makeDraggable(node, bed, board){
  node.addEventListener("pointerdown",(e)=>{
    if(e.target.tagName === "INPUT" || e.target.classList.contains("bed-del")) return;
    e.preventDefault();
    node.setPointerCapture(e.pointerId);
    const rect = board.getBoundingClientRect();
    function move(ev){
      let x = ((ev.clientX - rect.left) / rect.width) * 100;
      let y = ((ev.clientY - rect.top) / rect.height) * 100;
      x = Math.max(0, Math.min(88, x)); y = Math.max(0, Math.min(88, y));
      node.style.left = x+"%"; node.style.top = y+"%";
      bed.x = x; bed.y = y;
    }
    function up(){
      node.removeEventListener("pointermove", move);
      node.removeEventListener("pointerup", up);
      store.set("orto", state.orto);
    }
    node.addEventListener("pointermove", move);
    node.addEventListener("pointerup", up);
  });
}

function renderSharedBoardDetail(detail, board){
  const block = el("div",{class:"cat-block"});
  block.appendChild(el("h4",{},"Voci"));
  board.data.forEach((it,i)=>{
    const row = el("div",{class:"check-item"+(it.done?" done":"")});
    const cb = el("input",{type:"checkbox", id:"s"+board.id+i});
    cb.checked = it.done;
    cb.addEventListener("change", ()=>{ it.done=cb.checked; store.set("sharedBoards", state.sharedBoards); render("condivisi"); });
    const lab = el("label",{for:"s"+board.id+i}, it.text);
    const del = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
    del.addEventListener("click", ()=>{ board.data.splice(i,1); store.set("sharedBoards", state.sharedBoards); render("condivisi"); });
    row.appendChild(cb); row.appendChild(lab); row.appendChild(del);
    block.appendChild(row);
  });
  const addLine = el("div",{class:"add-line"});
  const input = el("input",{type:"text", placeholder:"aggiungi voce…"});
  input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && input.value.trim()){
      board.data.push({text:input.value.trim(), done:false});
      store.set("sharedBoards", state.sharedBoards); render("condivisi");
    }
  });
  addLine.appendChild(input);
  block.appendChild(addLine);
  detail.appendChild(block);
}

/* ---------------- render dispatcher ---------------- */
function clear(main){ main.innerHTML=""; return main; }
function render(tab){
  const main = clear(document.getElementById("main"));
  if(tab==="dashboard") renderDashboard(main);
  else if(tab==="orto") renderOrto(main);
  else if(tab==="viaggio") renderCollection(main, {
    key:"trips", tab:"viaggio", title:"Checklist viaggio", active:activeTrip,
    setActive:(id)=>activeTrip=id, template:TRIP_TEMPLATE, renderDetail:renderTripDetail
  });
  else if(tab==="grigliate") renderCollection(main, {
    key:"bbqs", tab:"grigliate", title:"Checklist grigliate", active:activeBbq,
    setActive:(id)=>activeBbq=id, template:BBQ_TEMPLATE, renderDetail:renderBbqDetail
  });
  else if(tab==="gomme") renderGomme(main);
  else if(tab==="finanze") renderFinanze(main);
  else if(tab==="condivisi") renderCollection(main, {
    key:"sharedBoards", tab:"condivisi", title:"Board condivise", active:activeSharedBoard,
    setActive:(id)=>activeSharedBoard=id, template:SHARED_BOARD_TEMPLATE, renderDetail:renderSharedBoardDetail
  });
}

initAuth();
