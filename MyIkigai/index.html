function buildDayRow(main, dateStr, isToday, isHistory){
  if(!state.dashboard.days[dateStr]) state.dashboard.days[dateStr] = [];
  const dayName = weekdayNameFromDate(dateStr);
  const tasks = state.dashboard.days[dateStr];
  const dayCard = el("div",{class:"card day-card"+(isHistory?" day-card-history":""), style:`--day-color:${DAY_COLORS[dayName]}`});
  tasks.forEach((t,i)=>{
    if(state.dashboard.showCompleted===false && t.done) return;
    dayCard.appendChild(renderTaskBlock(main, dateStr, t, i));
  });
  if(!isHistory){
    const addLine = el("div",{class:"add-line"});
    const input = el("input",{type:"text", placeholder:"aggiungi task… (Tab per sotto-task)", "data-day":dateStr, enterkeyhint:"done"});
    input.addEventListener("keydown", (e)=>{
      if(e.key==="Enter" && input.value.trim()){
        const newTask = {text:input.value.trim(), done:false, subtasks:[]};
        state.dashboard.days[dateStr].push(newTask);
        lastTaskByDay[dateStr] = newTask;
        store.set(privKey("dashboard"), state.dashboard);
        renderDashboard(clear(main));
        focusAddInput(dateStr);
      } else if(e.key==="Tab" && input.value.trim()){
        e.preventDefault();
        const parent = lastTaskByDay[dateStr];
        if(parent){
          if(!parent.subtasks) parent.subtasks = [];
          parent.subtasks.push({text:input.value.trim(), done:false});
          syncParentDone(parent);
        } else {
          state.dashboard.days[dateStr].push({text:input.value.trim(), done:false, subtasks:[]});
        }
        store.set(privKey("dashboard"), state.dashboard);
        renderDashboard(clear(main));
        focusAddInput(dateStr);
      }
    });
    addLine.appendChild(input);
    dayCard.appendChild(addLine);
    attachDayCardDrop(dayCard, dateStr);
  }
  const rowClass = "day-row"+(isToday?" today":"")+(isHistory?" day-row-history":"");
  const label = dayName+" "+fmtDayLabel(dateStr)+(isToday?" · oggi":"");
  return el("div",{class:rowClass},[el("div",{class:"day-label"},label), dayCard]);
}

let activeCommentId = null;
let selectedOrtoObjId = null;
let ortoZoom = 1;
const ORTO_CANVAS_W = 1800, ORTO_CANVAS_H = 1100;
let ortoClipboard = null;
let ortoKeyListenerAttached = false;
function ensureOrtoKeyListener(){
  if(ortoKeyListenerAttached) return;
  ortoKeyListenerAttached = true;
  document.addEventListener("keydown",(e)=>{
    if(currentRenderedTab !== "orto") return;
    const tag = document.activeElement ? document.activeElement.tagName : "";
    if(tag==="INPUT" || tag==="TEXTAREA") return; // non rubare copia/incolla/canc nei campi di testo
    if(e.key==="Delete" || e.key==="Backspace"){
      if(!selectedOrtoObjId) return;
      e.preventDefault();
      const obj = state.orto.objects.find(o=>o.id===selectedOrtoObjId);
      if(obj){
        state.orto.objects = state.orto.objects.filter(o=>o.id!==selectedOrtoObjId);
        selectedOrtoObjId = null;
        store.set("orto", state.orto); render("orto");
      }
      return;
    }
    const mod = e.ctrlKey || e.metaKey;
    if(!mod) return;
    const key = e.key.toLowerCase();
    if(key==="c"){
      if(!selectedOrtoObjId) return;
      const obj = state.orto.objects.find(o=>o.id===selectedOrtoObjId);
      if(obj){ ortoClipboard = JSON.parse(JSON.stringify(obj)); }
    } else if(key==="v"){
      if(!ortoClipboard) return;
      e.preventDefault();
      const allZ = state.orto.objects.map(o=>o.z||0);
      const newObj = JSON.parse(JSON.stringify(ortoClipboard));
      newObj.id = "o"+Date.now();
      newObj.x = Math.min(88, (ortoClipboard.x||0)+4);
      newObj.y = Math.min(88, (ortoClipboard.y||0)+4);
      newObj.z = allZ.length ? Math.max(...allZ)+1 : 1;
      state.orto.objects.push(newObj);
      selectedOrtoObjId = newObj.id;
      store.set("orto", state.orto); render("orto");
    }
  });
}
const ORTO_SEASON_ORDER = ["Primavera","Estate","Autunno","Inverno"];
function ortoSeasonFromDate(dateStr){
  if(!dateStr) return "Primavera";
  const m = parseInt(dateStr.slice(5,7),10);
  if(m>=3 && m<=5) return "Primavera";
  if(m>=6 && m<=8) return "Estate";
  if(m>=9 && m<=11) return "Autunno";
  return "Inverno";
}
function findContainingBedIdIn(objects, obj){
  // trova l'aiuola (letto rialzato) il cui rettangolo contiene il centro della pianta, in un dato
  // insieme di oggetti (la board attuale, oppure la fotografia congelata di una stagione passata)
  const cx = (obj.x||0) + (obj.w||130)/2;
  const cy = (obj.y||0) + (obj.h||82)/2;
  const bed = (objects||[]).find(o=>{
    if(!(o.type==="coltura" && !o.plantKind)) return false;
    return cx>=o.x && cx<=o.x+(o.w||280) && cy>=o.y && cy<=o.y+(o.h||180);
  });
  return bed ? bed.id : null;
}
function getActiveOrtoSeason(){
  return (state.orto.seasons||[]).find(s=>!s.frozenAt) || null;
}
function nextOrtoSeasonLabel(year, season){
  const idx = ORTO_SEASON_ORDER.indexOf(season);
  if(idx===-1 || idx===ORTO_SEASON_ORDER.length-1) return {year:year+1, season:ORTO_SEASON_ORDER[0]};
  return {year, season:ORTO_SEASON_ORDER[idx+1]};
}
function startOrtoSeason(year, season){
  if(!state.orto.seasons) state.orto.seasons = [];
  const s = {id:"se"+Date.now()+Math.round(Math.random()*999), year, season, startedAt:new Date().toISOString().slice(0,10), frozenAt:null, snapshot:null};
  state.orto.seasons.push(s);
  store.set("orto", state.orto);
  return s;
}
function freezeAndAdvanceOrtoSeason(){
  const active = getActiveOrtoSeason();
  if(!active) return;
  active.snapshot = JSON.parse(JSON.stringify(state.orto.objects||[]));
  active.frozenAt = new Date().toISOString().slice(0,10);
  const next = nextOrtoSeasonLabel(active.year, active.season);
  startOrtoSeason(next.year, next.season);
}
function bedRotationWarning(bedObj){
  // guarda le ultime 2 stagioni congelate: se una famiglia coltivata lì di recente
  // corrisponde a una pianta attualmente presente nella stessa aiuola, avvisa
  const frozen = (state.orto.seasons||[]).filter(s=>s.frozenAt && s.snapshot)
    .sort((a,b)=> (b.frozenAt||"").localeCompare(a.frozenAt||"")).slice(0,2);
  if(!frozen.length) return null;
  const recentFamilies = new Set();
  frozen.forEach(s=>{
    (s.snapshot||[]).filter(o=>o.type==="coltura" && o.plantKind).forEach(p=>{
      if(findContainingBedIdIn(s.snapshot, p)===bedObj.id){
        const def = ORTO_PLANTS.find(x=>x.key===p.plantKind);
        if(def) recentFamilies.add(def.family);
      }
    });
  });
  if(!recentFamilies.size) return null;
  const currentPlants = state.orto.objects.filter(o=>o.type==="coltura" && o.plantKind && findContainingBedIdIn(state.orto.objects, o)===bedObj.id);
  for(const p of currentPlants){
    const def = ORTO_PLANTS.find(x=>x.key===p.plantKind);
    if(def && recentFamilies.has(def.family)) return {family:def.family, plantName:def.label};
  }
  return null;
}

function suggestNextOrtoSeason(){
  const all = (state.orto.seasons||[]).slice().sort((a,b)=> (a.startedAt||"").localeCompare(b.startedAt||""));

    const last = all[all.length-1];
    return nextOrtoSeasonLabel(last.year, last.season);

  return {year:new Date().getFullYear(), season: ortoSeasonFromDate(today)};
}

function makeDraggable(handleEl, item, board, opts={}){
  const GRID_PX = 20;
  const moveTarget = opts.moveTarget || handleEl;
  const isPin = !!opts.isPin;
  const onTap = opts.onTap;
  handleEl.addEventListener("pointerdown",(e)=>{
    if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "BUTTON" ||
       e.target.closest(".orto-ctrl")) return;
    e.preventDefault();
    handleEl.setPointerCapture(e.pointerId);
    const startClientX = e.clientX, startClientY = e.clientY;
    const startLeft = item.x||0, startTop = item.y||0;
    const elemW = moveTarget.offsetWidth||0, elemH = moveTarget.offsetHeight||0;
    const maxX = isPin ? (ORTO_CANVAS_W-24) : Math.max(0, ORTO_CANVAS_W-elemW);
    const maxY = isPin ? (ORTO_CANVAS_H-24) : Math.max(0, ORTO_CANVAS_H-elemH);
    let moved = false;
    function move(ev){
      if(Math.abs(ev.clientX-startClientX)>4 || Math.abs(ev.clientY-startClientY)>4) moved = true;
      // il mouse si muove in pixel schermo: va riportato in pixel del canvas dividendo per lo zoom corrente
      const dx = (ev.clientX-startClientX)/ortoZoom, dy = (ev.clientY-startClientY)/ortoZoom;
      let x = startLeft + dx, y = startTop + dy;
      x = Math.round(x/GRID_PX)*GRID_PX;
      y = Math.round(y/GRID_PX)*GRID_PX;
      x = Math.max(0, Math.min(maxX, x)); y = Math.max(0, Math.min(maxY, y));
      moveTarget.style.left = x+"px"; moveTarget.style.top = y+"px";
      item.x = x; item.y = y;
    }
    function up(){
      handleEl.removeEventListener("pointermove", move);
      handleEl.removeEventListener("pointerup", up);
      store.set("orto", state.orto);
      if(!moved && onTap) onTap();
    }
    handleEl.addEventListener("pointermove", move);
    handleEl.addEventListener("pointerup", up);
  });
}
function bringOrtoObjToFront(item, node){
  const all = (state.orto.objects||[]).concat(state.orto.comments||[]);
  const maxZ = all.reduce((m,o)=>Math.max(m, o.z||0), 0);
  if((item.z||0) <= maxZ){
    item.z = maxZ + 1;
    store.set("orto", state.orto);
  }
  if(node) node.style.zIndex = String(item.z||1);
}
function sendOrtoObjToBack(item, node){
  const all = (state.orto.objects||[]).concat(state.orto.comments||[]);
  // rinumera tutti gli altri +1 e porta questo a 0, così non si scende mai sotto zero
  // (uno z-index negativo lo renderebbe invisibile dietro lo sfondo opaco della board)
  all.forEach(o=>{ if(o!==item) o.z = (o.z||0) + 1; });
  item.z = 0;
  store.set("orto", state.orto);
  if(node) node.style.zIndex = String(item.z);
}
function makeResizable(handle, node, obj, board, onResize, corner){
  const GRID_PX = 20;
  const MIN_W = 56, MIN_H = 48;
  const leftEdge = corner==="bl" || corner==="tl";
  const topEdge = corner==="tl" || corner==="tr";
  handle.addEventListener("pointerdown",(e)=>{
    e.preventDefault(); e.stopPropagation();
    handle.setPointerCapture(e.pointerId);
    const startX = e.clientX, startY = e.clientY;
    const startW = obj.w||130, startH = obj.h||82;
    const startLeft = obj.x||0, startTop = obj.y||0;
    function move(ev){
      // il mouse si muove in pixel schermo: va riportato in pixel del canvas dividendo per lo zoom corrente
      const dx = (ev.clientX-startX)/ortoZoom, dy = (ev.clientY-startY)/ortoZoom;
      let w, h, left = startLeft, top = startTop;
      if(leftEdge){
        w = Math.max(MIN_W, startW - dx);
        left = startLeft + (startW - w);
      } else {
        w = Math.max(MIN_W, startW + dx);
      }
      if(topEdge){
        h = Math.max(MIN_H, startH - dy);
        top = startTop + (startH - h);
      } else {
        h = Math.max(MIN_H, startH + dy);
      }
      w = Math.round(w/GRID_PX)*GRID_PX;
      h = Math.round(h/GRID_PX)*GRID_PX;
      left = Math.round(left/GRID_PX)*GRID_PX;
      top = Math.round(top/GRID_PX)*GRID_PX;
      node.style.width = w+"px"; node.style.height = h+"px";
      node.style.left = left+"px"; node.style.top = top+"px";
      obj.w = w; obj.h = h;
      obj.x = left; obj.y = top;
      if(onResize) onResize(w,h);
    }
    function up(){
      handle.removeEventListener("pointermove", move);
      handle.removeEventListener("pointerup", up);
      store.set("orto", state.orto);
      if(onResize) onResize(obj.w, obj.h);
    }
    handle.addEventListener("pointermove", move);
    handle.addEventListener("pointerup", up);
  });
}
function addOrtoResizeHandles(node, obj, board, onResize){
  // 3 maniglie: in alto a sx, in basso a sx, in basso a dx — non in alto a dx dove c'è la ✕
  [["tl","orto-resize-tl"],["bl","orto-resize-bl"],["br","orto-resize-br"]].forEach(([corner,cls])=>{
    const h = el("span",{class:"orto-obj-resize orto-ctrl "+cls});
    node.appendChild(h);
    makeResizable(h, node, obj, board, onResize, corner);
  });
}

  if(!item.id) item.id = idPrefix+"-"+i+"-"+Math.random().toString(36).slice(2,7);
  const row = el("div",{class:"check-item pack-item"+(item.done?" done":"")+(item.take===false?" not-needed":"")});
  const grip = el("span",{class:"drag-grip", html:ICON_GRIP});
  const numInp = el("input",{type:"text", class:"pack-num", value:item.num||"", placeholder:"#"});
  numInp.addEventListener("change", ()=>{ item.num=numInp.value; onSave(false); });
  const cb = el("input",{type:"checkbox", id:idPrefix+i});
  cb.checked = item.done;
  cb.addEventListener("change", ()=>{ item.done=cb.checked; onSave(true); });
  const takeBtn = el("span",{class:"take-flag"+(item.take!==false?" active":""), html:ICON_CHECK, title:"Da prendere"});
  takeBtn.addEventListener("pointerdown", (e)=>{ e.preventDefault(); e.stopPropagation(); item.take = !item.take; onSave(); });
  const txt = el("textarea",{rows:"1", class:"pack-text", "data-packid":item.id}); txt.value = item.text;
  txt.addEventListener("input", ()=>{ autoResize(txt); item.text = txt.value; });
  txt.addEventListener("change", ()=>{ item.text = txt.value; onSave(false); });
  txt.addEventListener("keydown",(e)=>{
    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      item.text = txt.value;
      const newItem = {id:"pk"+Date.now()+Math.random().toString(36).slice(2,5), text:"", done:false, take:true};
      arr.splice(i+1, 0, newItem);
      onSave();
      const nta = document.querySelector('[data-packid="'+newItem.id+'"]');
      if(nta) nta.focus();
    }
  });
  const del = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
  del.addEventListener("click", ()=>{
    arr.splice(i,1); onSave();
  });
  row.appendChild(grip); row.appendChild(numInp); row.appendChild(cb); row.appendChild(takeBtn); row.appendChild(txt); row.appendChild(del);
  attachRowDrag(grip, row, i, arr, onSave);
  row.addEventListener("click", (e)=>{
    if(e.target===cb || e.target===txt || e.target===numInp || e.target===del || e.target===takeBtn || e.target===grip) return;
    if(grip.contains(e.target) || takeBtn.contains(e.target) || del.contains(e.target)) return;
    cb.checked = !cb.checked;
    item.done = cb.checked;
    onSave(true);
  });
  return row;
}

/* ---------------- Progetti: vista Gantt nativa ---------------- */
const GANTT_PX_PER_DAY = 28;
const GANTT_ROW_H = 40;
function ganttDateToOffset(dateStr, rangeStart){
  const d = new Date(dateStr+"T00:00:00");
  const diff = Math.round((d - rangeStart) / 86400000);
  return diff;
}
function ganttOffsetToDate(offset, rangeStart){
  return addDaysISO(rangeStart, offset);
}
function ganttComputeRange(tasks){
  const today = new Date(); today.setHours(0,0,0,0);
  let min = addDaysISO(today, -3), max = addDaysISO(today, 21);
  tasks.forEach(t=>{
    if(t.start && t.start < min) min = t.start;
    if(t.end && t.end > max) max = t.end;
  });
  // aggiungiamo un piccolo margine visivo
  min = addDaysISO(new Date(min+"T00:00:00"), -2);
  max = addDaysISO(new Date(max+"T00:00:00"), 4);
  const rangeStart = new Date(min+"T00:00:00");
  const totalDays = Math.max(14, Math.round((new Date(max+"T00:00:00") - rangeStart)/86400000) + 1);
  return { rangeStart, totalDays };
}
function ganttSave(project){ store.set("projects", state.projects); }
function openProjectTaskModal(project, task, save){
  openModal((modal, close)=>{
    modal.appendChild(el("h3",{}, task.id ? "Modifica attività" : "Nuova attività"));
    modal.appendChild(el("div",{class:"field-label"},"Nome"));

    const startInp = el("input",{type:"date", value:task.start});
    startWrap.appendChild(startInp);
    const endWrap = el("div",{style:"flex:1;"});
    endWrap.appendChild(el("div",{class:"field-label"},"Fine"));
    const endInp = el("input",{type:"date", value:task.end});
    endWrap.appendChild(endInp);
    dateRow.appendChild(startWrap); dateRow.appendChild(endWrap);
    modal.appendChild(dateRow);
    modal.appendChild(el("div",{class:"field-label"},"Avanzamento ("+ (task.progress||0) +"%)"));
    const progRow = el("div",{style:"display:flex; align-items:center; gap:10px;"});
    const progInp = el("input",{type:"range", min:"0", max:"100", step:"5", value:String(task.progress||0), style:"flex:1;"});
    const progLabel = el("span",{style:"font-size:12px; font-family:'IBM Plex Mono',monospace; width:36px; text-align:right;"}, (task.progress||0)+"%");
    progInp.addEventListener("input", ()=>{ progLabel.textContent = progInp.value+"%"; });
    progRow.appendChild(progInp); progRow.appendChild(progLabel);
    modal.appendChild(progRow);
    modal.appendChild(el("div",{class:"field-label"},"Colore"));
    const colorPicker = el("div",{class:"color-picker"});
    let selColor = task.color || currentTabPalette()[0];
    currentTabPalette().forEach(c=>{
      const dot = el("div",{class:"color-choice"+(c===selColor?" selected":"")});
      dot.style.background = c;
      dot.addEventListener("click", ()=>{
        colorPicker.querySelectorAll(".color-choice").forEach(d=>d.classList.remove("selected"));
        dot.classList.add("selected"); selColor = c;
      });
      colorPicker.appendChild(dot);
    });
    modal.appendChild(colorPicker);
    const actions = el("div",{class:"modal-actions"});
    if(task.id){
      const delBtn = el("button",{class:"btn danger small", style:"margin-right:auto;"},"Elimina");
      delBtn.addEventListener("click", ()=>{
        project.data.tasks = project.data.tasks.filter(t=>t.id!==task.id);
        ganttSave(project); close(); render("progetti");
      });
      actions.appendChild(delBtn);
    }
    const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
    cancelBtn.addEventListener("click", close);
    const saveBtn = el("button",{class:"btn primary"},"Salva");
    saveBtn.addEventListener("click", ()=>{
      if(!nameInp.value.trim() || !startInp.value || !endInp.value) return;
      let s = startInp.value, e = endInp.value;
      if(e < s) e = s;
      task.name = nameInp.value.trim();
      task.start = s; task.end = e;
      task.progress = parseInt(progInp.value,10)||0;
      task.done = task.progress >= 100;
      task.color = selColor;
      if(!task.id){ task.id = "pt"+Date.now(); project.data.tasks.push(task); }
      ganttSave(project); close(); render("progetti");
    });
    actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
    modal.appendChild(actions);
    nameInp.focus();
  });
}
function renderProjectDetail(detail, project){
  const tasks = project.data.tasks;
  const totalPct = tasks.length ? Math.round(tasks.reduce((s,t)=>s+(t.progress||0),0)/tasks.length) : 0;

  const head = el("div",{class:"gantt-head-row"});
  head.appendChild(el("div",{class:"gantt-progress-summary"},
    tasks.length ? ("Avanzamento medio: "+totalPct+"% su "+tasks.length+(tasks.length===1?" attività":" attività")) : "Nessuna attività ancora."));
  const addBtn = el("button",{class:"btn primary small"}, "+ Nuova attività");
  addBtn.addEventListener("click", ()=>{
    const todayIso = isoDate(new Date());
    openProjectTaskModal(project, {name:"", start:todayIso, end:addDaysISO(new Date(),3), progress:0}, ganttSave);
  });
  head.appendChild(addBtn);
  detail.appendChild(head);

  if(!tasks.length){
    detail.appendChild(emptyState("Aggiungi la prima attività per iniziare a costruire il piano.", ICON_CHECK));
    return;
  }

  const { rangeStart, totalDays } = ganttComputeRange(tasks);
  const chartWidth = totalDays * GANTT_PX_PER_DAY;
  const todayOffset = ganttDateToOffset(isoDate(new Date()), rangeStart);

  const ganttWrap = el("div",{class:"gantt-wrap"});
  const labelsCol = el("div",{class:"gantt-labels-col"});
  labelsCol.appendChild(el("div",{class:"gantt-labels-header"}, ""));
  const scrollArea = el("div",{class:"gantt-scroll"});
  const chartInner = el("div",{class:"gantt-chart-inner", style:`width:${chartWidth}px;`});

  // header con mesi e giorni
  const headerRow = el("div",{class:"gantt-header", style:`width:${chartWidth}px;`});
  let d = new Date(rangeStart);
  let monthStartOffset = 0, curMonthLabel = "";
  const monthsRow = el("div",{class:"gantt-months", style:`width:${chartWidth}px;`});
  const daysRow = el("div",{class:"gantt-days", style:`width:${chartWidth}px;`});
  for(let i=0;i<totalDays;i++){
    const cellDate = new Date(rangeStart); cellDate.setDate(cellDate.getDate()+i);
    const monthLabel = cellDate.toLocaleDateString("it-IT",{month:"short", year:"2-digit"});
    if(monthLabel !== curMonthLabel){
      if(curMonthLabel){
        monthsRow.appendChild(el("div",{class:"gantt-month-seg", style:`width:${(i-monthStartOffset)*GANTT_PX_PER_DAY}px;`}, curMonthLabel));
      }
      curMonthLabel = monthLabel; monthStartOffset = i;
    }
    const isWeekend = cellDate.getDay()===0 || cellDate.getDay()===6;
    daysRow.appendChild(el("div",{class:"gantt-day-cell"+(isWeekend?" weekend":""), style:`width:${GANTT_PX_PER_DAY}px;`}, String(cellDate.getDate())));
  }
  monthsRow.appendChild(el("div",{class:"gantt-month-seg", style:`width:${(totalDays-monthStartOffset)*GANTT_PX_PER_DAY}px;`}, curMonthLabel));
  headerRow.appendChild(monthsRow); headerRow.appendChild(daysRow);
  chartInner.appendChild(headerRow);

  const bodyWrap = el("div",{class:"gantt-body", style:`width:${chartWidth}px; height:${tasks.length*GANTT_ROW_H}px;`});
  // linea "oggi"
  if(todayOffset >= 0 && todayOffset <= totalDays){
    bodyWrap.appendChild(el("div",{class:"gantt-today-line", style:`left:${todayOffset*GANTT_PX_PER_DAY}px; height:${tasks.length*GANTT_ROW_H}px;`}));
  }
  chartInner.appendChild(bodyWrap);
  scrollArea.appendChild(chartInner);

  tasks.forEach((t,i)=>{
    // riga etichetta
    const labelRow = el("div",{class:"gantt-label-row", style:`height:${GANTT_ROW_H}px;`});
    const nameSpan = el("span",{class:"gantt-task-name"+(t.done?" done":"")}, t.name);
    labelRow.appendChild(nameSpan);
    labelRow.addEventListener("click", ()=> openProjectTaskModal(project, t, ganttSave));
    labelsCol.appendChild(labelRow);

    // barra
    const startOff = ganttDateToOffset(t.start, rangeStart);
    const endOff = ganttDateToOffset(t.end, rangeStart);
    const durDays = Math.max(1, endOff-startOff+1);
    const bar = el("div",{class:"gantt-bar"+(t.done?" done":""), style:
      `left:${startOff*GANTT_PX_PER_DAY}px; top:${i*GANTT_ROW_H+7}px; width:${durDays*GANTT_PX_PER_DAY - 4}px; background:${t.color||"var(--forest)"};`});
    const fill = el("div",{class:"gantt-bar-fill", style:`width:${Math.min(100,t.progress||0)}%;`});
    bar.appendChild(fill);
    bar.appendChild(el("span",{class:"gantt-bar-label"}, t.name));
    const leftHandle = el("span",{class:"gantt-handle gantt-handle-l"});
    const rightHandle = el("span",{class:"gantt-handle gantt-handle-r"});
    bar.appendChild(leftHandle); bar.appendChild(rightHandle);
    bodyWrap.appendChild(bar);

    let dragMoved = false;
    // trascinamento dell'intera barra (sposta inizio e fine mantenendo la durata)
    bar.addEventListener("pointerdown",(e)=>{
      if(e.target===leftHandle || e.target===rightHandle) return;
      e.preventDefault();
      bar.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      dragMoved = false;
      function move(ev){
        const deltaPx = ev.clientX - startX;
        if(Math.abs(deltaPx) > 4) dragMoved = true;
        const deltaDays = Math.round(deltaPx / GANTT_PX_PER_DAY);
        bar.style.left = ((startOff+deltaDays)*GANTT_PX_PER_DAY)+"px";
        bar._pendingDelta = deltaDays;
      }
      function up(){
        bar.removeEventListener("pointermove", move);
        bar.removeEventListener("pointerup", up);
        const deltaDays = bar._pendingDelta||0;
        if(deltaDays!==0){
          t.start = ganttOffsetToDate(startOff+deltaDays, rangeStart);
          t.end = ganttOffsetToDate(endOff+deltaDays, rangeStart);
          ganttSave(project);
        }
        if(!dragMoved){ openProjectTaskModal(project, t, ganttSave); }
        else { render("progetti"); }
      }
      bar.addEventListener("pointermove", move);
      bar.addEventListener("pointerup", up);
    });
    // ridimensiona da sinistra: cambia data inizio
    leftHandle.addEventListener("pointerdown",(e)=>{
      e.preventDefault(); e.stopPropagation();
      leftHandle.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      function move(ev){
        const deltaDays = Math.round((ev.clientX-startX)/GANTT_PX_PER_DAY);
        const newStartOff = Math.min(endOff, startOff+deltaDays);
        bar.style.left = (newStartOff*GANTT_PX_PER_DAY)+"px";
        bar.style.width = ((endOff-newStartOff+1)*GANTT_PX_PER_DAY-4)+"px";
        bar._pendingStartOff = newStartOff;
      }
      function up(){
        leftHandle.removeEventListener("pointermove", move);
        leftHandle.removeEventListener("pointerup", up);
        if(bar._pendingStartOff!=null){
          t.start = ganttOffsetToDate(bar._pendingStartOff, rangeStart);
          ganttSave(project); render("progetti");
        }
      }
      leftHandle.addEventListener("pointermove", move);
      leftHandle.addEventListener("pointerup", up);
    });
    // ridimensiona da destra: cambia data fine
    rightHandle.addEventListener("pointerdown",(e)=>{
      e.preventDefault(); e.stopPropagation();
      rightHandle.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      function move(ev){
        const deltaDays = Math.round((ev.clientX-startX)/GANTT_PX_PER_DAY);
        const newEndOff = Math.max(startOff, endOff+deltaDays);
        bar.style.width = ((newEndOff-startOff+1)*GANTT_PX_PER_DAY-4)+"px";
        bar._pendingEndOff = newEndOff;
      }
      function up(){
        rightHandle.removeEventListener("pointermove", move);
        rightHandle.removeEventListener("pointerup", up);
        if(bar._pendingEndOff!=null){
          t.end = ganttOffsetToDate(bar._pendingEndOff, rangeStart);
          ganttSave(project); render("progetti");
        }
      }
      rightHandle.addEventListener("pointermove", move);
      rightHandle.addEventListener("pointerup", up);
    });
  });

  ganttWrap.appendChild(labelsCol);
  ganttWrap.appendChild(scrollArea);
  detail.appendChild(ganttWrap);
}

    });
    lastTd.appendChild(del);
    const rowHandle = el("span",{class:"row-resize-handle"});
    rowHandle.addEventListener("pointerdown",(e)=>{
      e.preventDefault();
      rowHandle.setPointerCapture(e.pointerId);
      const startY = e.clientY;
      const startH = tr.offsetHeight;
      function move(ev){
        const h = Math.max(28, startH + (ev.clientY - startY));
        tr.style.height = h+"px";
        layout.rowHeights[row.id] = h;
      }
      function up(){
        rowHandle.removeEventListener("pointermove", move);
        rowHandle.removeEventListener("pointerup", up);
        store.set(privKey("gommeLayout"), layout);
      }
      rowHandle.addEventListener("pointermove", move);
      rowHandle.addEventListener("pointerup", up);
    });
    lastTd.appendChild(rowHandle);
    tr.appendChild(lastTd);
    table.appendChild(tr);
  });
  wrap.appendChild(table);
  main.appendChild(wrap);
}

const AMORT_TYPES = {
  capitale: { label:"Capitale residuo (mutuo)", valueLabel:"Capitale residuo" },
  interessi: { label:"Interessi passivi residui", valueLabel:"Interessi residui" },
  deprezzamento: { label:"Deprezzamento bene (es. auto)", valueLabel:"Valore residuo" },
  rivalutazione: { label:"Rivalutazione bene (es. immobile)", valueLabel:"Valore attuale" }
};
function computeAmortValue(am){
  if(am.type==="interessi"){
    return am.rows.slice(am.idx).reduce((s,r)=>s+(r.intQuota||0), 0);
  }
  return am.rows[am.idx].capResiduo;
}

function renderFinanceChart(fullHistory){
  // storico in ordine cronologico crescente (il più vecchio per primo)
  const chronological = fullHistory.slice().reverse();
  let data = chronological;
  if(financeChartWindow !== "all"){
    const months = parseInt(financeChartWindow,10);
    const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth()-months);
    data = chronological.filter(row=>{
      const d = parseItDate(row.date);
      return !d || d >= cutoff;
    });
  }
  if(data.length < 2){
    return emptyState("Salva almeno due snapshot nella finestra selezionata per vedere il grafico del trend.", ICON_COIN);
  }
  const series = [
    {key:"liquidity", color:"#6FBF73", label:"Liquidità"},
    {key:"nonliquid", color:"#2E5E3A", label:"Non liquidi"},
    {key:"debts", color:"#C1584C", label:"Debiti"},
    {key:"net", color:"#4472A8", label:"Patrimonio netto"}
  ];
  const visibleSeries = series.filter(s=>!financeChartHiddenSeries[s.key]);

  // posizione sull'asse X proporzionale al tempo reale trascorso tra gli snapshot: un buco di 2+ mesi
  // occupa visivamente più spazio, e il segmento di linea che lo attraversa ne rappresenta già
  // l'interpolazione lineare del valore (nessun salto, nessuno zero, nessun mese "spostato").
  const rawTimes = data.map(row=>{ const d = parseItDate(row.date); return d ? d.getTime() : null; });
  const validTimes = rawTimes.filter(t=>t!=null);
  const timeBased = validTimes.length>=2 && (Math.max(...validTimes)-Math.min(...validTimes))>0;
  function posFor(i){
    if(timeBased){
      if(rawTimes[i]!=null) return rawTimes[i];
      let prev=i-1; while(prev>=0 && rawTimes[prev]==null) prev--;
      let next=i+1; while(next<data.length && rawTimes[next]==null) next++;
      if(prev>=0 && next<data.length) return rawTimes[prev] + (rawTimes[next]-rawTimes[prev])*((i-prev)/(next-prev));
      if(prev>=0) return rawTimes[prev];
      if(next<data.length) return rawTimes[next];
    }
    return i; // fallback: nessuna data valida nello storico, torniamo alla spaziatura per indice
  }
  const lastPos = posFor(data.length-1);

  // proiezione forecast a 12 mesi sul solo patrimonio netto, basata sul trend degli ultimi 12 snapshot
  let forecastPoints = { net: [] };
  let forecastPos = [];
  if(financeChartForecast){
    const sample = data.slice(-12);
    const firstRow = sample[0], lastRow = sample[sample.length-1];
    const d0 = parseItDate(firstRow.date), d1 = parseItDate(lastRow.date);
    const nMonths = (d0 && d1) ? Math.max(1, monthsBetween(d0,d1)) : Math.max(1, sample.length-1);
    const lastDate = parseItDate(data[data.length-1].date);
    ["net"].forEach(k=>{
      const growthPerMonth = ((lastRow[k]||0) - (firstRow[k]||0)) / nMonths;
      let cur = lastRow[k]||0;
      for(let m=1; m<=12; m++){
        cur += growthPerMonth;
        forecastPoints[k].push(cur);
        if(timeBased && lastDate){
          const proj = new Date(lastDate); proj.setMonth(proj.getMonth()+m);
          forecastPos.push(proj.getTime());
        } else {
          forecastPos.push(lastPos+m);
        }
      }
    });
  }

  const w = 1200, h = 240, pad = 38, padLeft = 62, padRight = 96;
  const allActualVals = data.flatMap(d=> visibleSeries.map(s=> d[s.key]||0));
  const allForecastVals = financeChartForecast ? visibleSeries.filter(s=>forecastPoints[s.key]).flatMap(s=>forecastPoints[s.key]) : [];
  const allVals = allActualVals.concat(allForecastVals).concat([0]);
  const maxV = Math.max(...allVals), minV = Math.min(...allVals);
  const range = (maxV - minV) || 1;
  const allPos = data.map((row,i)=>posFor(i)).concat(forecastPos);
  const minPos = Math.min(...allPos), maxPos = Math.max(...allPos);
  const posRange = (maxPos - minPos) || 1;
  function xy(val, pos){
    const x = padLeft + ((pos-minPos)/posRange) * (w - padLeft - padRight);
    const y = h - pad - ((val - minV) / range) * (h - pad*2);
    return [x,y];
  }
  let svg = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">`;
  // etichette e griglia sull'asse Y (valori in €)
  const yTicks = 4;
  for(let t=0; t<=yTicks; t++){
    const val = minV + (range * t / yTicks);
    const y = h - pad - (t/yTicks) * (h - pad*2);
    svg += `<line x1="${padLeft}" y1="${y.toFixed(1)}" x2="${w-padRight}" y2="${y.toFixed(1)}" stroke="#EFE6D4" stroke-width="1"/>`;
    svg += `<text x="${(padLeft-8).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="9" fill="#8a8065" text-anchor="end">${fmtMoneyPlain(val)}</text>`;
  }
  svg += `<line x1="${padLeft}" y1="${h-pad}" x2="${w-padRight}" y2="${h-pad}" stroke="#E4D6AC" stroke-width="1"/>`;
  if(financeChartForecast){
    const [sepX] = xy(0, lastPos);
    svg += `<line x1="${sepX.toFixed(1)}" y1="${pad-6}" x2="${sepX.toFixed(1)}" y2="${h-pad}" stroke="#B8AD8E" stroke-width="1" stroke-dasharray="3,3"/>`;
    svg += `<text x="${sepX.toFixed(1)}" y="${pad-10}" font-size="9" fill="#8a8065" text-anchor="middle">oggi</text>`;
  }
  visibleSeries.forEach(s=>{
    const d = data.map((row,i)=>{
      const [x,y] = xy(row[s.key]||0, posFor(i));
      return (i===0?"M":"L")+x.toFixed(1)+","+y.toFixed(1);
    }).join(" ");
    svg += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="${s.key==='net'?2.6:1.6}"><title>${s.label}</title></path>`;
    let endX, endY;
    if(financeChartForecast && forecastPoints[s.key]){
      const lastActual = xy(data[data.length-1][s.key]||0, lastPos);
      let fd = "M"+lastActual[0].toFixed(1)+","+lastActual[1].toFixed(1);
      forecastPoints[s.key].forEach((val,fi)=>{
        const [x,y] = xy(val, forecastPos[fi]);
        fd += " L"+x.toFixed(1)+","+y.toFixed(1);
        endX = x; endY = y;
      });
      svg += `<path d="${fd}" fill="none" stroke="${s.color}" stroke-width="${s.key==='net'?2.6:1.6}" stroke-dasharray="5,4" opacity="0.65"><title>${s.label} (proiezione)</title></path>`;
    } else {
      [endX, endY] = xy(data[data.length-1][s.key]||0, lastPos);
    }
    // etichetta alla fine della linea, per distinguere subito quale serie è quale
    svg += `<circle cx="${endX.toFixed(1)}" cy="${endY.toFixed(1)}" r="2.6" fill="${s.color}"/>`;
    svg += `<text x="${(endX+6).toFixed(1)}" y="${(endY+3).toFixed(1)}" font-size="9.5" font-weight="700" fill="${s.color}">${s.label}<title>${s.label}</title></text>`;
  });
  // etichette sull'asse X: un tick per ogni mese reale nell'intervallo, compresi gli eventuali mesi
  // senza snapshot, in modo che un mese "saltato" resti visibile come spazio/etichetta sull'asse
  if(timeBased){
    const startD = new Date(minPos), endD = new Date(maxPos);
    let cursor = new Date(startD.getFullYear(), startD.getMonth(), 1);
    const monthEnd = new Date(endD.getFullYear(), endD.getMonth(), 1);
    const allMonths = [];
    while(cursor <= monthEnd){ allMonths.push(new Date(cursor)); cursor.setMonth(cursor.getMonth()+1); }
    const labelEvery = Math.max(1, Math.ceil(allMonths.length/12));
    allMonths.forEach((md, idx)=>{
      if(idx % labelEvery !== 0 && idx !== allMonths.length-1) return;
      const t = md.getTime();
      const inForecast = financeChartForecast && t > lastPos;
      const [x] = xy(0, t);
      const label = md.toLocaleDateString("it-IT",{month:"short", year:"2-digit"});
      svg += `<text x="${x.toFixed(1)}" y="${h-pad+16}" font-size="9" fill="${inForecast?'#b8ad8e':'#8a8065'}" text-anchor="middle">${label}</text>`;
    });
  } else {
    // nessuna data valida nello storico: etichette per singolo snapshot come fallback
    const totalPoints = data.length + (financeChartForecast ? 12 : 0);
    const labelEvery = Math.max(1, Math.ceil(totalPoints/12));
    data.forEach((row,i)=>{
      if(i % labelEvery !== 0 && i !== data.length-1) return;
      const [x] = xy(0, posFor(i));
      svg += `<text x="${x.toFixed(1)}" y="${h-pad+16}" font-size="9" fill="#8a8065" text-anchor="middle">${row.date}</text>`;
    });
    if(financeChartForecast){
      forecastPos.forEach((pos,fi)=>{
        if(fi % labelEvery !== 0 && fi !== forecastPos.length-1) return;
        const [x] = xy(0,pos);
        svg += `<text x="${x.toFixed(1)}" y="${h-pad+16}" font-size="9" fill="#b8ad8e" text-anchor="middle">+${fi+1}m</text>`;
      });
    }
  }
  svg += `</svg>`;
  const wrap = el("div",{});
  const scrollWrap = el("div",{});
  scrollWrap.appendChild(el("div",{html:svg}));
  wrap.appendChild(scrollWrap);
  const legend = el("div",{class:"chart-legend"});
  series.forEach(s=>{
    const hidden = !!financeChartHiddenSeries[s.key];
    const item = el("span",{class:"chart-legend-item chart-legend-toggle"+(hidden?" hidden-series":""), title:hidden?"Clicca per mostrare la linea":"Clicca per nascondere la linea"},[
      el("span",{class:"chart-legend-dot", style:`background:${s.color};`}),
      el("span",{}, s.label)
    ]);
    item.addEventListener("click", ()=>{
      if(financeChartHiddenSeries[s.key]) delete financeChartHiddenSeries[s.key];
      else financeChartHiddenSeries[s.key] = true;
      render("finanze");
    });
    legend.appendChild(item);
  });
  if(financeChartForecast){
    legend.appendChild(el("span",{class:"chart-legend-item"},[
      el("span",{class:"chart-legend-dot", style:"background:transparent;border:1px dashed var(--ink-soft);"}),
      el("span",{}, "proiezione 12 mesi")
    ]));
  }
  wrap.appendChild(legend);
  wrap.appendChild(el("div",{class:"chart-legend-hint"},"clicca una voce della legenda per nascondere/mostrare quella linea"));
  return wrap;
}
function normalizeSheetRows(rows){
  // Quando un CSV usa ";" come separatore di campo, XLSX a volte non lo riconosce e
  // restituisce l'intera riga come un'unica cella: qui la spacchiamo noi nelle colonne reali.
  return (rows||[]).map(r=>{
    if(Array.isArray(r) && r.length===1 && typeof r[0]==="string" && r[0].indexOf(";")>-1){
      return r[0].split(";").map(p=>p.trim());
    }
    return r;
  });
}
function commitFinanceImport(parsed, errBox, close){
  if(!parsed.length) return;
  errBox.textContent = "";
  parsed.forEach(row=>{
    const existingIdx = state.finance.history.findIndex(h=>h.date===row.date);
    if(existingIdx>-1) state.finance.history[existingIdx] = row;
    else state.finance.history.push(row);
  });
  state.finance.history.sort((a,b)=>{
    const da = a.date.split("/").reverse().join("");
    const db = b.date.split("/").reverse().join("");
    return db.localeCompare(da);
  });
  store.set(privKey("finance"), state.finance);
  close(); render("finanze");
}
function parseFinanceRows(rows, errBox){
  // rows: array di array [dateStr|Date, liq, nonliq, debt, note?] già "grezzi" (nota facoltativa)
  const parsed = [];
  for(const row of rows){
    if(!row || row.length < 4 || row.every(c=>c===""||c==null)) continue;
    let [rawDate, liq, nonliq, debt, note] = row;
    let dateStr;
    if(rawDate instanceof Date){
      dateStr = String(rawDate.getDate()).padStart(2,"0")+"/"+String(rawDate.getMonth()+1).padStart(2,"0")+"/"+rawDate.getFullYear();
    } else {
      dateStr = String(rawDate).trim();
    }
    if(!/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)){ errBox.textContent = "Data non valida: "+dateStr; return null; }
    const liquidity = parseItalianNumber(liq);
    const nonliquid = parseItalianNumber(nonliq);
    const debts = parseItalianNumber(debt);
    parsed.push({ date:dateStr, liquidity, nonliquid, debts, net: liquidity+nonliquid-debts, note: note!=null ? String(note).trim() : "" });
  }
  return parsed;
}

let financeSubTab = "dashboard";
function computeInvestmentsTotalEUR(){
  const invs = state.finance.investments || [];
  let total = 0;
  invs.forEach(inv=>{
    const {qty, avgBuyPrice} = investLotsTotals(inv);
    const isEUR = !inv.currency || inv.currency==="EUR";
    const fx = inv.fxRate!=null ? inv.fxRate : (isEUR?1:null);
    const priceNative = inv.lastPrice!=null ? inv.lastPrice : avgBuyPrice;
    if(fx!=null) total += qty*priceNative*fx;
  });
  return total;
}
function syncPortfolioTitoliItem(){
  const invs = state.finance.investments || [];
  if(!invs.length) return; // nessun titolo tracciato: la voce resta un campo manuale libero
  const total = computeInvestmentsTotalEUR();
  const totalStr = String(Math.round(total*100)/100);
  let changed = false;

}

function normalizePriceCurrency(price, currency){
  // Alcuni titoli (es. ETF/ETC quotati a Londra) vengono quotati in pence (GBp/GBX)
  // invece che in sterline: li normalizziamo prima di qualunque conversione.
  if(currency==="GBp" || currency==="GBX"){
    return { price: price/100, currency: "GBP" };
  }
  return { price, currency: (currency||"EUR").toUpperCase() };
}
function investLotsTotals(inv){
  // Elabora i lotti in ordine cronologico (acquisti/vendite) mantenendo un costo medio
  // ponderato corrente; sulle vendite scala qty/costo proporzionalmente e accumula il realizzato.
  const lots = (inv.lots||[]).slice().sort((a,b)=>{
    const da = parseItDate(a.date), db = parseItDate(b.date);
    if(da && db) return da-db;
    if(da) return -1;
    if(db) return 1;
    return 0;
  });
  let qty = 0, cost = 0, realized = 0;
  lots.forEach(l=>{
    if(l.type==="sell"){
      const sellQty = Math.min(l.qty||0, qty);
      const avgCost = qty ? cost/qty : 0;
      realized += sellQty*((l.price||0)-avgCost);
      cost -= avgCost*sellQty;
      qty -= sellQty;
    } else {
      cost += (l.qty||0)*(l.price||0);
      qty += (l.qty||0);
    }
  });
  return { qty, cost, avgBuyPrice: qty ? cost/qty : 0, realized };
}
function addOrMergeInvestment(meta, qty, price, date, type){
  if(!state.finance.investments) state.finance.investments = [];
  const key = (meta.symbol||"").toUpperCase();
  let inv = state.finance.investments.find(i=>(i.symbol||"").toUpperCase()===key);
  const lot = { id:"lot"+Date.now()+Math.random().toString(36).slice(2,7), qty, price, date: date||"", type: type||"buy" };
  if(inv){
    inv.lots.push(lot);
  } else {
    inv = {
      id:"inv"+Date.now(), symbol: meta.symbol, name: meta.name||meta.symbol, exchange: meta.exchange||"", micCode: meta.micCode||"",
      currency: meta.currency||"EUR", manual: !!meta.manual, label:"",
      lastPrice:null, lastPriceAt:null, fxRate: (!meta.currency||meta.currency==="EUR")?1:null, manualNote:"",
      lots:[lot]
    };
    state.finance.investments.push(inv);
  }
  store.set(privKey("finance"), state.finance);
}

function openManualPriceUpdateModal(inv){
  openModal((modal, close)=>{
    const isEUR = !inv.currency || inv.currency==="EUR";
    modal.appendChild(el("h3",{},"Aggiorna prezzo — "+inv.name));
    modal.appendChild(el("div",{class:"field-label"},"Prezzo attuale (per unità"+(isEUR?"":", in "+inv.currency)+")"));
    const priceInp = el("input",{type:"text", placeholder:"es. 99,10"});
    priceInp.value = inv.lastPrice!=null ? String(inv.lastPrice).replace(".",",") : "";
    modal.appendChild(priceInp);
    let fxInp = null;
    if(!isEUR){
      modal.appendChild(el("div",{class:"field-label"},"Cambio 1 "+inv.currency+" = ? EUR (es. 1,17)"));
      fxInp = el("input",{type:"text", placeholder:"es. 1,17"});
      fxInp.value = inv.fxRate!=null ? String(inv.fxRate).replace(".",",") : "";
      modal.appendChild(fxInp);
    }
    modal.appendChild(el("div",{class:"field-label"},"Nota (fonte e data della rilevazione)"));
    const noteInp = el("input",{type:"text", placeholder:"es. quotazione MOT del 20/07/2026"});

    const errBox = el("div",{style:"color:var(--rust); font-size:12px; margin-top:8px; min-height:16px;"});
    modal.appendChild(errBox);
    const actions = el("div",{class:"modal-actions"});
    const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
    cancelBtn.addEventListener("click", close);
    const saveBtn = el("button",{class:"btn primary"},"Salva");
    saveBtn.addEventListener("click", ()=>{
      const price = parseItalianNumber(priceInp.value);
      if(!price){ errBox.textContent = "Inserisci un prezzo valido."; return; }
      let fx = 1;
      if(fxInp){
        fx = parseItalianNumber(fxInp.value);
        if(!fx){ errBox.textContent = "Inserisci un cambio valido (es. 1,17)."; return; }
      }
      inv.lastPrice = price;
      inv.fxRate = fx;
      inv.lastPriceAt = new Date().toISOString();
      inv.manualNote = noteInp.value.trim();
      store.set(privKey("finance"), state.finance);
      close(); render("finanze");
    });
    actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
    modal.appendChild(actions);
  });
}

async function refreshInvestmentPrices(){
  const invs = state.finance.investments || [];
  const fxCache = {};
  async function getFxRate(currency){
    if(!currency || currency==="EUR") return 1;
    if(Object.prototype.hasOwnProperty.call(fxCache,currency)) return fxCache[currency];
    try{
      const { data, error } = await sb.functions.invoke(`invest-prices?action=fx&symbol=${encodeURIComponent(currency)}/EUR`, { method:"GET" });
      fxCache[currency] = (!error && data && data.rate) ? parseFloat(data.rate) : null;
    }catch(e){ fxCache[currency] = null; }
    return fxCache[currency];
  }
  const failures = [];
  for(const inv of invs){
    if(inv.manual) continue; // i titoli manuali non si aggiornano da soli
    try{
      let q = `invest-prices?action=quote&symbol=${encodeURIComponent(inv.symbol)}`;
      if(inv.micCode) q += `&mic_code=${encodeURIComponent(inv.micCode)}`;
      else if(inv.exchange) q += `&exchange=${encodeURIComponent(inv.exchange)}`;
      const { data, error } = await sb.functions.invoke(q, { method:"GET" });
      if(!error && data && data.close && !isNaN(parseFloat(data.close))){
        const norm = normalizePriceCurrency(parseFloat(data.close), data.currency || inv.currency);
        inv.lastPrice = norm.price;
        inv.currency = norm.currency;
        inv.lastPriceAt = new Date().toISOString();
        inv.fxRate = await getFxRate(norm.currency);
      } else {
        failures.push(inv.symbol + (data&&data.message ? " ("+data.message+")" : ""));
      }
    }catch(e){ failures.push(inv.symbol); }
  }
  if(failures.length){
    alert("Non sono riuscito ad aggiornare automaticamente: "+failures.join(", ")+".\nSpesso è perché il piano gratuito di Twelve Data non copre quel titolo (es. ETF europei) — in quel caso usa l'icona 💰 sulla riga per aggiornarne il prezzo a mano.");
  }
  store.set(privKey("finance"), state.finance);
  render("finanze");
}

let investOrdersWindow = "month";
function renderFinanzeInvestimenti(main){
  const invs = state.finance.investments || [];

  const rows = invs.map(inv=>{
    const {qty, cost, avgBuyPrice} = investLotsTotals(inv);
    const isEUR = !inv.currency || inv.currency==="EUR";
    const fx = inv.fxRate!=null ? inv.fxRate : (isEUR?1:null);
    const priceKnown = inv.lastPrice!=null;
    const priceNative = priceKnown ? inv.lastPrice : avgBuyPrice;
    let valueEUR = null, costEUR = null;
    if(fx!=null){
      valueEUR = qty*priceNative*fx;
      costEUR = cost*fx; // conversione al tasso di cambio più recente, non a quello storico d'acquisto
    }
    return { inv, qty, cost, avgBuyPrice, isEUR, fx, priceNative, priceKnown, valueEUR, costEUR };
  });

  let totalEUR = 0, totalCostEUR = 0;
  const otherCurrencies = new Set();
  rows.forEach(r=>{
    if(r.valueEUR!=null){ totalEUR += r.valueEUR; totalCostEUR += r.costEUR; }
    if(!r.isEUR) otherCurrencies.add(r.inv.currency);
  });
  const totalPnl = totalEUR-totalCostEUR;
  const totalPnlPct = totalCostEUR ? (totalPnl/totalCostEUR*100) : null;

  // --- KPI in alto ---
  const totalsBar = el("div",{class:"card invest-totals-bar"});
  totalsBar.appendChild(el("div",{},[
    el("span",{class:"finance-total-label"},"Totale portafoglio"),
    el("span",{class:"finance-total-value"}, fmtEUR(totalEUR))
  ]));
  totalsBar.appendChild(el("div",{class:"invest-pnl "+(totalPnl>=0?"positive":"negative"), style:"font-size:16px;"},
    (totalPnl>=0?"+":"")+fmtEUR(totalPnl)+(totalPnlPct!=null?" ("+(totalPnlPct>=0?"+":"")+totalPnlPct.toFixed(1)+"%)":"")
  ));
  main.appendChild(totalsBar);
  if(otherCurrencies.size){
    main.appendChild(el("div",{class:"finance-note"},
      "Nota: alcuni titoli sono in "+[...otherCurrencies].join(", ")+", convertiti in € al tasso di cambio più recente disponibile (non a quello storico d'acquisto)."));
  }

  const actionsRow = el("div",{class:"invest-actions-row"});
  const addBtn = el("button",{class:"btn primary"},"+ Aggiungi titolo");
  addBtn.addEventListener("click", ()=> openInvestSearchModal(openAddHoldingModal, openManualHoldingModal));
  actionsRow.appendChild(addBtn);
  main.appendChild(actionsRow);

  if(!invs.length){
    main.appendChild(el("div",{class:"empty-hint"},"Nessun titolo in portafoglio. Aggiungine uno per iniziare a tracciarlo."));
    return;
  }

  // --- posizioni aggregate (una riga per titolo, media pesata su acquisti/vendite) ---
  const list = el("div",{class:"invest-list"});
  rows.forEach(r=>{
    const inv = r.inv;
    const pnl = r.valueEUR!=null ? r.valueEUR-r.costEUR : null;
    const pnlPct = (pnl!=null && r.costEUR) ? (pnl/r.costEUR*100) : null;
    const row = el("div",{class:"invest-row"});
    const mainCol = el("div",{class:"invest-row-main"});
    const topLine = el("div",{class:"invest-top-line"});
    if(inv.label){
      topLine.appendChild(el("span",{class:"invest-primary-text"}, inv.label));
      topLine.appendChild(el("span",{class:"invest-symbol-chip"}, inv.symbol + (inv.manual?" · manuale":"")));
    } else {
      topLine.appendChild(el("span",{class:"invest-symbol"}, inv.symbol + (inv.manual?" · manuale":"")));
    }
    mainCol.appendChild(topLine);
    mainCol.appendChild(el("span",{class:"invest-name"}, inv.name));
    {
      const isStale = inv.lastPrice==null;
      const updText = isStale ? "mai aggiornato — prezzo di carico" : "prezzo agg. il "+new Date(inv.lastPriceAt).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"2-digit"});
      mainCol.appendChild(el("span",{class:"invest-updated"+(isStale?" stale":"")}, updText));
    }
    row.appendChild(mainCol);
    row.appendChild(el("div",{class:"invest-qty"},
      r.qty+" × "+fmtNativeAmount(r.priceNative, inv.currency)+(!r.priceKnown?" (carico)":"")
    ));
    row.appendChild(el("div",{class:"invest-value"}, r.valueEUR!=null ? fmtEUR(r.valueEUR) : "—"));
    row.appendChild(el("div",{class:"invest-pnl "+(pnl!=null ? (pnl>=0?"positive":"negative") : "")},
      pnl!=null ? (pnl>=0?"+":"")+fmtEUR(pnl)+(pnlPct!=null?" ("+(pnlPct>=0?"+":"")+pnlPct.toFixed(1)+"%)":"") : "—"
    ));
    const rowActions = el("div",{class:"invest-row-actions"});
    const orderBtn = el("button",{class:"btn ghost small"},"+ Ordine");
    orderBtn.addEventListener("click", ()=> openAddOrderModal(inv));
    rowActions.appendChild(orderBtn);
    const editBtn = el("span",{class:"invest-manual-edit", title:"Modifica etichetta e storico ordini"}, "✎");
    editBtn.addEventListener("click", ()=> openEditHoldingModal(inv));
    rowActions.appendChild(editBtn);
    const priceBtn = el("span",{class:"invest-manual-edit", title:"Aggiorna prezzo manualmente"}, "💰");
    priceBtn.addEventListener("click", ()=> openManualPriceUpdateModal(inv));
    rowActions.appendChild(priceBtn);
    const del = el("span",{class:"del", html:"✕"});
    del.addEventListener("click", ()=>{
      if(confirm("Rimuovere "+inv.symbol+" (tutti gli ordini) dal portafoglio?")){
        state.finance.investments = state.finance.investments.filter(i=>i!==inv);
        store.set(privKey("finance"), state.finance); render("finanze");
      }
    });
    rowActions.appendChild(del);
    row.appendChild(rowActions);
    if(inv.manual && inv.manualNote){
      row.appendChild(el("div",{class:"invest-manual-note"}, inv.manualNote));
    }
    list.appendChild(row);
  });
  main.appendChild(list);

  if(invs.some(i=>!i.manual)){
    const priceToggleRow = el("div",{style:"display:flex; justify-content:flex-end; align-items:center; gap:12px; margin-bottom:8px;"});
    if(state.finance.investAutoPriceEnabled){
      const refreshBtn = el("button",{class:"btn ghost small"},"↻ Aggiorna prezzi");
      refreshBtn.addEventListener("click", ()=>{
        refreshBtn.textContent = "Aggiorno…"; refreshBtn.disabled = true;
        refreshInvestmentPrices();
      });
      priceToggleRow.appendChild(refreshBtn);
      const disableLink = el("span",{class:"invest-manual-link", style:"margin:0;"}, "Disattiva aggiornamento automatico");
      disableLink.addEventListener("click", ()=>{
        state.finance.investAutoPriceEnabled = false;
        store.setQuiet(privKey("finance"), state.finance); render("finanze");
      });
      priceToggleRow.appendChild(disableLink);
    } else {
      const enableLink = el("span",{class:"invest-manual-link", style:"margin:0;"},
        "Attiva aggiornamento automatico prezzi (richiede piano a pagamento Twelve Data) →");
      enableLink.addEventListener("click", ()=>{
        state.finance.investAutoPriceEnabled = true;
        store.setQuiet(privKey("finance"), state.finance); render("finanze");
      });
      priceToggleRow.appendChild(enableLink);
    }
    main.appendChild(priceToggleRow);
  }

  // --- ordini recenti (ogni lotto, filtrabile per periodo) ---
  main.appendChild(el("div",{class:"section-head", style:"margin-top:28px;"},[el("h1",{style:"font-size:20px;"},"Ordini recenti")]));
  const windowRow = el("div",{class:"invest-orders-window"});
  [["week","Ultima settimana"],["month","Ultimo mese"],["6m","Ultimi 6 mesi"],["year","Ultimo anno"],["all","Tutto"]].forEach(([val,label])=>{
    const b = el("button",{class:"btn ghost small"+(investOrdersWindow===val?" active":"")}, label);
    b.addEventListener("click", ()=>{ investOrdersWindow = val; render("finanze"); });
    windowRow.appendChild(b);
  });
  main.appendChild(windowRow);

  let allLots = [];
  invs.forEach(inv=>{ (inv.lots||[]).forEach(lot=>{ allLots.push({ inv, lot }); }); });
  if(investOrdersWindow!=="all"){
    const cutoff = new Date();
    if(investOrdersWindow==="week") cutoff.setDate(cutoff.getDate()-7);
    else if(investOrdersWindow==="month") cutoff.setMonth(cutoff.getMonth()-1);
    else if(investOrdersWindow==="6m") cutoff.setMonth(cutoff.getMonth()-6);
    else if(investOrdersWindow==="year") cutoff.setFullYear(cutoff.getFullYear()-1);
    allLots = allLots.filter(o=>{
      const d = parseItDate(o.lot.date);
      return d ? d>=cutoff : true;
    });
  }
  allLots.sort((a,b)=>{
    const da = parseItDate(a.lot.date), db = parseItDate(b.lot.date);
    if(!da && !db) return 0;
    if(!da) return 1;
    if(!db) return -1;
    return db-da;
  });

  if(!allLots.length){
    main.appendChild(el("div",{class:"empty-hint"},"Nessun ordine in questo periodo."));
  } else {
    const ordersList = el("div",{class:"invest-orders-list"});
    allLots.forEach(({inv,lot})=>{
      const row = el("div",{class:"invest-order-row"});
      row.appendChild(el("span",{class:"invest-order-date"}, lot.date || "—"));
      row.appendChild(el("span",{class:"invest-order-symbol"}, inv.symbol));
      row.appendChild(el("span",{class:"invest-order-type "+(lot.type==="sell"?"sell":"buy")}, lot.type==="sell"?"Vendita":"Acquisto"));
      row.appendChild(el("span",{class:"invest-order-qty"}, lot.qty+" × "+fmtNativeAmount(lot.price, inv.currency)));
      row.appendChild(el("span",{class:"invest-order-total"}, fmtNativeAmount(lot.qty*lot.price, inv.currency)));
      ordersList.appendChild(row);
    });
    main.appendChild(ordersList);
  }
}

  histHead.appendChild(el("h4",{style:"margin:0;"},"Storico snapshot"));
  const histActions = el("div",{class:"finance-hist-actions"});
  if(state.finance.history.length){
    const clearWrap = el("div",{class:"dropdown-wrap"});
    const clearBtn = el("button",{class:"btn danger small"},"Cancella lo storico ▾");
    const menu = el("div",{class:"dropdown-menu"});
    function closeMenu(){ menu.classList.remove("open"); document.removeEventListener("click", onDocClick); }
    function onDocClick(e){ if(!clearWrap.contains(e.target)) closeMenu(); }
    clearBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      if(menu.classList.contains("open")){ closeMenu(); }
      else { menu.classList.add("open"); document.addEventListener("click", onDocClick); }
    });
    function doClear(scope){
      if(scope==="all"){
        const total = state.finance.history.length;
        if(!confirm("Cancellare definitivamente tutti i "+total+" snapshot dello storico? L'azione non è reversibile.")) return;
        state.finance.history = [];
      } else if(scope==="future"){
        const now = new Date(); now.setHours(23,59,59,999);
        const before = state.finance.history.length;
        const kept = state.finance.history.filter(h=>{
          const d = parseItDate(h.date);
          return d && d<=now;
        });
        const removed = before - kept.length;
        if(!removed){ alert("Nessuno snapshot con data futura da cancellare."); return; }
        if(!confirm("Cancellare "+removed+" snapshot con data futura (oltre oggi)? L'azione non è reversibile.")) return;
        state.finance.history = kept;
      } else {
        const cutoff = new Date();
        if(scope==="month") cutoff.setMonth(cutoff.getMonth()-1);
        else cutoff.setFullYear(cutoff.getFullYear()-1);
        const before = state.finance.history.length;
        const kept = state.finance.history.filter(h=>{
          const d = parseItDate(h.date);
          return d && d < cutoff;
        });
        const removed = before - kept.length;
        if(!removed){ alert("Nessuno snapshot da cancellare in quell'intervallo."); return; }
        if(!confirm("Cancellare "+removed+" snapshot degli ultimi "+(scope==="month"?"30 giorni":"12 mesi")+"? L'azione non è reversibile.")) return;
        state.finance.history = kept;
      }
      store.set(privKey("finance"), state.finance); render("finanze");
    }
    [["month","Ultimo mese"],["year","Ultimo anno"],["future","Date future"],["all","Tutto"]].forEach(([scope,label])=>{
      const item = el("div",{class:"dropdown-item"}, label);
      item.addEventListener("click", ()=>{ closeMenu(); doClear(scope); });
      menu.appendChild(item);
    });
    clearWrap.appendChild(clearBtn);
    clearWrap.appendChild(menu);
    histActions.appendChild(clearWrap);
  }
  const importHistBtn = el("button",{class:"btn ghost small"},"Importa storico");
  importHistBtn.addEventListener("click", openFinanceImportModal);
  histActions.appendChild(importHistBtn);
  histHead.appendChild(histActions);
  histBlock.appendChild(histHead);
  if(!state.finance.history.length){
    histBlock.appendChild(emptyState("Salva il primo snapshot per iniziare a tracciare l'andamento nel tempo.", ICON_COIN));
  } else {
    const histTable = el("div",{class:"history-table"});
    const headRow = el("div",{class:"history-row history-row-head"});
    headRow.appendChild(el("span",{class:"history-col-date"},"Data"));
    headRow.appendChild(el("span",{class:"history-col-num"},"Liquidità"));
    headRow.appendChild(el("span",{class:"history-col-num"},"Non liquidi"));
    headRow.appendChild(el("span",{class:"history-col-num"},"Debiti"));
    headRow.appendChild(el("span",{class:"history-col-num"},"Netto"));
    headRow.appendChild(el("span",{class:"history-col-note"},"Nota"));
    headRow.appendChild(el("span",{},""));
    histTable.appendChild(headRow);
    state.finance.history.forEach((h,i)=>{
      const row = el("div",{class:"history-row"});
      const dateInp = el("input",{type:"text", class:"history-col-date mono", value:h.date});
      dateInp.addEventListener("change", ()=>{ h.date = dateInp.value; store.set(privKey("finance"), state.finance); render("finanze"); });
      row.appendChild(dateInp);
      ["liquidity","nonliquid","debts"].forEach(field=>{
        const inp = el("input",{type:"text", class:"history-col-num mono", value: fmtMoneyPlain(h[field]||0)});
        inp.addEventListener("focus", ()=>{ inp.value = h[field]||0; });
        inp.addEventListener("blur", ()=>{ inp.value = fmtMoneyPlain(h[field]||0); });
        inp.addEventListener("change", ()=>{
          h[field] = parseFinanceValue(inp.value);
          h.net = (h.liquidity||0) + (h.nonliquid||0) - (h.debts||0);
          store.set(privKey("finance"), state.finance); render("finanze");
        });
        row.appendChild(inp);
      });
      row.appendChild(el("span",{class:"history-value history-col-num"}, fmtEUR(h.net)));
      const noteInp = el("textarea",{rows:"1", class:"history-col-note", placeholder:"nota…"});
      noteInp.value = h.note||"";
      noteInp.addEventListener("input", ()=>autoResize(noteInp));
      noteInp.addEventListener("change", ()=>{ h.note = noteInp.value; store.set(privKey("finance"), state.finance); });
      row.appendChild(noteInp);
      autoResize(noteInp);
      const del = el("span",{class:"del", html:"✕"});
      del.addEventListener("click", ()=>{ state.finance.history.splice(i,1); store.set(privKey("finance"), state.finance); render("finanze"); });
      row.appendChild(del);
      histTable.appendChild(row);
    });
    histBlock.appendChild(histTable);
  }
  main.appendChild(histBlock);
}

function renderCategorizedChecklist(detail, board, save, idPrefix, tabName){
  // migrazione una tantum: da lista piatta (vecchie board condivise / schede custom) a categorie, come in Viaggi
  if(board.data.length && board.data[0] && board.data[0].items===undefined){
    board.data = [{title:"Voci", items: board.data}];
    save();
  }
  const allItemsGlobal = board.data.flatMap(cat=>cat.items);
  if(allItemsGlobal.length){
    const allDoneGlobal = allItemsGlobal.every(it=>it.done);
    const globalWrap = el("label",{class:"select-all-global", title:"Seleziona/deseleziona tutte le voci di tutte le categorie"});
    const globalCb = el("input",{type:"checkbox"}); globalCb.checked = allDoneGlobal;
    globalWrap.appendChild(globalCb); globalWrap.appendChild(el("span",{},"Seleziona tutto"));
    globalCb.addEventListener("change", ()=>{
      board.data.forEach(cat=>cat.items.forEach(it=>it.done = globalCb.checked));
      save(true);
    });
    const allTakeGlobal = allItemsGlobal.every(it=>it.take!==false);
    const globalTakeWrap = el("label",{class:"select-all-global take", title:"Seleziona/deseleziona tutti i baffi (da prendere) di tutte le categorie"});
    const globalTakeCb = el("input",{type:"checkbox"}); globalTakeCb.checked = allTakeGlobal;
    globalTakeWrap.appendChild(globalTakeCb); globalTakeWrap.appendChild(el("span",{},"Seleziona tutti (da prendere)"));
    globalTakeCb.addEventListener("change", ()=>{
      board.data.forEach(cat=>cat.items.forEach(it=>it.take = globalTakeCb.checked));
      save(true);
    });
    const globalRow = el("div",{class:"select-all-row"});
    globalRow.appendChild(globalWrap);
    globalRow.appendChild(globalTakeWrap);
    detail.appendChild(globalRow);
  }
  board.data.forEach((cat,ci)=>{
    const block = el("div",{class:"cat-block"});
    const head = el("div",{class:"cat-block-head"});
    const titleInput = el("input",{type:"text", class:"cat-title-input", value:cat.title, placeholder:"Nome categoria"});
    titleInput.addEventListener("change", ()=>{ cat.title=titleInput.value; save(); });
    const delCatBtn = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
    delCatBtn.addEventListener("click", ()=>{
      if(confirm('Eliminare la categoria "'+(cat.title||"senza nome")+'" e tutte le sue voci?')){
        board.data.splice(ci,1);
        save();
      }
    });
    const allDone = cat.items.length>0 && cat.items.every(it=>it.done);
    const selAllWrap = el("label",{class:"select-all-cat", title:"Seleziona/deseleziona tutte le voci"});
    const selAllCb = el("input",{type:"checkbox"}); selAllCb.checked = allDone;
    selAllWrap.appendChild(selAllCb); selAllWrap.appendChild(el("span",{},"Tutto"));
    selAllCb.addEventListener("change", ()=>{
      cat.items.forEach(it=>it.done = selAllCb.checked);
      save(true);
    });
    const allTake = cat.items.length>0 && cat.items.every(it=>it.take!==false);
    const selAllTakeWrap = el("label",{class:"select-all-cat take", title:"Seleziona/deseleziona tutti i baffi (da prendere)"});
    const selAllTakeCb = el("input",{type:"checkbox"}); selAllTakeCb.checked = allTake;
    selAllTakeWrap.appendChild(selAllTakeCb); selAllTakeWrap.appendChild(el("span",{},"Da prendere"));
    selAllTakeCb.addEventListener("change", ()=>{
      cat.items.forEach(it=>it.take = selAllTakeCb.checked);
      save(true);
    });
    head.appendChild(titleInput);
    head.appendChild(selAllWrap);
    head.appendChild(selAllTakeWrap);
    head.appendChild(delCatBtn);
    block.appendChild(head);
    const grid = el("div",{class:"pack-grid"});
    cat.items.forEach((it,i)=>{
      grid.appendChild(renderPackItem(it, i, cat.items, save, idPrefix+ci));
    });
    block.appendChild(grid);
    const addLine = el("div",{class:"add-line"});
    const addKey = idPrefix+ci+"-add";
    const input = el("input",{type:"text", placeholder:"aggiungi voce…", "data-addline":addKey, enterkeyhint:"done"});
    input.addEventListener("keydown",(e)=>{
      if(e.key==="Enter" && input.value.trim()){
        cat.items.push({id:"pk"+Date.now()+Math.random().toString(36).slice(2,5), text:input.value.trim(), done:false, take:true});
        save();
        const again = document.querySelector('[data-addline="'+addKey+'"]');
        if(again) again.focus();
      }
    });
    addLine.appendChild(input);
    block.appendChild(addLine);
    detail.appendChild(block);
  });
  const addCatBtn = el("button",{class:"btn ghost", style:"margin-top:6px;"},"+ Nuova categoria");
  addCatBtn.addEventListener("click", ()=>{
    board.data.push({title:"Nuova categoria", items:[]});
    save();
  });
  detail.appendChild(addCatBtn);
}

function renderCustomTabButtons(){

  });
  state.customTabsPrivate.forEach((tab,i)=>{

function customTabButton(tab, index, arr){
  const btn = el("button",{class:"tab custom-tab", "data-tab":"custom:"+tab.id, style:`background:${tab.color}`});
  const grip = el("span",{class:"tab-drag-grip", html:ICON_GRIP, title:"Trascina per riordinare"});
  btn.appendChild(grip);
  const targetKeyFor = ()=> tab.private ? privKey("customTabs") : "customTabs";
  attachRowDrag(grip, btn, index, arr, ()=>{
    store.set(targetKeyFor(), arr);
    renderCustomTabButtons();
  });
  const iconEl = el("span",{class:"tab-icon", html: STANDARD_ICONS[tab.icon]||STANDARD_ICONS.list});
  btn.appendChild(iconEl);
  const labelEl = el("span",{class:"tab-label"}, tab.name);
  btn.appendChild(labelEl);
  const editBtn = el("span",{class:"tab-edit-btn", html:ICON_EDIT, title:"Modifica scheda"});
  editBtn.addEventListener("click",(e)=>{
    e.stopPropagation();
    const targetKey = ()=> tab.private ? privKey("customTabs") : "customTabs";
    const targetArr = ()=> tab.private ? state.customTabsPrivate : state.customTabs;
    openTabEditModal({
      getIcon: ()=>tab.icon, setIcon: (k)=>{ tab.icon=k; store.setQuiet(targetKey(), targetArr()); },
      getColor: ()=>tab.color, setColor: (c)=>{ tab.color=c; btn.style.background=c; store.setQuiet(targetKey(), targetArr()); },
      getName: ()=>tab.name, setName: (n)=>{ tab.name=n; store.setQuiet(targetKey(), targetArr()); },
      afterSave: ()=>renderCustomTabButtons(),
      onDelete: ()=>{
        if(confirm('Eliminare la scheda "'+tab.name+'" e tutti i suoi contenuti? Questa azione non è reversibile.')){
          deleteCustomTab(tab);
        }
      }
    });
  });
  btn.appendChild(editBtn);
  return btn;
}
async function deleteCustomTab(tab){
  const contentKey = tab.private ? privKey("custom:"+tab.id) : "custom:"+tab.id;
  if(tab.private){
    state.customTabsPrivate = state.customTabsPrivate.filter(t=>t.id!==tab.id);
    await store.set(privKey("customTabs"), state.customTabsPrivate);
  } else {
    state.customTabs = state.customTabs.filter(t=>t.id!==tab.id);
    await store.set("customTabs", state.customTabs);
  }
  await store.set(contentKey, []);
  delete customTabData[tab.id];
  renderCustomTabButtons();
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector('.tab[data-tab="dashboard"]').classList.add("active");
  render("dashboard");
}

function builtinTabHeader(key, fallbackLabel){
  const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
  const iconSpan = btn ? btn.querySelector(".tab-icon") : null;
  const iconHtml = iconSpan ? iconSpan.innerHTML : "";
  const label = state.builtinLabels[key] || fallbackLabel || BUILTIN_TABS[key] || "";
  return el("div",{class:"tab-detail-title"}, [
    el("span",{class:"tab-detail-title-icon", html:iconHtml}),
    document.createTextNode(label)
  ]);
}
const BUILTIN_TABS = {
  orto: "Orto", viaggio: "Viaggi", grigliate: "Grigliate", gomme: "Gomme", progetti: "Progetti", condivisi: "Condivisi"
};
function applyHiddenBuiltins(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(btn) btn.style.display = state.hiddenBuiltins.includes(key) ? "none" : "";
  });
}
function applyBuiltinLabels(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn) return;
    const mainSpan = btn.querySelector(".tab-label-main");
    if(mainSpan) mainSpan.textContent = state.builtinLabels[key] || BUILTIN_TABS[key];
  });
}
function applyBuiltinColors(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn) return;
    if(state.builtinColors[key]) btn.style.background = state.builtinColors[key];
    else btn.style.background = "";
  });
}
function applyBuiltinIcons(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn) return;
    const iconSpan = btn.querySelector(".tab-icon");
    if(!iconSpan) return;
    if(state.builtinIcons[key]){
      if(!iconSpan.dataset.origHtml) iconSpan.dataset.origHtml = iconSpan.innerHTML;
      iconSpan.innerHTML = STANDARD_ICONS[state.builtinIcons[key]] || iconSpan.dataset.origHtml;
    } else if(iconSpan.dataset.origHtml){
      iconSpan.innerHTML = iconSpan.dataset.origHtml;
    }
  });
}
function applyBuiltinOrder(){
  if(!state.builtinOrder || !state.builtinOrder.length) return;
  const nav = document.getElementById("tabs");
  const anchor = document.getElementById("custom-tabs-slot-shared");
  if(!anchor) return;
  state.builtinOrder.forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(btn) nav.insertBefore(btn, anchor);
  });
}
let builtinTabsEnhanced = false;
function enhanceBuiltinTabs(){
  Object.keys(BUILTIN_TABS).forEach((key, idx)=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn || btn.dataset.enhanced) return;
    btn.dataset.enhanced = "1";
    btn.classList.add("custom-tab");

    const grip = el("span",{class:"tab-drag-grip", html:ICON_GRIP, title:"Trascina per riordinare"});
    btn.insertBefore(grip, btn.firstChild);
    btn.dataset.builtinDragKey = key;
    bindPointerDragSource(grip, btn, (e)=>{
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const target = under && under.closest("[data-builtin-drag-key]");
      document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
      if(target && target!==btn) target.classList.add("drag-over");
    }, (e)=>{
      document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const target = under && under.closest("[data-builtin-drag-key]");
      if(!target || target===btn) return;
      const toKey = target.dataset.builtinDragKey;
      if(!toKey || toKey===key) return;
      let order = (state.builtinOrder && state.builtinOrder.length) ? state.builtinOrder.slice() : Object.keys(BUILTIN_TABS);
      order = order.filter(k=>k!==key);
      const toIdx = order.indexOf(toKey);
      order.splice(toIdx, 0, key);
      state.builtinOrder = order;
      store.setQuiet(privKey("builtinOrder"), order);
      applyBuiltinOrder();
    });

    const editBtn = el("span",{class:"tab-edit-btn", html:ICON_EDIT, title:"Modifica scheda"});
    editBtn.addEventListener("click",(e)=>{
      e.stopPropagation();
      openTabEditModal({
        getIcon: ()=>state.builtinIcons[key]||"", setIcon: (k)=>{ state.builtinIcons[key]=k; store.setQuiet(privKey("builtinIcons"), state.builtinIcons); },
        getColor: ()=>state.builtinColors[key]||currentTabPalette()[idx%currentTabPalette().length], setColor: (c)=>{ state.builtinColors[key]=c; store.setQuiet(privKey("builtinColors"), state.builtinColors); },
        getName: ()=>state.builtinLabels[key]||BUILTIN_TABS[key], setName: (n)=>{ state.builtinLabels[key]=n; store.setQuiet(privKey("builtinLabels"), state.builtinLabels); },
        afterSave: ()=>{ applyBuiltinIcons(); applyBuiltinColors(); applyBuiltinLabels(); },
        onResetIcon: state.builtinIcons[key] ? ()=>{ delete state.builtinIcons[key]; store.setQuiet(privKey("builtinIcons"), state.builtinIcons); applyBuiltinIcons(); } : null,
        onResetColor: state.builtinColors[key] ? ()=>{ delete state.builtinColors[key]; store.setQuiet(privKey("builtinColors"), state.builtinColors); applyBuiltinColors(); } : null,
        onDelete: ()=>{
          if(confirm('Nascondere la scheda "'+(state.builtinLabels[key]||BUILTIN_TABS[key])+'"? I dati restano salvati e potrai farla ricomparire da "+ Nuova scheda".')){
            state.hiddenBuiltins.push(key);
            store.set(privKey("hiddenBuiltins"), state.hiddenBuiltins);
            applyHiddenBuiltins();
            document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
            document.querySelector('.tab[data-tab="dashboard"]').classList.add("active");
            render("dashboard");
          }
        }
      });
    });
    btn.appendChild(editBtn);
  });
}
function restoreBuiltin(key){
  state.hiddenBuiltins = state.hiddenBuiltins.filter(k=>k!==key);
  store.set(privKey("hiddenBuiltins"), state.hiddenBuiltins);
  applyHiddenBuiltins();
}

      render("custom:"+newTab.id);
    });
    actions.appendChild(cancelBtn); actions.appendChild(createBtn);
    modal.appendChild(actions);
    nameInput.focus();
  });
}
document.getElementById("add-tab-btn").addEventListener("click", openNewTabModal);

/* ---------------- render dispatcher ---------------- */
function clear(main){ main.innerHTML=""; return main; }
function autoResize(ta){
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}
function render(tab){
  currentRenderedTab = tab;
  const main = clear(document.getElementById("main"));
  if(tab==="dashboard") renderDashboard(main);
  else if(tab==="orto") renderOrto(main);
  else if(tab==="viaggio") renderCollection(main, {
    key:"trips", tab:"viaggio", title:"Checklist viaggio", titleEl: builtinTabHeader("viaggio","Viaggi"), active:activeTrip,
    setActive:(id)=>activeTrip=id, template:TRIP_TEMPLATE, renderDetail:renderTripDetail
  });
  else if(tab==="grigliate") renderCollection(main, {
    key:"bbqs", tab:"grigliate", title:"Checklist grigliate", titleEl: builtinTabHeader("grigliate","Grigliate"), active:activeBbq,
    setActive:(id)=>activeBbq=id, template:BBQ_TEMPLATE, renderDetail:renderBbqDetail
  });
  else if(tab==="gomme") renderGomme(main);
  else if(tab==="progetti") renderCollection(main, {
    key:"projects", tab:"progetti", title:"Progetti", titleEl: builtinTabHeader("progetti","Progetti"), active:activeProject,
    setActive:(id)=>activeProject=id, template:PROJECT_TEMPLATE, renderDetail:renderProjectDetail,
    itemsLabel:"progetti salvati", newBtnLabel:"+ Nuovo progetto",
    namePrompt:"Nome del progetto:", renameTitle:"Rinomina progetto", renamePrompt:"Rinomina progetto:",
    delBtnLabel:"Elimina progetto", emptyStateText:"Seleziona o crea un progetto per iniziare.", emptyStateIcon:ICON_CHECK
  });
  else if(tab==="finanze") renderFinanze(main);
  else if(tab==="condivisi") renderCollection(main, {
    key:"sharedBoards", tab:"condivisi", title:"Board condivise", titleEl: builtinTabHeader("condivisi","Condivisi"), active:activeSharedBoard,
    setActive:(id)=>activeSharedBoard=id, template:SHARED_BOARD_TEMPLATE, renderDetail:renderSharedBoardDetail
  });
  else if(tab.indexOf("custom:")===0){
    const id = tab.slice(7);
    const tabCfg = findCustomTab(id);
    if(!tabCfg) return;
    main.appendChild(el("div",{class:"empty-hint"},"Caricamento…"));
    ensureCustomTabLoaded(tabCfg).then((storeKey)=>{
      const main2 = clear(document.getElementById("main"));
      const titleEl = el("div",{class:"tab-detail-title"}, [
        el("span",{class:"tab-detail-title-icon", html: STANDARD_ICONS[tabCfg.icon]||STANDARD_ICONS.list}),
        document.createTextNode(tabCfg.name)
      ]);
      renderCollection(main2, {
        key: storeKey, tab: tab, title: tabCfg.name, titleEl: titleEl,
        active: activeCustomItem[tabCfg.id] || null,
        setActive: (itemId)=>{ activeCustomItem[tabCfg.id]=itemId; },
        template: SHARED_BOARD_TEMPLATE,
        renderDetail: renderGenericChecklistDetail(storeKey, tab)
      });
      main2.querySelectorAll("textarea").forEach(ta=>autoResize(ta));
    });
  }
  main.querySelectorAll("textarea").forEach(ta=>autoResize(ta));
}

initAuth();
</script>
