  const chartInner = el("div",{class:"gantt-chart-inner", style:`width:${chartWidth}px;`});

  // header con mesi e giorni
  const headerRow = el("div",{class:"gantt-header", style:`width:${chartWidth}px;`});
  let d = new Date(rangeStart);
  let monthStartOffset = 0, curMonthLabel = "";
  const monthsRow = el("div",{class:"gantt-months", style:`width:${chartWidth}px;`});
  const daysRow = el("div",{class:"gantt-days", style:`width:${chartWidth}px;`});
  for(let i=0;i<totalDays;i++){
    const cellDate = new Date(rangeStart); cellDate.setDate(cellDate.getDate()+i);
    const monthLabel = cellDate.toLocaleDateString("it-IT",{month:"short", year:"2-digit"});
    if(monthLabel !== curMonthLabel){
      if(curMonthLabel){
        monthsRow.appendChild(el("div",{class:"gantt-month-seg", style:`width:${(i-monthStartOffset)*GANTT_PX_PER_DAY}px;`}, curMonthLabel));
      }
      curMonthLabel = monthLabel; monthStartOffset = i;
    }
    const isWeekend = cellDate.getDay()===0 || cellDate.getDay()===6;
    daysRow.appendChild(el("div",{class:"gantt-day-cell"+(isWeekend?" weekend":""), style:`width:${GANTT_PX_PER_DAY}px;`}, String(cellDate.getDate())));
  }
  monthsRow.appendChild(el("div",{class:"gantt-month-seg", style:`width:${(totalDays-monthStartOffset)*GANTT_PX_PER_DAY}px;`}, curMonthLabel));
  headerRow.appendChild(monthsRow); headerRow.appendChild(daysRow);
  chartInner.appendChild(headerRow);

  const bodyWrap = el("div",{class:"gantt-body", style:`width:${chartWidth}px; height:${tasks.length*GANTT_ROW_H}px;`});
  // linea "oggi"
  if(todayOffset >= 0 && todayOffset <= totalDays){
    bodyWrap.appendChild(el("div",{class:"gantt-today-line", style:`left:${todayOffset*GANTT_PX_PER_DAY}px; height:${tasks.length*GANTT_ROW_H}px;`}));
  }
  chartInner.appendChild(bodyWrap);
  scrollArea.appendChild(chartInner);

  tasks.forEach((t,i)=>{
    // riga etichetta
    const labelRow = el("div",{class:"gantt-label-row", style:`height:${GANTT_ROW_H}px;`});
    const nameSpan = el("span",{class:"gantt-task-name"+(t.done?" done":"")}, t.name);
    labelRow.appendChild(nameSpan);
    labelRow.addEventListener("click", ()=> openProjectTaskModal(project, t, ganttSave));
    labelsCol.appendChild(labelRow);

    // barra
    const startOff = ganttDateToOffset(t.start, rangeStart);
    const endOff = ganttDateToOffset(t.end, rangeStart);
    const durDays = Math.max(1, endOff-startOff+1);
    const bar = el("div",{class:"gantt-bar"+(t.done?" done":""), style:
      `left:${startOff*GANTT_PX_PER_DAY}px; top:${i*GANTT_ROW_H+7}px; width:${durDays*GANTT_PX_PER_DAY - 4}px; background:${t.color||"var(--forest)"};`});
    const fill = el("div",{class:"gantt-bar-fill", style:`width:${Math.min(100,t.progress||0)}%;`});
    bar.appendChild(fill);
    bar.appendChild(el("span",{class:"gantt-bar-label"}, t.name));
    const leftHandle = el("span",{class:"gantt-handle gantt-handle-l"});
    const rightHandle = el("span",{class:"gantt-handle gantt-handle-r"});
    bar.appendChild(leftHandle); bar.appendChild(rightHandle);
    bodyWrap.appendChild(bar);

    let dragMoved = false;
    // trascinamento dell'intera barra (sposta inizio e fine mantenendo la durata)
    bar.addEventListener("pointerdown",(e)=>{
      if(e.target===leftHandle || e.target===rightHandle) return;
      e.preventDefault();
      bar.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      dragMoved = false;
      function move(ev){
        const deltaPx = ev.clientX - startX;
        if(Math.abs(deltaPx) > 4) dragMoved = true;
        const deltaDays = Math.round(deltaPx / GANTT_PX_PER_DAY);
        bar.style.left = ((startOff+deltaDays)*GANTT_PX_PER_DAY)+"px";
        bar._pendingDelta = deltaDays;
      }
      function up(){
        bar.removeEventListener("pointermove", move);
        bar.removeEventListener("pointerup", up);
        const deltaDays = bar._pendingDelta||0;
        if(deltaDays!==0){
          t.start = ganttOffsetToDate(startOff+deltaDays, rangeStart);
          t.end = ganttOffsetToDate(endOff+deltaDays, rangeStart);
          ganttSave(project);
        }
        if(!dragMoved){ openProjectTaskModal(project, t, ganttSave); }
        else { render("progetti"); }
      }
      bar.addEventListener("pointermove", move);
      bar.addEventListener("pointerup", up);
    });
    // ridimensiona da sinistra: cambia data inizio
    leftHandle.addEventListener("pointerdown",(e)=>{
      e.preventDefault(); e.stopPropagation();
      leftHandle.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      function move(ev){
        const deltaDays = Math.round((ev.clientX-startX)/GANTT_PX_PER_DAY);
        const newStartOff = Math.min(endOff, startOff+deltaDays);
        bar.style.left = (newStartOff*GANTT_PX_PER_DAY)+"px";
        bar.style.width = ((endOff-newStartOff+1)*GANTT_PX_PER_DAY-4)+"px";
        bar._pendingStartOff = newStartOff;
      }
      function up(){
        leftHandle.removeEventListener("pointermove", move);
        leftHandle.removeEventListener("pointerup", up);
        if(bar._pendingStartOff!=null){
          t.start = ganttOffsetToDate(bar._pendingStartOff, rangeStart);
          ganttSave(project); render("progetti");
        }
      }
      leftHandle.addEventListener("pointermove", move);
      leftHandle.addEventListener("pointerup", up);
    });
    // ridimensiona da destra: cambia data fine
    rightHandle.addEventListener("pointerdown",(e)=>{
      e.preventDefault(); e.stopPropagation();
      rightHandle.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      function move(ev){
        const deltaDays = Math.round((ev.clientX-startX)/GANTT_PX_PER_DAY);
        const newEndOff = Math.max(startOff, endOff+deltaDays);
        bar.style.width = ((newEndOff-startOff+1)*GANTT_PX_PER_DAY-4)+"px";
        bar._pendingEndOff = newEndOff;
      }
      function up(){
        rightHandle.removeEventListener("pointermove", move);
        rightHandle.removeEventListener("pointerup", up);
        if(bar._pendingEndOff!=null){
          t.end = ganttOffsetToDate(bar._pendingEndOff, rangeStart);
          ganttSave(project); render("progetti");
        }
      }
      rightHandle.addEventListener("pointermove", move);
      rightHandle.addEventListener("pointerup", up);
    });
  });

  ganttWrap.appendChild(labelsCol);
  ganttWrap.appendChild(scrollArea);
  detail.appendChild(ganttWrap);
}

/* ---------------- FINANZE ---------------- */
const AMORT_TYPES = {
  capitale: { label:"Capitale residuo (mutuo)", valueLabel:"Capitale residuo" },
  interessi: { label:"Interessi passivi residui", valueLabel:"Interessi residui" },
  deprezzamento: { label:"Deprezzamento bene (es. auto)", valueLabel:"Valore residuo" },
  rivalutazione: { label:"Rivalutazione bene (es. immobile)", valueLabel:"Valore attuale" }
};
function computeAmortValue(am){
  if(am.type==="interessi"){
    return am.rows.slice(am.idx).reduce((s,r)=>s+(r.intQuota||0), 0);
  }
  return am.rows[am.idx].capResiduo;
}
function openAmortizationModal(item, onSave){
  openModal((modal, close)=>{
    modal.appendChild(el("h3",{},"Piano di ammortamento"));
    if(!item.amortization || !item.amortization.rows || !item.amortization.rows.length){
      modal.appendChild(el("div",{class:"field-label"},"Tipo di piano"));
      const typeSelect = el("select",{});
      Object.keys(AMORT_TYPES).forEach(k=>{
        typeSelect.appendChild(el("option",{value:k}, AMORT_TYPES[k].label));
      });
      modal.appendChild(typeSelect);

      const tabsRow = el("div",{class:"modal-radio-row", style:"margin-top:12px;"});
      const pasteLabel = el("label",{});
      const pasteRadio = el("input",{type:"radio", name:"amortimportmode"}); pasteRadio.checked = true;
      pasteLabel.appendChild(pasteRadio); pasteLabel.appendChild(document.createTextNode("Incolla righe"));
      const excelLabel = el("label",{});
      const excelRadio = el("input",{type:"radio", name:"amortimportmode"});
      excelLabel.appendChild(excelRadio); excelLabel.appendChild(document.createTextNode("File Excel/CSV"));
      tabsRow.appendChild(pasteLabel); tabsRow.appendChild(excelLabel);
      modal.appendChild(tabsRow);

      const pasteSection = el("div",{});
      pasteSection.appendChild(el("div",{style:"font-size:12.5px;color:var(--ink-soft);margin:10px 0;line-height:1.5;"},
        'Incolla una riga per ogni rata/periodo, nel formato: scadenza;capitale;interessi;totale rata;valore residuo — es. 01/01/2026;450;120;570;99550. La colonna valore residuo è facoltativa (non serve per i piani "Interessi passivi residui", dove si calcola da solo). Per deprezzamento/rivalutazione puoi lasciare a 0 le colonne capitale/interessi/totale rata e usare solo scadenza e valore. Una volta importato, potrai avanzare periodo dopo periodo e il valore si aggiornerà da solo.'));
      const ta = el("textarea",{rows:"8", style:"font-size:12.5px; font-family:'IBM Plex Mono',monospace;", placeholder:"01/01/2026;450;120;570;99550\n01/02/2026;452;118;570;99098"});
      pasteSection.appendChild(ta);
      modal.appendChild(pasteSection);

      const excelSection = el("div",{style:"display:none; margin-top:12px;"});
      excelSection.appendChild(el("div",{class:"field-label"},"File Excel/CSV (colonne: scadenza, capitale, interessi, totale rata, e facoltativamente valore residuo — senza intestazione)"));
      const fileInput = el("input",{type:"file", accept:".xlsx,.xls,.csv"});
      let excelRows = null;
      const excelPreview = el("div",{style:"font-size:12px;color:var(--ink-soft);margin-top:6px;"});
      fileInput.addEventListener("change", ()=>{
        const file = fileInput.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e)=>{
          try{
            const wb = XLSX.read(e.target.result, {type:"array", cellDates:true});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            excelRows = normalizeSheetRows(XLSX.utils.sheet_to_json(sheet, {header:1, raw:true}));
            excelPreview.textContent = excelRows.length + " righe lette.";
          }catch(err){ excelPreview.textContent = "Errore lettura file: "+err.message; excelRows=null; }
        };
        reader.readAsArrayBuffer(file);
      });
      excelSection.appendChild(fileInput); excelSection.appendChild(excelPreview);
      modal.appendChild(excelSection);

      function toggleAmortMode(){
        pasteSection.style.display = pasteRadio.checked ? "" : "none";
        excelSection.style.display = excelRadio.checked ? "" : "none";
      }
      pasteRadio.addEventListener("change", toggleAmortMode);
      excelRadio.addEventListener("change", toggleAmortMode);

      const errBox = el("div",{style:"color:var(--rust); font-size:12px; margin-top:8px; min-height:16px;"});
      modal.appendChild(errBox);
      const actions = el("div",{class:"modal-actions"});
      const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
      cancelBtn.addEventListener("click", close);
      const importBtn = el("button",{class:"btn primary"},"Importa piano");
      importBtn.addEventListener("click", ()=>{
        let rawRows;
        if(excelRadio.checked){
          if(!excelRows || !excelRows.length){ errBox.textContent = "Carica prima un file Excel/CSV valido."; return; }
          rawRows = excelRows;
        } else {
          rawRows = ta.value.split("\n").map(l=>l.trim()).filter(l=>l.length).map(l=>l.split(";").map(p=>p.trim()));
        }
        const rows = [];
        for(const r of rawRows){
          if(!r || r.length<4 || r.every(c=>c===""||c==null)) continue;
          let [d, capQ, intQ, totRata, capR] = r;
          let dateStr;
          if(d instanceof Date) dateStr = String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
          else dateStr = String(d).trim();
          if(!/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)){ errBox.textContent = "Data non valida: "+dateStr; return; }
          rows.push({
            date:dateStr,
            capQuota: parseFloat(String(capQ).replace(",","."))||0,
            intQuota: parseFloat(String(intQ).replace(",","."))||0,
            totRata: parseFloat(String(totRata).replace(",","."))||0,
            capResiduo: parseFloat(String(capR).replace(",","."))||0
          });
        }
        if(!rows.length){ errBox.textContent = "Nessuna riga valida trovata."; return; }
        item.amortization = { rows, idx: 0, type: typeSelect.value };
        item.value = String(computeAmortValue(item.amortization));
        onSave(); close(); render("finanze");
      });
      actions.appendChild(cancelBtn); actions.appendChild(importBtn);
      modal.appendChild(actions);
    } else {
      const am = item.amortization;
      if(!am.type) am.type = "capitale";
      const typeDef = AMORT_TYPES[am.type] || AMORT_TYPES.capitale;
      const row = am.rows[am.idx];
      modal.appendChild(el("div",{style:"font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;"}, "Tipo: "+typeDef.label));
      modal.appendChild(el("div",{style:"font-size:13px; line-height:1.9;"}, [
        el("div",{},"Rata "+(am.idx+1)+" di "+am.rows.length+" — scadenza "+row.date),
        el("div",{},"Capitale: "+fmtEUR(row.capQuota)+" · Interessi: "+fmtEUR(row.intQuota)+" · Totale rata: "+fmtEUR(row.totRata)),
        el("div",{},typeDef.valueLabel+": "+fmtEUR(computeAmortValue(am)))
      ]));
      const gotoWrap = el("div",{style:"display:flex; align-items:center; gap:8px; margin-top:12px;"});
      gotoWrap.appendChild(el("label",{style:"font-size:12.5px; color:var(--ink-soft);"},"Vai alla rata"));
      const gotoInput = el("input",{type:"number", min:"1", max:String(am.rows.length), value:String(am.idx+1), style:"width:70px;"});
      const gotoErr = el("span",{style:"font-size:12px; color:var(--rust);"});
      const gotoBtn = el("button",{class:"btn small"},"Vai");
      function doGoto(){
        const n = parseInt(gotoInput.value, 10);
        if(!n || n<1 || n>am.rows.length){
          gotoErr.textContent = "Numero rata non valido (1–"+am.rows.length+").";
          return;
        }
        am.idx = n-1;
        item.value = String(computeAmortValue(am));
        onSave(); close(); render("finanze");
      }
      gotoBtn.addEventListener("click", doGoto);
      gotoInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); doGoto(); } });
      gotoWrap.appendChild(gotoInput); gotoWrap.appendChild(gotoBtn); gotoWrap.appendChild(gotoErr);
      modal.appendChild(gotoWrap);
      const actions = el("div",{class:"modal-actions"});
      const removeBtn = el("button",{class:"btn danger small", style:"margin-right:auto;"},"Rimuovi piano");
      removeBtn.addEventListener("click", ()=>{
        if(confirm("Rimuovere il piano di ammortamento? Potrai reimportarlo in seguito.")){
          delete item.amortization;
          onSave(); close(); render("finanze");
        }
      });
      actions.appendChild(removeBtn);
      const closeBtn = el("button",{class:"btn ghost"},"Chiudi");
      closeBtn.addEventListener("click", close);
      actions.appendChild(closeBtn);
      if(am.idx < am.rows.length-1){
        const nextBtn = el("button",{class:"btn primary"},"Avanza al mese successivo →");
        nextBtn.addEventListener("click", ()=>{
          am.idx++;
          item.value = String(computeAmortValue(am));
          onSave(); close(); render("finanze");
        });
        actions.appendChild(nextBtn);
      } else {
        actions.appendChild(el("span",{style:"font-size:12px;color:var(--ink-soft);align-self:center;"},"Ultima rata del piano."));
      }
      modal.appendChild(actions);
    }
  });
}

    itemWrap.appendChild(noteInp);

  const addLine = el("div",{class:"add-line"});

  block.appendChild(addLine);
  return block;
}
function renderFinanceChart(fullHistory){
  // storico in ordine cronologico crescente (il più vecchio per primo)
  const chronological = fullHistory.slice().reverse();
  let data = chronological;
  if(financeChartWindow !== "all"){
    const months = parseInt(financeChartWindow,10);
    const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth()-months);
    data = chronological.filter(row=>{
      const d = parseItDate(row.date);
      return !d || d >= cutoff;
    });
  }
  if(data.length < 2){
    return emptyState("Salva almeno due snapshot nella finestra selezionata per vedere il grafico del trend.", ICON_COIN);
  }
  const series = [
    {key:"liquidity", color:"#2F6B2F", label:"Liquidità"},
    {key:"nonliquid", color:"#1F4A28", label:"Non liquidi"},
    {key:"debts", color:"#9C3B2E", label:"Debiti"},
    {key:"net", color:"#233A46", label:"Patrimonio netto"}
  ];

  // proiezione forecast a 12 mesi su liquidità e patrimonio netto, basata sul trend degli ultimi 12 snapshot
  let forecastPoints = { liquidity: [], net: [] };
  if(financeChartForecast){
    const sample = data.slice(-12);
    const firstRow = sample[0], lastRow = sample[sample.length-1];
    const d0 = parseItDate(firstRow.date), d1 = parseItDate(lastRow.date);
    const nMonths = (d0 && d1) ? Math.max(1, monthsBetween(d0,d1)) : Math.max(1, sample.length-1);
    ["liquidity","net"].forEach(k=>{
      const growthPerMonth = ((lastRow[k]||0) - (firstRow[k]||0)) / nMonths;
      let cur = lastRow[k]||0;
      for(let m=1; m<=12; m++){
        cur += growthPerMonth;
        forecastPoints[k].push(cur);
      }
    });
  }

  const totalPoints = data.length + (financeChartForecast ? 12 : 0);
  const w = Math.max(640, totalPoints*46), h = 240, pad = 38, padLeft = 62, padRight = 96;
  const allActualVals = data.flatMap(d=> series.map(s=> d[s.key]||0));
  const allForecastVals = financeChartForecast ? forecastPoints.liquidity.concat(forecastPoints.net) : [];
  const allVals = allActualVals.concat(allForecastVals).concat([0]);
  const maxV = Math.max(...allVals), minV = Math.min(...allVals);
  const range = (maxV - minV) || 1;
  const xStep = totalPoints>1 ? (w - padLeft - padRight) / (totalPoints - 1) : 0;
  function xy(val, i){
    const x = padLeft + i*xStep;
    const y = h - pad - ((val - minV) / range) * (h - pad*2);
    return [x,y];
  }
  let svg = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">`;
  // etichette e griglia sull'asse Y (valori in €)
  const yTicks = 4;
  for(let t=0; t<=yTicks; t++){
    const val = minV + (range * t / yTicks);
    const y = h - pad - (t/yTicks) * (h - pad*2);
    svg += `<line x1="${padLeft}" y1="${y.toFixed(1)}" x2="${w-padRight}" y2="${y.toFixed(1)}" stroke="#EFE6D4" stroke-width="1"/>`;
    svg += `<text x="${(padLeft-8).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="9" fill="#8a8065" text-anchor="end">${fmtMoneyPlain(val)}</text>`;
  }
  svg += `<line x1="${padLeft}" y1="${h-pad}" x2="${w-padRight}" y2="${h-pad}" stroke="#E4D6AC" stroke-width="1"/>`;
  if(financeChartForecast){
    const [sepX] = xy(0, data.length-1);
    svg += `<line x1="${sepX.toFixed(1)}" y1="${pad-6}" x2="${sepX.toFixed(1)}" y2="${h-pad}" stroke="#B8AD8E" stroke-width="1" stroke-dasharray="3,3"/>`;
    svg += `<text x="${sepX.toFixed(1)}" y="${pad-10}" font-size="9" fill="#8a8065" text-anchor="middle">oggi</text>`;
  }
  series.forEach(s=>{
    const d = data.map((row,i)=>{
      const [x,y] = xy(row[s.key]||0, i);
      return (i===0?"M":"L")+x.toFixed(1)+","+y.toFixed(1);
    }).join(" ");
    svg += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="${s.key==='net'?2.6:1.6}"><title>${s.label}</title></path>`;
    let endX, endY;
    if(financeChartForecast && forecastPoints[s.key]){
      const lastActual = xy(data[data.length-1][s.key]||0, data.length-1);
      let fd = "M"+lastActual[0].toFixed(1)+","+lastActual[1].toFixed(1);
      forecastPoints[s.key].forEach((val,fi)=>{
        const [x,y] = xy(val, data.length+fi);
        fd += " L"+x.toFixed(1)+","+y.toFixed(1);
        endX = x; endY = y;
      });
      svg += `<path d="${fd}" fill="none" stroke="${s.color}" stroke-width="${s.key==='net'?2.6:1.6}" stroke-dasharray="5,4" opacity="0.65"><title>${s.label} (proiezione)</title></path>`;
    } else {
      [endX, endY] = xy(data[data.length-1][s.key]||0, data.length-1);
    }
    // etichetta alla fine della linea, per distinguere subito quale serie è quale
    svg += `<circle cx="${endX.toFixed(1)}" cy="${endY.toFixed(1)}" r="2.6" fill="${s.color}"/>`;
    svg += `<text x="${(endX+6).toFixed(1)}" y="${(endY+3).toFixed(1)}" font-size="9.5" font-weight="700" fill="${s.color}">${s.label}<title>${s.label}</title></text>`;
  });
  // etichette mesi sull'asse X (evitando sovraffollamento su tante colonne)
  const labelEvery = Math.max(1, Math.ceil(totalPoints/12));
  data.forEach((row,i)=>{
    if(i % labelEvery !== 0 && i !== data.length-1) return;
    const d = parseItDate(row.date);
    const label = d ? d.toLocaleDateString("it-IT",{month:"short", year:"2-digit"}) : row.date;
    const [x] = xy(0,i);
    svg += `<text x="${x.toFixed(1)}" y="${h-pad+16}" font-size="9" fill="#8a8065" text-anchor="middle">${label}</text>`;
  });
  if(financeChartForecast){
    forecastPoints.net.forEach((val,fi)=>{
      const i = data.length+fi;
      if(fi % labelEvery !== 0 && fi !== forecastPoints.net.length-1) return;
      const d = parseItDate(data[data.length-1].date);
      let label = "+"+(fi+1)+"m";
      if(d){ const proj = new Date(d); proj.setMonth(proj.getMonth()+fi+1); label = proj.toLocaleDateString("it-IT",{month:"short", year:"2-digit"}); }
      const [x] = xy(0,i);
      svg += `<text x="${x.toFixed(1)}" y="${h-pad+16}" font-size="9" fill="#b8ad8e" text-anchor="middle">${label}</text>`;
    });
  }
  svg += `</svg>`;
  const wrap = el("div",{});
  const scrollWrap = el("div",{style:"overflow-x:auto;"});
  scrollWrap.appendChild(el("div",{html:svg}));
  wrap.appendChild(scrollWrap);
  const legend = el("div",{class:"chart-legend"});
  series.forEach(s=>{
    legend.appendChild(el("span",{class:"chart-legend-item"},[
      el("span",{class:"chart-legend-dot", style:`background:${s.color};`}),
      el("span",{}, s.label)
    ]));
  });
  if(financeChartForecast){
    legend.appendChild(el("span",{class:"chart-legend-item"},[
      el("span",{class:"chart-legend-dot", style:"background:transparent;border:1px dashed var(--ink-soft);"}),
      el("span",{}, "proiezione 12 mesi")
    ]));
  }
  wrap.appendChild(legend);
  return wrap;
}
function normalizeSheetRows(rows){
  // Quando un CSV usa ";" come separatore di campo, XLSX a volte non lo riconosce e
  // restituisce l'intera riga come un'unica cella: qui la spacchiamo noi nelle colonne reali.
  return (rows||[]).map(r=>{
    if(Array.isArray(r) && r.length===1 && typeof r[0]==="string" && r[0].indexOf(";")>-1){
      return r[0].split(";").map(p=>p.trim());
    }
    return r;
  });
}
function commitFinanceImport(parsed, errBox, close){
  if(!parsed.length) return;
  errBox.textContent = "";
  parsed.forEach(row=>{
    const existingIdx = state.finance.history.findIndex(h=>h.date===row.date);
    if(existingIdx>-1) state.finance.history[existingIdx] = row;
    else state.finance.history.push(row);
  });
  state.finance.history.sort((a,b)=>{
    const da = a.date.split("/").reverse().join("");
    const db = b.date.split("/").reverse().join("");
    return db.localeCompare(da);
  });
  store.set(privKey("finance"), state.finance);
  close(); render("finanze");
}
function parseFinanceRows(rows, errBox){
  // rows: array di array [dateStr|Date, liq, nonliq, debt] già "grezzi"
  const parsed = [];
  for(const row of rows){
    if(!row || row.length < 4 || row.every(c=>c===""||c==null)) continue;
    let [rawDate, liq, nonliq, debt] = row;
    let dateStr;
    if(rawDate instanceof Date){
      dateStr = String(rawDate.getDate()).padStart(2,"0")+"/"+String(rawDate.getMonth()+1).padStart(2,"0")+"/"+rawDate.getFullYear();
    } else {
      dateStr = String(rawDate).trim();
    }
    if(!/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)){ errBox.textContent = "Data non valida: "+dateStr; return null; }
    const liquidity = parseFloat(String(liq).replace(",", ".")) || 0;
    const nonliquid = parseFloat(String(nonliq).replace(",", ".")) || 0;
    const debts = parseFloat(String(debt).replace(",", ".")) || 0;
    parsed.push({ date:dateStr, liquidity, nonliquid, debts, net: liquidity+nonliquid-debts });
  }
  return parsed;
}

    const ta = el("textarea",{rows:"10", style:"font-size:12.5px; font-family:'IBM Plex Mono',monospace;", placeholder:"01/01/2025;30000;150000;130000\n01/02/2025;31000;151000;129000"});

      "Carica un file .xlsx/.xls con 4 colonne per riga (senza intestazione): data, liquidità, non liquidi, debiti. La data può essere testo gg/mm/aaaa o una cella data di Excel."));
    const fileInput = el("input",{type:"file", accept:".xlsx,.xls,.csv"});
    excelSection.appendChild(fileInput);
    let excelParsedRows = null;
    const excelPreview = el("div",{style:"font-size:12px;color:var(--ink-soft);margin-top:8px;"});
    excelSection.appendChild(excelPreview);
    fileInput.addEventListener("change", ()=>{
      const file = fileInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e)=>{
        try{
          const wb = XLSX.read(e.target.result, {type:"array", cellDates:true});
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = normalizeSheetRows(XLSX.utils.sheet_to_json(sheet, {header:1, raw:true}));
          excelParsedRows = rows;
          excelPreview.textContent = rows.length + " righe lette dal foglio \""+wb.SheetNames[0]+"\".";
        }catch(err){
          excelPreview.textContent = "Impossibile leggere il file: "+err.message;
          excelParsedRows = null;
        }
      };
      reader.readAsArrayBuffer(file);
    });
    modal.appendChild(excelSection);

    function toggleMode(){
      pasteSection.style.display = pasteRadio.checked ? "" : "none";
      excelSection.style.display = excelRadio.checked ? "" : "none";
    }
    pasteRadio.addEventListener("change", toggleMode);
    excelRadio.addEventListener("change", toggleMode);

    const errBox = el("div",{style:"color:var(--rust); font-size:12px; margin-top:8px; min-height:16px;"});
    modal.appendChild(errBox);
    const actions = el("div",{class:"modal-actions"});
    const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
    cancelBtn.addEventListener("click", close);
    const importBtn = el("button",{class:"btn primary"},"Importa");
    importBtn.addEventListener("click", ()=>{
      if(pasteRadio.checked){
        const lines = ta.value.split("\n").map(l=>l.trim()).filter(l=>l.length);
        if(!lines.length) return;
        const rows = [];
        for(const line of lines){
          const parts = line.split(";").map(p=>p.trim());
          if(parts.length < 4){ errBox.textContent = 'Riga non valida (servono 4 campi separati da ";"): '+line; return; }
          rows.push(parts);
        }
        const parsed = parseFinanceRows(rows, errBox);
        if(parsed) commitFinanceImport(parsed, errBox, close);
      } else {
        if(!excelParsedRows){ errBox.textContent = "Carica prima un file Excel valido."; return; }
        const parsed = parseFinanceRows(excelParsedRows, errBox);
        if(parsed) commitFinanceImport(parsed, errBox, close);
      }
    });
    actions.appendChild(cancelBtn); actions.appendChild(importBtn);
    modal.appendChild(actions);
  });
}

    const titleInput = el("input",{type:"text", class:"cat-title-input", value:cat.title, placeholder:"Nome categoria"});
    titleInput.addEventListener("change", ()=>{ cat.title=titleInput.value; save(); });
    const delCatBtn = el("span",{class:"del", html:"✕", style:"cursor:pointer;opacity:.5;font-size:12px;"});
    delCatBtn.addEventListener("click", ()=>{
      if(confirm('Eliminare la categoria "'+(cat.title||"senza nome")+'" e tutte le sue voci?')){
        board.data.splice(ci,1);
        save();
      }
    });
    const allDone = cat.items.length>0 && cat.items.every(it=>it.done);
    const selAllWrap = el("label",{class:"select-all-cat", title:"Seleziona/deseleziona tutte le voci"});
    const selAllCb = el("input",{type:"checkbox"}); selAllCb.checked = allDone;
    selAllWrap.appendChild(selAllCb); selAllWrap.appendChild(el("span",{},"Tutto"));
    selAllCb.addEventListener("change", ()=>{
      cat.items.forEach(it=>it.done = selAllCb.checked);
      save(true);
    });
    const allTake = cat.items.length>0 && cat.items.every(it=>it.take!==false);
    const selAllTakeWrap = el("label",{class:"select-all-cat take", title:"Seleziona/deseleziona tutti i baffi (da prendere)"});
    const selAllTakeCb = el("input",{type:"checkbox"}); selAllTakeCb.checked = allTake;
    selAllTakeWrap.appendChild(selAllTakeCb); selAllTakeWrap.appendChild(el("span",{},"Da prendere"));
    selAllTakeCb.addEventListener("change", ()=>{
      cat.items.forEach(it=>it.take = selAllTakeCb.checked);
      save(true);
    });
    head.appendChild(titleInput);
    head.appendChild(selAllWrap);
    head.appendChild(selAllTakeWrap);
    head.appendChild(delCatBtn);
    block.appendChild(head);
    const grid = el("div",{class:"pack-grid"});
    cat.items.forEach((it,i)=>{
      grid.appendChild(renderPackItem(it, i, cat.items, save, idPrefix+ci));
    });
    block.appendChild(grid);
    const addLine = el("div",{class:"add-line"});
    const addKey = idPrefix+ci+"-add";
    const input = el("input",{type:"text", placeholder:"aggiungi voce…", "data-addline":addKey, enterkeyhint:"done"});
    input.addEventListener("keydown",(e)=>{
      if(e.key==="Enter" && input.value.trim()){
        cat.items.push({id:"pk"+Date.now()+Math.random().toString(36).slice(2,5), text:input.value.trim(), done:false, take:true});
        save();
        const again = document.querySelector('[data-addline="'+addKey+'"]');
        if(again) again.focus();
      }
    });
    addLine.appendChild(input);
    block.appendChild(addLine);
    detail.appendChild(block);
  });
  const addCatBtn = el("button",{class:"btn ghost", style:"margin-top:6px;"},"+ Nuova categoria");
  addCatBtn.addEventListener("click", ()=>{
    board.data.push({title:"Nuova categoria", items:[]});
    save();
  });
  detail.appendChild(addCatBtn);
}
function renderSharedBoardDetail(detail, board){
  const save = (quiet)=>{ (quiet?store.setQuiet:store.set)("sharedBoards", state.sharedBoards); render("condivisi"); };
  renderCategorizedChecklist(detail, board, save, "s"+board.id, "condivisi");
}

/* ---------------- CUSTOM TABS ---------------- */
function renderGenericChecklistDetail(storeKey, tabName){
  return function(detail, board){
    const save = (quiet)=>{ (quiet?store.setQuiet:store.set)(storeKey, state[storeKey]); render(tabName); };
    renderCategorizedChecklist(detail, board, save, "c"+board.id, tabName);
  };
}
function findCustomTab(id){
  return state.customTabs.find(t=>t.id===id) || state.customTabsPrivate.find(t=>t.id===id);
}
async function ensureCustomTabLoaded(tab){
  const storeKey = tab.private ? privKey("custom:"+tab.id) : "custom:"+tab.id;
  if(!customTabData[tab.id]) customTabData[tab.id] = await store.get(storeKey, []);
  state[storeKey] = customTabData[tab.id];
  return storeKey;
}
function renderCustomTabButtons(){
  const sharedSlot = document.getElementById("custom-tabs-slot-shared");
  const privateSlot = document.getElementById("custom-tabs-slot-private");
  sharedSlot.innerHTML = ""; privateSlot.innerHTML = "";
  document.getElementById("private-group-label").style.display = state.customTabsPrivate.length ? "" : "none";
  state.customTabs.forEach((tab,i)=>{
    sharedSlot.appendChild(customTabButton(tab, i, state.customTabs));
  });
  state.customTabsPrivate.forEach((tab,i)=>{
    privateSlot.appendChild(customTabButton(tab, i, state.customTabsPrivate));
  });
}
function customTabButton(tab, index, arr){
  const btn = el("button",{class:"tab custom-tab", "data-tab":"custom:"+tab.id, style:`background:${tab.color}`});
  const grip = el("span",{class:"tab-drag-grip", html:ICON_GRIP, title:"Trascina per riordinare"});
  btn.appendChild(grip);
  const targetKeyFor = ()=> tab.private ? privKey("customTabs") : "customTabs";
  attachRowDrag(grip, btn, index, arr, ()=>{
    store.set(targetKeyFor(), arr);
    renderCustomTabButtons();
  });
  const iconEl = el("span",{class:"tab-icon", html: STANDARD_ICONS[tab.icon]||STANDARD_ICONS.list});
  btn.appendChild(iconEl);
  const labelEl = el("span",{class:"tab-label"}, tab.name);
  btn.appendChild(labelEl);
  const editBtn = el("span",{class:"tab-edit-btn", html:ICON_EDIT, title:"Modifica scheda"});
  editBtn.addEventListener("click",(e)=>{
    e.stopPropagation();
    const targetKey = ()=> tab.private ? privKey("customTabs") : "customTabs";
    const targetArr = ()=> tab.private ? state.customTabsPrivate : state.customTabs;
    openTabEditModal({
      getIcon: ()=>tab.icon, setIcon: (k)=>{ tab.icon=k; store.setQuiet(targetKey(), targetArr()); },
      getColor: ()=>tab.color, setColor: (c)=>{ tab.color=c; btn.style.background=c; store.setQuiet(targetKey(), targetArr()); },
      getName: ()=>tab.name, setName: (n)=>{ tab.name=n; store.setQuiet(targetKey(), targetArr()); },
      afterSave: ()=>renderCustomTabButtons(),
      onDelete: ()=>{
        if(confirm('Eliminare la scheda "'+tab.name+'" e tutti i suoi contenuti? Questa azione non è reversibile.')){
          deleteCustomTab(tab);
        }
      }
    });
  });
  btn.appendChild(editBtn);
  return btn;
}
async function deleteCustomTab(tab){
  const contentKey = tab.private ? privKey("custom:"+tab.id) : "custom:"+tab.id;
  if(tab.private){
    state.customTabsPrivate = state.customTabsPrivate.filter(t=>t.id!==tab.id);
    await store.set(privKey("customTabs"), state.customTabsPrivate);
  } else {
    state.customTabs = state.customTabs.filter(t=>t.id!==tab.id);
    await store.set("customTabs", state.customTabs);
  }
  await store.set(contentKey, []);
  delete customTabData[tab.id];
  renderCustomTabButtons();
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector('.tab[data-tab="dashboard"]').classList.add("active");
  render("dashboard");
}

/* ---------------- builtin tabs: nascondi / ripristina ---------------- */
function builtinTabHeader(key, fallbackLabel){
  const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
  const iconSpan = btn ? btn.querySelector(".tab-icon") : null;
  const iconHtml = iconSpan ? iconSpan.innerHTML : "";
  const label = state.builtinLabels[key] || fallbackLabel || BUILTIN_TABS[key] || "";
  return el("div",{class:"tab-detail-title"}, [
    el("span",{class:"tab-detail-title-icon", html:iconHtml}),
    document.createTextNode(label)
  ]);
}
const BUILTIN_TABS = {
  orto: "Orto", viaggio: "Viaggi", grigliate: "Grigliate", gomme: "Gomme", progetti: "Progetti", condivisi: "Condivisi"
};
function applyHiddenBuiltins(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(btn) btn.style.display = state.hiddenBuiltins.includes(key) ? "none" : "";
  });
}
function applyBuiltinLabels(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn) return;
    const mainSpan = btn.querySelector(".tab-label-main");
    if(mainSpan) mainSpan.textContent = state.builtinLabels[key] || BUILTIN_TABS[key];
  });
}
function applyBuiltinColors(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn) return;
    if(state.builtinColors[key]) btn.style.background = state.builtinColors[key];
    else btn.style.background = "";
  });
}
function applyBuiltinIcons(){
  Object.keys(BUILTIN_TABS).forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn) return;
    const iconSpan = btn.querySelector(".tab-icon");
    if(!iconSpan) return;
    if(state.builtinIcons[key]){
      if(!iconSpan.dataset.origHtml) iconSpan.dataset.origHtml = iconSpan.innerHTML;
      iconSpan.innerHTML = STANDARD_ICONS[state.builtinIcons[key]] || iconSpan.dataset.origHtml;
    } else if(iconSpan.dataset.origHtml){
      iconSpan.innerHTML = iconSpan.dataset.origHtml;
    }
  });
}
function applyBuiltinOrder(){
  if(!state.builtinOrder || !state.builtinOrder.length) return;
  const nav = document.getElementById("tabs");
  const anchor = document.getElementById("custom-tabs-slot-shared");
  if(!anchor) return;
  state.builtinOrder.forEach(key=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(btn) nav.insertBefore(btn, anchor);
  });
}
let builtinTabsEnhanced = false;
function enhanceBuiltinTabs(){
  Object.keys(BUILTIN_TABS).forEach((key, idx)=>{
    const btn = document.querySelector('.tab[data-builtin="'+key+'"]');
    if(!btn || btn.dataset.enhanced) return;
    btn.dataset.enhanced = "1";
    btn.classList.add("custom-tab");

    const grip = el("span",{class:"tab-drag-grip", html:ICON_GRIP, title:"Trascina per riordinare"});
    btn.insertBefore(grip, btn.firstChild);
    btn.dataset.builtinDragKey = key;
    bindPointerDragSource(grip, btn, (e)=>{
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const target = under && under.closest("[data-builtin-drag-key]");
      document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
      if(target && target!==btn) target.classList.add("drag-over");
    }, (e)=>{
      document.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const target = under && under.closest("[data-builtin-drag-key]");
      if(!target || target===btn) return;
      const toKey = target.dataset.builtinDragKey;
      if(!toKey || toKey===key) return;
      let order = (state.builtinOrder && state.builtinOrder.length) ? state.builtinOrder.slice() : Object.keys(BUILTIN_TABS);
      order = order.filter(k=>k!==key);
      const toIdx = order.indexOf(toKey);
      order.splice(toIdx, 0, key);
      state.builtinOrder = order;
      store.setQuiet(privKey("builtinOrder"), order);
      applyBuiltinOrder();
    });

    const editBtn = el("span",{class:"tab-edit-btn", html:ICON_EDIT, title:"Modifica scheda"});
    editBtn.addEventListener("click",(e)=>{
      e.stopPropagation();
      openTabEditModal({
        getIcon: ()=>state.builtinIcons[key]||"", setIcon: (k)=>{ state.builtinIcons[key]=k; store.setQuiet(privKey("builtinIcons"), state.builtinIcons); },
        getColor: ()=>state.builtinColors[key]||currentTabPalette()[idx%currentTabPalette().length], setColor: (c)=>{ state.builtinColors[key]=c; store.setQuiet(privKey("builtinColors"), state.builtinColors); },
        getName: ()=>state.builtinLabels[key]||BUILTIN_TABS[key], setName: (n)=>{ state.builtinLabels[key]=n; store.setQuiet(privKey("builtinLabels"), state.builtinLabels); },
        afterSave: ()=>{ applyBuiltinIcons(); applyBuiltinColors(); applyBuiltinLabels(); },
        onResetIcon: state.builtinIcons[key] ? ()=>{ delete state.builtinIcons[key]; store.setQuiet(privKey("builtinIcons"), state.builtinIcons); applyBuiltinIcons(); } : null,
        onResetColor: state.builtinColors[key] ? ()=>{ delete state.builtinColors[key]; store.setQuiet(privKey("builtinColors"), state.builtinColors); applyBuiltinColors(); } : null,
        onDelete: ()=>{
          if(confirm('Nascondere la scheda "'+(state.builtinLabels[key]||BUILTIN_TABS[key])+'"? I dati restano salvati e potrai farla ricomparire da "+ Nuova scheda".')){
            state.hiddenBuiltins.push(key);
            store.set(privKey("hiddenBuiltins"), state.hiddenBuiltins);
            applyHiddenBuiltins();
            document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
            document.querySelector('.tab[data-tab="dashboard"]').classList.add("active");
            render("dashboard");
          }
        }
      });
    });
    btn.appendChild(editBtn);
  });
}
function restoreBuiltin(key){
  state.hiddenBuiltins = state.hiddenBuiltins.filter(k=>k!==key);
  store.set(privKey("hiddenBuiltins"), state.hiddenBuiltins);
  applyHiddenBuiltins();
}
function openNewTabModal(){
  openModal((modal, close)=>{
    modal.appendChild(el("h3",{},"Nuova scheda"));

    if(state.hiddenBuiltins.length){
      modal.appendChild(el("div",{class:"field-label"},"Ripristina una scheda nascosta"));
      const restoreWrap = el("div",{style:"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;"});
      state.hiddenBuiltins.forEach(key=>{
        const chip = el("button",{type:"button", class:"btn small ghost"}, BUILTIN_TABS[key]+" ↺");
        chip.addEventListener("click", ()=>{ restoreBuiltin(key); close(); });
        restoreWrap.appendChild(chip);
      });
      modal.appendChild(restoreWrap);
      modal.appendChild(el("div",{style:"font-size:12px;color:var(--ink-soft);margin:10px 0 16px;"},"— oppure crea una scheda completamente nuova —"));
    }

    const nameInput = el("input",{type:"text", placeholder:"Nome scheda (es. Film da vedere)"});
    modal.appendChild(nameInput);

    modal.appendChild(el("div",{class:"field-label"},"Colore"));
    const colorPicker = el("div",{class:"color-picker"});
    const palette = currentTabPalette();
    let selColor = palette[Math.floor(Math.random()*palette.length)];
    palette.forEach(c=>{
      const dot = el("div",{class:"color-choice"+(c===selColor?" selected":""), style:`background:${c}`});
      dot.addEventListener("click", ()=>{
        colorPicker.querySelectorAll(".color-choice").forEach(d=>d.classList.remove("selected"));
        dot.classList.add("selected"); selColor=c;
      });
      colorPicker.appendChild(dot);
    });
    modal.appendChild(colorPicker);

    modal.appendChild(el("div",{class:"field-label"},"Icona"));
    let selIcon = "list";
    modal.appendChild(iconPickerRow(selIcon, (k)=>{ selIcon=k; }));

    modal.appendChild(el("div",{class:"field-label"},"Visibilità"));
    const visWrap = el("div",{class:"modal-radio-row"});
    const sharedLabel = el("label",{});
    const sharedRadio = el("input",{type:"radio", name:"tabvis"}); sharedRadio.checked = true;
    sharedLabel.appendChild(sharedRadio); sharedLabel.appendChild(document.createTextNode("Condivisa"));
    const privateLabel = el("label",{});
    const privateRadio = el("input",{type:"radio", name:"tabvis"});
    privateLabel.appendChild(privateRadio); privateLabel.appendChild(document.createTextNode("Solo per me"));
    visWrap.appendChild(sharedLabel); visWrap.appendChild(privateLabel);
    modal.appendChild(visWrap);

    const actions = el("div",{class:"modal-actions"});
    const cancelBtn = el("button",{class:"btn ghost"},"Annulla");
    cancelBtn.addEventListener("click", close);
    const createBtn = el("button",{class:"btn primary"},"Crea scheda");
    createBtn.addEventListener("click", async ()=>{
      if(!nameInput.value.trim()) return;
      const isPrivate = privateRadio.checked;
      const newTab = { id:"t"+Date.now(), name:nameInput.value.trim(), color:selColor, icon:selIcon, private:isPrivate };
      if(isPrivate){
        state.customTabsPrivate.push(newTab);
        await store.set(privKey("customTabs"), state.customTabsPrivate);
      } else {
        state.customTabs.push(newTab);
        await store.set("customTabs", state.customTabs);
      }
      renderCustomTabButtons();
      close();
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      const newBtn = document.querySelector('.tab[data-tab="custom:'+newTab.id+'"]');
      if(newBtn) newBtn.classList.add("active");
      render("custom:"+newTab.id);
    });
    actions.appendChild(cancelBtn); actions.appendChild(createBtn);
    modal.appendChild(actions);
    nameInput.focus();
  });
}
document.getElementById("add-tab-btn").addEventListener("click", openNewTabModal);

/* ---------------- render dispatcher ---------------- */
function clear(main){ main.innerHTML=""; return main; }
function autoResize(ta){
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}
function render(tab){
  currentRenderedTab = tab;
  const main = clear(document.getElementById("main"));
  if(tab==="dashboard") renderDashboard(main);
  else if(tab==="orto") renderOrto(main);
  else if(tab==="viaggio") renderCollection(main, {
    key:"trips", tab:"viaggio", title:"Checklist viaggio", titleEl: builtinTabHeader("viaggio","Viaggi"), active:activeTrip,
    setActive:(id)=>activeTrip=id, template:TRIP_TEMPLATE, renderDetail:renderTripDetail
  });
  else if(tab==="grigliate") renderCollection(main, {
    key:"bbqs", tab:"grigliate", title:"Checklist grigliate", titleEl: builtinTabHeader("grigliate","Grigliate"), active:activeBbq,
    setActive:(id)=>activeBbq=id, template:BBQ_TEMPLATE, renderDetail:renderBbqDetail
  });
  else if(tab==="gomme") renderGomme(main);
  else if(tab==="progetti") renderCollection(main, {
    key:"projects", tab:"progetti", title:"Progetti", titleEl: builtinTabHeader("progetti","Progetti"), active:activeProject,
    setActive:(id)=>activeProject=id, template:PROJECT_TEMPLATE, renderDetail:renderProjectDetail,
    itemsLabel:"progetti salvati", newBtnLabel:"+ Nuovo progetto",
    namePrompt:"Nome del progetto:", renameTitle:"Rinomina progetto", renamePrompt:"Rinomina progetto:",
    delBtnLabel:"Elimina progetto", emptyStateText:"Seleziona o crea un progetto per iniziare.", emptyStateIcon:ICON_CHECK
  });
  else if(tab==="finanze") renderFinanze(main);
  else if(tab==="condivisi") renderCollection(main, {
    key:"sharedBoards", tab:"condivisi", title:"Board condivise", titleEl: builtinTabHeader("condivisi","Condivisi"), active:activeSharedBoard,
    setActive:(id)=>activeSharedBoard=id, template:SHARED_BOARD_TEMPLATE, renderDetail:renderSharedBoardDetail
  });
  else if(tab.indexOf("custom:")===0){
    const id = tab.slice(7);
    const tabCfg = findCustomTab(id);
    if(!tabCfg) return;
    main.appendChild(el("div",{class:"empty-hint"},"Caricamento…"));
    ensureCustomTabLoaded(tabCfg).then((storeKey)=>{
      const main2 = clear(document.getElementById("main"));
      const titleEl = el("div",{class:"tab-detail-title"}, [
        el("span",{class:"tab-detail-title-icon", html: STANDARD_ICONS[tabCfg.icon]||STANDARD_ICONS.list}),
        document.createTextNode(tabCfg.name)
      ]);
      renderCollection(main2, {
        key: storeKey, tab: tab, title: tabCfg.name, titleEl: titleEl,
        active: activeCustomItem[tabCfg.id] || null,
        setActive: (itemId)=>{ activeCustomItem[tabCfg.id]=itemId; },
        template: SHARED_BOARD_TEMPLATE,
        renderDetail: renderGenericChecklistDetail(storeKey, tab)
      });
      main2.querySelectorAll("textarea").forEach(ta=>autoResize(ta));
    });
  }
  main.querySelectorAll("textarea").forEach(ta=>autoResize(ta));
}

initAuth();
</script>
